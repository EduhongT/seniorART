<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF7EF">
<title>머리에 그리는 AI 스쿨</title>
<style>
  :root{--paper:#FBF7EF;--card:#FFF;--ink:#2A2622;--muted:#8A8073;--line:#E9E1D2;
        --cinnabar:#C8453B;--celadon:#5E8C7B;--night:#10162b;--tap:60px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-size:17px;line-height:1.55;
    font-family:"Apple SD Gothic Neo","Noto Sans KR",system-ui,-apple-system,sans-serif;}
  .app{max-width:460px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
  header{position:sticky;top:0;z-index:5;background:rgba(251,247,239,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:12px;}
  .logo{width:34px;height:34px;flex:0 0 34px;}
  .brand b{font-size:17px;font-weight:800;letter-spacing:-.02em;display:block;}
  .brand span{font-size:11.5px;color:var(--muted);}
  .back{border:0;background:none;font-size:17px;color:var(--ink);padding:6px 6px 6px 0;cursor:pointer;font-weight:700;}
  main{padding:18px;}
  h2.greet{font-size:22px;font-weight:800;margin:4px 0 2px;letter-spacing:-.02em;}
  p.lead{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .area{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);
    border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;min-height:var(--tap);}
  .area:active{transform:scale(.99);}
  .chip{width:48px;height:48px;flex:0 0 48px;border-radius:14px;display:flex;align-items:center;
    justify-content:center;color:#fff;font-weight:800;font-size:20px;}
  .area .t b{font-size:19px;font-weight:800;display:block;}.area .t span{font-size:13px;color:var(--muted);}
  .area .cnt{margin-left:auto;text-align:right;font-size:12px;color:var(--muted);}.area .cnt b{display:block;font-size:18px;color:var(--ink);}
  .chev{margin-left:8px;color:var(--muted);font-size:20px;}
  .progress{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px;}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:8px;}
  .bar i{display:block;height:100%;background:var(--celadon);border-radius:99px;}
  .lesson{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--card);
    border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;min-height:var(--tap);}
  .lesson:disabled{opacity:.5;}
  .num{width:38px;height:38px;flex:0 0 38px;border-radius:11px;background:#F3ECDD;display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:16px;}
  .lesson.done .num{background:var(--celadon);color:#fff;}
  .lesson .lt b{font-size:17px;font-weight:700;display:block;}.lesson .lt span{font-size:12.5px;color:var(--muted);}
  .state{margin-left:auto;font-size:20px;}
  .crumbs{font-size:12.5px;color:var(--muted);margin-bottom:6px;}
  h1.title{font-size:23px;font-weight:800;margin:0 0 6px;letter-spacing:-.02em;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .tag{font-size:12px;background:#F3ECDD;color:#6b6052;border-radius:99px;padding:5px 10px;}
  .obj{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:16px;margin-bottom:14px;}
  .stages{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
  .stage{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:99px;padding:9px 15px;
    font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);}
  .stage.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;min-height:200px;}
  .panel h3{margin:0 0 10px;font-size:15px;color:var(--cinnabar);letter-spacing:.02em;}
  ol.steps{margin:0;padding:0;list-style:none;counter-reset:s;}
  ol.steps li{counter-increment:s;position:relative;padding:9px 0 9px 34px;border-bottom:1px solid var(--line);font-size:15.5px;}
  ol.steps li:last-child{border-bottom:0;}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:8px;width:24px;height:24px;background:#F3ECDD;
    border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#6b6052;}
  .blk{padding:10px 0;border-bottom:1px solid var(--line);}.blk:last-child{border-bottom:0;}
  .blk b{display:block;font-size:15.5px;margin-bottom:3px;}.blk span{font-size:14px;color:#6b6052;}
  .ph-note{margin-top:12px;font-size:12.5px;color:var(--muted);}
  .ph-note code{background:#F3ECDD;border-radius:5px;padding:1px 5px;}
  .spair{padding:12px 0;border-bottom:1px solid var(--line);}
  .spair:last-child{border-bottom:0;}
  .stxt{display:flex;gap:11px;align-items:flex-start;font-size:15.5px;}
  .snum{flex:0 0 24px;width:24px;height:24px;margin-top:1px;background:#F3ECDD;border-radius:8px;display:flex;
    align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#6b6052;}
  .simg{margin:10px 0 0 35px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#FCFAF4;}
  .simg img{width:100%;display:block;}
  .dimg{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#FCFAF4;margin-bottom:12px;}
  .dimg img{width:100%;display:block;}
  .aicard{border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:9px;overflow:hidden;cursor:pointer;}
  .aihead{display:flex;align-items:center;gap:12px;padding:13px 14px;}
  .aiemo{font-size:24px;flex:0 0 auto;}
  .aimain{flex:1;}
  .aititle{font-size:16.5px;font-weight:800;color:var(--ink);}
  .aidesc{font-size:13px;color:#7a715c;margin-top:2px;line-height:1.4;}
  .aichev{flex:0 0 auto;color:var(--muted);font-size:15px;}
  .aiex{display:none;padding:0 14px 13px 50px;}
  .aiex.on{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .aiq{font-size:15.5px;font-weight:700;color:var(--cinnabar);line-height:1.5;flex:1;min-width:60%;}
  .lesson.soon{opacity:.92;background:#F6F2FA;border-color:#E2D7EE;}
  .lesson.soon .num{background:#EFE7F7;}
  .soonbadge{background:#8A6FB0;color:#fff;border-radius:9px;padding:2px 9px;font-size:12px;font-weight:800;}
  .soonbox{background:#F3EEF8;border:1px solid #E0D5EC;border-radius:12px;padding:12px 14px;font-size:13.5px;color:#5a4a73;line-height:1.55;margin-bottom:12px;}
  .photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
  .photo{position:relative;aspect-ratio:1;border:1px dashed var(--line);border-radius:10px;overflow:hidden;
    background:#FCFAF4;display:flex;align-items:center;justify-content:center;}
  .photo img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;}
  .photo b{position:absolute;z-index:1;font-size:10.5px;color:var(--muted);padding:6px;text-align:center;line-height:1.3;}
  .cv-wrap{position:relative;height:280px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;}
  .cv-guide{position:absolute;inset:0;opacity:.5;pointer-events:none;}
  .cv-guide svg{width:100%;height:100%;}
  canvas.cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
  .cv-bar{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .pen{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;}
  .pen.on{box-shadow:0 0 0 2px var(--ink);}
  .tbtn{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;font-size:14px;font-weight:700;cursor:pointer;}
  .tbtn.on{background:var(--ink);color:#fff;}
  .svgv{background:linear-gradient(180deg,#10162b,#1b2440);border-radius:14px;overflow:hidden;}
  .svgv.light{background:#FCFAF4;border:1px solid var(--line);}
  .svgv svg{display:block;width:100%;height:auto;}
  .svgv .step{opacity:0;transition:opacity .4s;}
  .svgv .step.on{opacity:1;}
  .svrow{display:flex;gap:8px;margin-top:10px;}
  .svrow button{flex:1;padding:12px;border:1px solid var(--line);background:var(--card);border-radius:12px;
    font-size:15px;font-weight:700;cursor:pointer;min-height:48px;}
  .svrow button.pri{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar);}
  .svlabel{margin-top:10px;font-size:14px;}.svlabel b{color:var(--cinnabar);}
  .kw{display:flex;gap:10px;flex-wrap:wrap;}.kw .w{background:#F3ECDD;border-radius:12px;padding:10px 14px;}
  .kw .w b{font-size:19px;display:block;}.kw .w span{font-size:12px;color:#7a715c;}
  .vsec{margin-bottom:14px;}
  .vt{font-size:11px;font-weight:800;color:#7a715c;letter-spacing:.05em;margin:4px 0 8px;}
  .vrow{display:flex;align-items:center;gap:10px;background:#F8F2E6;border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:7px;}
  .vkr{font-size:18px;font-weight:800;min-width:64px;}
  .vbody{flex:1;}.vrom{font-size:12px;color:var(--cinnabar);font-weight:700;}.ven{font-size:12.5px;color:#6b6052;}
  .vplay{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:none;background:var(--celadon);color:#fff;font-size:13px;cursor:pointer;}
  .vplay.sm{width:26px;height:26px;font-size:11px;vertical-align:middle;}
  .scard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:10px;}
  .slbl{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:var(--cinnabar);border-radius:8px;padding:2px 9px;margin-bottom:8px;}
  .skr{font-size:18px;font-weight:700;line-height:1.5;}.srom{font-size:12.5px;color:var(--celadon);font-weight:700;margin-top:4px;}.sen{font-size:13px;color:#6b6052;margin-top:2px;}
  .ccard{background:#EEF2F6;border-radius:14px;padding:13px 15px;margin-bottom:10px;}
  .clbl{font-size:12px;font-weight:800;color:#3a5a7a;margin-bottom:6px;}.ctxt{font-size:13.5px;line-height:1.6;color:#42463f;}
  .donebtn{display:flex;justify-content:center;align-items:center;margin-top:14px;background:var(--celadon);color:#fff;
    border:0;font-weight:800;font-size:17px;border-radius:16px;padding:16px;width:100%;cursor:pointer;}
  footer{padding:24px 18px 34px;text-align:center;color:var(--muted);font-size:12px;}
</style></head>
<body><div class="app">
  <header>
    <svg class="logo" viewBox="0 0 40 40" aria-hidden="true">

  <main id="main"></main>
  <footer>Meori Art</footer>
</div>

가 왜 다 다른가요?", "큰 네모와 작은 네모를 섞어 균형을 맞췄어요. 한쪽이 무거우면 다른 쪽을 가볍게 해서 전체가 안정돼 보이게 한 거예요."], ["따라 그리기 쉬운가요?", "네, 아주 좋아요. 자를 대고 곧은 선을 긋고 칸을 빨강·파랑·노랑으로 칠하면 돼요. 처음 그리시는 분께 딱 맞습니다."], ["이런 그림이 어디에 쓰였나요?", "옷·가방·건물 디자인에 많이 쓰였어요. 지금도 거리에서 몬드리안 무늬를 자주 볼 수 있답니다."], ["몬드리안은 무엇을 좋아했나요?", "춤과 음악을 좋아했어요. 경쾌한 리듬을 색과 네모의 배치로 표현하려 했지요."], ["이 그림이 왜 중요한가요?", "복잡한 걸 단순하게 줄이는 현대 디자인의 출발점이 된 그림이에요. 단순함 속의 아름다움을 보여줍니다."]]}, {"n": 2, "id": "myeonghwa:vangogh-sunflowers", "title": "고흐 · 해바라기", "diff": "🌱", "obj": "고흐의 «해바라기»을 단계로 따라 그려보자.", "type": "svg", "meta": "고흐 · 네덜란드", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/vangogh-sunflowers/original.jpg", "korean2": {"terms": [["정물", "jeong-mul", "still life"], ["붓터치", "but-teo-chi", "brushstroke"]], "words": [["해바라기", "hae-ba-ra-gi", "sunflower"], ["꽃", "kkot", "flower"], ["노랑", "no-rang", "yellow"], ["꽃병", "kkot-byeong", "vase"]], "sentences": [["해바라기는 노란색입니다.", "Hae-ba-ra-gi-neun no-ran-saek-im-ni-da.", "Sunflowers are yellow."]], "culture": [["🎨 고흐의 해바라기", "고흐는 노란색을 무척 좋아했습니다. 해바라기는 희망과 따뜻함을 담은 그의 대표 그림입니다."]]}, "qna": [["고흐는 왜 해바라기를 그렸나요?", "고흐는 노란색과 햇빛을 무척 사랑했어요. 친구 화가를 맞이하려고 방을 밝은 해바라기 그림으로 꾸미고 싶어 여러 점을 그렸답니다."], ["해바라기는 무슨 뜻인가요?", "해바라기는 해를 따라 도는 꽃이라 희망·감사·따뜻함을 뜻해요. 고흐에게는 기쁨과 우정의 상징이었어요."], ["왜 온통 노란색인가요?", "고흐는 노란색을 '행복의 색'처럼 여겼어요. 꽃병·배경·꽃을 모두 노랑 계열로 칠해 환하고 따뜻한 느낌을 줬지요."], ["이 그림은 언제 그렸나요?", "1888년, 고흐가 프랑스 남쪽 아를이라는 햇빛 좋은 마을에 살 때 그렸어요."], ["해바라기 그림이 여러 개인가요?", "네, 고흐는 해바라기를 여러 점 그렸어요. 세계 여러 미술관에 나뉘어 걸려 있답니다."], ["붓 자국이 왜 이렇게 두꺼운가요?", "고흐는 물감을 두껍게 발라 꽃잎이 도톰하게 살아 있는 것처럼 표현했어요. 가까이 보면 울퉁불퉁한 결이 보여요."], ["시든 꽃도 같이 그렸나요?", "네, 활짝 핀 꽃과 고개 숙인 꽃을 함께 그렸어요. 피고 지는 자연의 모습을 솔직하게 담은 거예요."], ["나도 그릴 수 있을까요?", "그럼요. 동그란 가운데를 그리고 꽃잎을 빙 둘러 그린 뒤 노랑으로 칠하면 돼요. 색칠만 해도 환해집니다."], ["고흐는 어떤 사람이었나요?", "마음이 여리고 그림을 사랑한 화가였어요. 살아서는 인정받지 못했지만 지금은 온 세상이 사랑한답니다."], ["이 그림이 왜 유명한가요?", "보기만 해도 마음이 환해지는 따뜻함 때문이에요. 고흐의 희망이 담겨 있어 많은 사람이 좋아합니다."]], "svgViewer": "<svg viewBox=\"0 0 360 460\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><path d= 칠하고 주황 동그라미로 해를 그리면 분위기가 살아나요."], ["이 그림이 왜 중요한가요?", "보이는 대로가 아니라 느낀 대로 그리는 새 길을 열었어요. 모네가 미술의 흐름을 바꾼 그림입니다."]]}, {"n": 4, "id": "myeonghwa:vangogh-starry-night", "title": "고흐 · 별이 빛나는 밤", "diff": "🌱", "obj": "고흐의 «별이 빛나는 밤»을 단계로 따라 그려보자.", "type": "svg", "meta": "고흐 · 네덜란드", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/vangogh-starry-night/original.jpg", "svgViewer": "<svg viewBox=\"0 0 360 600\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><path d=\"M 0 488 C 70 470, 130 500, 200 482 C 270 466, 320 492, 360 478\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"2\"><g fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linejoin=\"round\"><rect x=\"150\" y=\"452\" width=\"26\" height=\"26\"/><path d=\"M147 452 L163 440 L179 452\"/><rect x=\"184\" y=\"458\" width=\"22\" height=\"22\"/><path d=\"M181 458 L195 448 L209 458\"/><rect x=\"214\" y=\"454\" width=\"24\" height=\"24\"/><path d=\"M211 454 L226 443 L241 454\"/><rect x=\"126\" y=\"460\" width=\"20\" height=\"20\"/><path d=\"M123 460 L136 450 L149 460\"/></g></g><g class=\"step\" data-step=\"3\"><g fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.2\" stroke-linejoin=\"round\"><rect x=\"196\" y=\"404\" width=\"16\" height=\"54\"/><path d=\"M196 404 L204 372 L212 404\"/><path d=\"M204 372 L204 360\"/></g></g><g class=\"step\" data-step=\"4\"><path d=\"M70 560 C 52 500, 92 470, 66 420 C 44 380, 96 350, 70 300 C 50 260, 98 230, 74 180 C 58 150, 86 130, 74 110 C 96 132, 92 162, 100 190 C 118 232, 86 262, 104 300 C 124 344, 92 374, 108 416 C 126 458, 96 498, 96 560 Z\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"5\"><path d=\"M150 210 C 120 190, 130 150, 170 152 C 214 154, 224 200, 196 226 C 162 258, 110 240, 104 196 C 98 146, 144 112, 196 124\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.2\" stroke-linecap=\"round\"/></g><g class=\"step\ troke=\"#c3bcae\" stroke-width=\"1.6\"/><circle cx=\"132\" cy=\"140\" r=\"9.0\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"2\"/><circle cx=\"132\" cy=\"140\" r=\"4.0\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"1.6\"/><circle cx=\"250\" cy=\"150\" r=\"10.0\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"2\"/><circle cx=\"250\" cy=\"150\" r=\"4.5\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"1.6\"/><circle cx=\"300\" cy=\"210\" r=\"8.0\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"2\"/><circle cx=\"300\" cy=\"210\" r=\"3.6\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"1.6\"/><circle cx=\"40\" cy=\"250\" r=\"8.0\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"2\"/><circle cx=\"40\" cy=\"250\" r=\"3.6\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"1.6\"/><circle cx=\"232\" cy=\"96\" r=\"7.0\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"2\"/><circle cx=\"232\" cy=\"96\" r=\"3.1\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"1.6\"/><circle cx=\"170\" cy=\"70\" r=\"7.0\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"2\"/><circle cx=\"170\" cy=\"70\" r=\"3.1\" fill=\"none\" stroke=\"#c3bcae\" stroke-width=\"1.6\"/></g></g></svg>", "svgSteps": [{"title": "언덕 지평선 긋기", "tip": "그림 아래쪽에 부드러운 언덕 선을 좌우로 길게 긋는다."}, {"title": "마을 집 그리기", "tip": "언덕 위에 작은 네모 집들을 옹기종기 그린다. 지붕은 세모로."}, {"title": "교회 첨탑 세우기", "tip": "마을 가운데에 길고 뾰족한 교회 첨탑을 하늘로 올린다."}, {"title": "사이프러스 나무", "tip": "왼쪽에 불꽃처럼 굽이치는 큰 사이프러스 나무를 위아래로 길게 그린다."}, {"title": "하늘의 큰 소용돌이", "tip": "하늘 한가운데에 둥글게 말려드는 큰 소용돌이를 그린다."}, {"title": "흐르는 바람 결", "tip": "소용돌이 옆으로 물결치는 바람 선을 길게 이어 그린다."}, {"title": "오른쪽 위 달", "tip": "오른쪽 위 구석에 둥근 달을 그리고, 둘레에 빛 테를 두른다."}, {"title": "별을 흩뿌리고 마무리", "tip": "하늘 곳곳에 동그란 별을 흩뿌리듯 그려 넣어 완성한다."}], "korean2": {"terms": [["소용돌이", "so-yong-do-ri", "swirl — 반 고흐의 특징적 표현"], ["붓터치", "but-teo-chi", "brushstroke — 붓으로 그은 자국"], ["명암", "myeong-am", "light and shadow"], ["원근법", "won-geun-beop", "perspective"], ["유화", "yu-hwa", "oil painting"]], "words": [["별", "byeol", "star"], ["밤", "bam", "night"], ["하늘", "ha-neul", "sky"], ["달", "dal", "moon"], ["마을", "ma-eul", "village"], ["나무", "na-mu", "tree"]], "sentences": [["별이 빛나는 밤입니다.", "Byeol-i bit-na-neun bam-im-ni-da.", "It is a starry night."], ["반 고흐는 별을 소용돌이로 그렸습니다.", "Ban Go-heu-neun byeol-eul so-yong-do-ri-ro geu-ryeot-seum-ni-da.", "Van Gogh painted the stars as swirls."]], "culture": [["🎨 반 고흐와 별이 빛나는 밤", "반 고흐는 1889년 프랑스 생레미 병원에 입원 중 이 그림을 그렸습니다. 창문으로 본 밤하늘을 상상과 감정으로 표현했고, 지금은 뉴욕 현대미술관에 있습니다."], ["🇰🇷 한국어로 반 고흐 읽기", "영어로는 Van Gogh이지만 한국어로는 '반 고흐'라고 읽습니다. '별빛(byeol-bit)'은 starlight라는 뜻입니다."]]}, "qna": [["고흐는 어떤 사람이었나요?", "고흐는 백여 년 전 네덜란드에서 태어난 화가예요. 마음이 여리고 그림을 무척 사랑했지요. 살아서는 그림을 거의 못 팔았지만, 지금은 온 세상이 사랑하는 화가가 되었어요."], ["왜 별을 소용돌이로 그렸나요?", "고흐는 눈에 보이는 대로가 아니라 마음에 느껴지는 대로 그렸어요. 밤하늘이 살아 움직이는 것처럼 느껴져서 별빛을 빙글빙글 소용돌이로 그렸답니다."], ["이 그림은 언제, 어디서 그렸나요?", "1889년, 고흐가 프랑스의 한 요양원에 있을 때 그렸어요. 방 창문으로 보이는 밤하늘을 기억과 상상으로 그린 그림이에요."], ["그림 속 큰 나무는 무엇인가요?", "앞쪽에 검고 길게 솟은 나무는 '사이프러스'라는 나무예요. 고흐는 이 나무를 하늘과 땅을 잇는 것처럼 그렸어요."], ["왜 파란색과 노란색을 많이 썼나요?", "고흐는 노란색을 특히 좋아했어요. 깊고 푸른 밤에 노란 별빛과 달빛이 더 따뜻하고 환하게 보이도록 두 색을 나란히 썼답니다."], ["이 그림은 지금 어디에 있나요?", "미국 뉴욕의 '현대미술관(MoMA)'에 있어요. 세계에서 가장 유명한 그림 중 하나라, 보러 오는 사람이 아주 많아요."], ["마을은 진짜 있는 곳인가요?", "아래 작은 마을과 교회는 실제 마을을 그대로 그린 건 아니에요. 고흐가 고향을 떠올리며 마음속 풍경을 더해 그린 거예요."], ["고흐는 그림을 몇 점이나 그렸나요?", "고흐는 10년 동안 800점이 넘는 그림을 그렸어요. 짧은 시간에 정말 부지런히 그렸지요."], ["나도 이렇게 그릴 수 있을까요?", "그럼요. 소용돌이는 동그라미를 빙글빙글 이어 그리면 돼요. 잘 그리는 게 중요한 게 아니라, 느낌대로 그리는 게 고흐의 방식이에요."], ["별이 빛나는 밤은 왜 유명한가요?", "밤하늘을 이렇게 마음으로 그린 그림은 그전에 없었어요. 보는 사람마다 마음이 움직여서, 노래와 영화에도 나올 만큼 사랑받는답니다."]]}, {"n": 5, "id": "myeonghwa:cezanne-apples", "title": "세잔 · 사과가 있는 정물", "diff": "🌱", "obj": "세잔의 «사과가 있는 정물»을 단계로 따라 그려보자.", "type": "svg", "meta": "세잔 · 프랑스", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/cezanne-apples/original.jpg", "svgViewer": "<svg viewBox=\"0 0 400 320\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"0\" y1=\"210\" x2=\"400\" y2=\"210\" stroke=\"#f3ead4\" stroke-width troke-linejoin=\"round\"/><path d=\"M30 280 C 90 270,150 292,220 280\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g ><circle cx=\"150\" cy=\"180\" r=\"40\" fill=\"#9aa0b8\" fill-opacity=\"0.25\" stroke=\"none\" stroke-width=\"0\"/><circle cx=\"225\" cy=\"190\" r=\"36\" fill=\"#9aa0b8\" fill-opacity=\"0.25\" stroke=\"none\" stroke-width=\"0\"/><circle cx=\"285\" cy=\"172\" r=\"32\" fill=\"#9aa0b8\" fill-opacity=\"0.25\" stroke=\"none\" stroke-width=\"0\"/></g></svg>", "svgSteps": [{"title": "탁자 선", "tip": "화면을 가로지르는 탁자 모서리 선을 긋는다."}, {"title": "첫 사과", "tip": "둥근 사과 하나를 그린다."}, {"title": "사과 더 그리기", "tip": "곁에 사과 두어 개를 겹치게 그린다."}, {"title": "접시 타원", "tip": "사과 아래 납작한 접시를 타원으로 그린다."}, {"title": "천 주름", "tip": "탁자 위 천의 주름을 몇 개의 선으로 그린다."}, {"title": "빨강 물들이기", "tip": "사과를 발갛게 물들여 완성."}], "korean2": {"terms": [["정물", "jeong-mul", "still life"], ["형태", "hyeong-tae", "form"]], "words": [["사과", "sa-gwa", "apple"], ["과일", "gwa-il", "fruit"], ["탁자", "tak-ja", "table"], ["빨강", "ppal-gang", "red"]], "sentences": [["탁자 위에 사과가 있습니다.", "Tak-ja wi-e sa-gwa-ga it-seum-ni-da.", "There are apples on the table."]], "culture": [["🎨 세잔의 사과", "세잔은 사과 하나도 여러 방향에서 보고 그렸습니다. 현대 미술의 문을 연 화가로 불립니다."]]}, "qna": [["세잔은 왜 사과를 자주 그렸나요?", "세잔은 흔한 사과 하나도 깊이 들여다보며 형태를 연구했어요. '사과로 세상을 놀라게 하겠다'고 할 만큼 진지했지요."], ["사과가 조금 삐뚤어 보여요.", "세잔은 한 방향이 아니라 여러 방향에서 본 모습을 한 그림에 담았어요. 그래서 살짝 어긋나 보이지만 더 단단해 보입니다."], ["이건 무슨 그림인가요?", "탁자 위 과일·그릇을 그린 '정물화'예요. 움직이지 않는 사물을 차분히 관찰해 그리는 그림이지요."], ["세잔은 어떤 화가였나요?", "프랑스의 화가로, 형태를 단순한 덩어리로 보고 그렸어요. 그래서 '현대 미술의 아버지'라 불려요."], ["왜 색을 면으로 칠했나요?", "붓을 넓게 써서 색을 면처럼 쌓았어요. 그러면 사과가 둥근 덩어리로 단단하게 느껴진답니다."], ["탁자보의 주름도 정성스러워요.", "네, 세잔은 천의 주름도 사과만큼 중요하게 그렸어요. 모든 것이 짜임새 있게 어울리도록요."], ["이 그림은 언제 그렸나요?", "백여 년 전, 1890년대 무렵에 그렸어요."], ["나도 그릴 수 있을까요?", "그럼요. 둥근 사과 몇 개를 그리고 빨강·노랑·초록을 면으로 칠하면 세잔 느낌이 나요."], ["왜 유명한가요?", "사물을 단순한 형태로 보는 그의 방식이 이후 피카소 같은 화가들에게 큰 영향을 줬어요."], ["무엇을 느끼면 되나요?", "화려하지 않아도 차분하고 단단한 아름다움이 있어요. 천천히 들여다보는 맛이 있는 그림입니다."]]}, {"n": 6, "id": "myeonghwa:klimt-the-kiss", "title": "클림트 · 키스", "diff": "🌱", "obj": "클림트의 «키스»을 단계로 따라 그려보자.", "type": "svg", "meta": "클림트 · 오스트리아", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/klimt-the-kiss/original.jpg", "korean2": {"terms": [["황금빛", "hwang-geum-bit", "golden"], ["장식", "jang-sik", "ornament"]], "words": [["사랑", "sa-rang", "love"], ["황금", "hwang-geum", "gold"], ["입맞춤", "ip-mat-chum", "kiss"], ["꽃", "kkot", "flower"]], "sentences": [["두 사람이 사랑합니다.", "Du sa-ram-i sa-rang-ham-ni-da.", "The two people love each other."]], "culture": [["🎨 클림트의 키스", "금박을 붙여 반짝이게 그린 그림입니다. 사랑과 황홀함을 황금빛으로 표현했습니다."]]}, "qna": [["이 그림은 무엇을 그린 건가요?", "두 사람이 사랑을 담아 입을 맞추는 순간이에요. 온통 황금빛이라 더없이 따뜻하고 황홀해 보이지요."], ["왜 금색으로 빛나나요?", "클림트는 진짜 금박을 붙여 그렸어요. 그래서 그림이 보석처럼 반짝이고 귀하게 느껴진답니다."], ["꽃밭에 앉아 있나요?", "네, 두 사람이 꽃이 가득한 풀밭 끝에 앉아 있어요. 사랑이 활짝 피어난 모습 같지요."], ["남자와 여자 무늬가 달라요.", "남자 옷엔 곧은 네모 무늬, 여자 옷엔 둥근 꽃무늬가 있어요. 서로 다른 둘이 하나로 안긴 모습을 표현했어요."], ["클림트는 어떤 화가였나요?", "오스트리아 빈의 화가로, 화려한 장식과 금빛을 즐겨 썼어요. 사랑과 아름다움을 황금빛으로 그렸지요."], ["이 그림은 언제 그렸나요?", "1907년 무렵에 그렸어요. '클림트의 황금시대' 대표작이에요."], ["이 그림은 지금 어디에 있나요?", "오스트리아 빈의 벨베데레 미술관에 있어요. 보러 오는 사람이 아주 많답니다."], ["무슨 느낌을 담았나요?", "사랑하는 사람을 꼭 안았을 때의 포근함과 황홀함이에요. 보면 마음이 따뜻해져요."], ["나도 그릴 수 있을까요?", "네. 두 사람을 안은 모습으로 그리고 금색·노랑으로 칠한 뒤 동그란 꽃무늬를 더하면 화사해져요."], ["왜 유명한가요?", "사랑을 이렇게 아름답고 화려하게 그린 그림은 드물어요. 그래서 세계인이 가장 사랑하는 그림 중 하나예요."]], "svgViewer": "<svg viewBox=\"0 0 360 460\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><ellipse cx=\"180\" cy=\"220\" rx=\"118\" ry=\"180\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><circle cx=\"158\" cy=\"118\" r=\"30\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"206\" cy=\"150\" r=\"26\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class "300\" y=\"92\" width=\"70\" height=\"40\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M96 176 C 78 240 78 300 90 344 L210 344 C 214 300 210 240 200 178\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><line x1=\"24\" y1=\"60\" x2=\"24\" y2=\"300\" stroke=\"#9aa0b8\" stroke-width=\"1.6\" stroke-linecap=\"round\"/><line x1=\"48\" y1=\"60\" x2=\"48\" y2=\"300\" stroke=\"#9aa0b8\" stroke-width=\"1.6\" stroke-linecap=\"round\"/><line x1=\"72\" y1=\"60\" x2=\"72\" y2=\"300\" stroke=\"#9aa0b8\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></g></svg>"}, {"n": 8, "id": "myeonghwa:munch-the-scream", "title": "뭉크 · 절규", "diff": "🌱", "obj": "뭉크의 «절규»을 단계로 따라 그려보자.", "type": "svg", "meta": "뭉크 · 노르웨이", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/munch-the-scream/original.jpg", "korean2": {"terms": [["감정", "gam-jeong", "emotion"], ["곡선", "gok-seon", "curved line"]], "words": [["하늘", "ha-neul", "sky"], ["다리", "da-ri", "bridge"], ["빨강", "ppal-gang", "red"], ["얼굴", "eol-gul", "face"]], "sentences": [["하늘이 붉습니다.", "Ha-neul-i bul-geum-ni-da.", "The sky is red."]], "culture": [["🎨 뭉크의 절규", "뭉크는 마음속 불안을 붉은 하늘과 굽이치는 선으로 표현했습니다. 감정을 그림으로 보여준 화가입니다."]]}, "qna": [["이 그림은 무엇을 그린 건가요?", "다리 위에서 한 사람이 두 손으로 얼굴을 감싸며 놀란 모습이에요. 마음속 불안을 그림으로 보여준 거예요."], ["왜 하늘이 붉은가요?", "뭉크가 본 핏빛처럼 붉은 노을을 그렸어요. 불안한 마음을 강렬한 붉은 하늘로 표현한 거예요."], ["선이 왜 구불구불한가요?", "하늘과 물이 굽이치는 곡선으로 흔들려요. 마음이 어지럽고 불안한 느낌을 선으로 나타낸 거예요."], ["뭉크는 어떤 화가였나요?", "노르웨이의 화가로, 사람의 슬픔·불안 같은 속마음을 솔직하게 그렸어요."], ["무섭기도 하고 슬프기도 해요.", "맞아요. 누구나 한 번쯤 느끼는 불안을 그려서, 보면 '나도 저럴 때가 있지' 하고 공감하게 돼요."], ["이 그림은 언제 그렸나요?", "1893년에 그렸어요. 백여 년 전 그림이지만 지금도 마음에 와닿지요."], ["뒤의 두 사람은 누구인가요?", "다리 위를 지나가는 사람들이에요. 주인공의 불안과 달리 무심히 걸어가고 있어요."], ["무엇을 느끼면 되나요?", "불안한 마음도 솔직하게 드러내도 괜찮다는 거예요. 감정을 그림으로 푼 용감한 작품이지요."], ["나도 그릴 수 있을까요?", "네. 놀란 얼굴을 단순하게 그리고 하늘을 붉게, 선을 물결처럼 그으면 분위기가 살아나요."], ["왜 이렇게 유명한가요?", "사람의 속마음을 이토록 강하게 그린 그림은 드물어요. 그래서 세계에서 가장 잘 알려진 그림 중 하나예요."]], "svgViewer": "<svg viewBox=\"0 0 360 460\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"20\" y1=\"150\" x2=\"300\" y2=\"330\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><line x1=\"20\" y1=\"180\" x2=\"300\" y2=\"360\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M150 150 C 120 200 132 250 120 300 C 112 340 130 380 150 410 C 176 384 186 344 180 300 C 174 250 188 200 162 156\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><ellipse cx=\"152\" cy=\"150\" rx=\"34\" ry=\"44\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"4\"><ellipse cx=\"138\" cy=\"142\" rx=\"7\" ry=\"10\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><ellipse cx=\"168\" cy=\"146\" rx=\"7\" ry=\"10\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><ellipse cx=\"152\" cy=\"178\" rx=\"11\" ry=\"18\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"5\"><path d=\"M10 60 Q 110 44 210 60 T 350 48\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M10 90 Q 110 74 210 90 T 350 78\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M10 120 Q 110 104 210 120 T 350 108\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"6\"><path d=\"M0 0 H360 V150 Q 180 130 0 150 Z\" fill=\"# roke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g></svg>"}, {"n": 9, "id": "myeonghwa:gauguin-tahiti", "title": "고갱 · 타히티의 여인들", "diff": "🌱", "obj": "고갱의 «타히티의 여인들»을 단계로 따라 그려보자.", "type": "svg", "meta": "고갱 · 프랑스", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/gauguin-tahiti/original.jpg", "korean2": {"terms": [["색채", "saek-chae", "color"], ["원시", "won-si", "primitive"]], "words": [["여인", "yeo-in", "woman"], ["섬", "seom", "island"], ["바다", "ba-da", "sea"], ["꽃", "kkot", "flower"]], "sentences": [["여인들이 바닷가에 있습니다.", "Yeo-in-deul-i ba-dat-ga-e it-seum-ni-da.", "The women are by the sea."]], "culture": [["🎨 고갱과 타히티", "고갱은 남태평양 타히티 섬에서 밝고 강한 색으로 사람들을 그렸습니다."]]}, "qna": [["이 그림은 무엇을 그린 건가요?", "남태평양 타히티 섬의 여인들 모습이에요. 따뜻한 바닷가에서 살아가는 사람들을 그렸지요."], ["고갱은 왜 타히티로 갔나요?", "복잡한 도시를 떠나 자연 그대로의 삶을 그리고 싶어 했어요. 그래서 멀리 타히티 섬까지 갔답니다."], ["색이 참 강렬해요.", "고갱은 보이는 색보다 더 진하고 선명한 색을 썼어요. 주황·분홍·초록이 강해서 그림이 또렷하고 힘있게 보여요."], ["고갱은 어떤 화가였나요?", "프랑스의 화가로, 고흐와 친구였어요. 단순한 형태와 강한 색으로 자기만의 그림을 그렸지요."], ["이 그림은 언제 그렸나요?", "1891년 무렵, 고갱이 타히티에 막 도착했을 때 그렸어요."], ["사람들이 차분해 보여요.", "네, 화려한 색과 달리 사람들의 표정은 고요해요. 자연 속의 평온한 삶을 담으려 한 거예요."], ["배경이 단순해요.", "고갱은 자잘한 묘사를 줄이고 색면을 넓게 칠했어요. 그래서 그림이 단순하면서도 시원합니다."], ["무엇을 느끼면 되나요?", "먼 남쪽 섬의 따뜻하고 느긋한 분위기예요. 보면 잠시 쉬어가는 기분이 들어요."], ["나도 그릴 수 있을까요?", "네. 사람을 단순하게 그리고 주황·초록 같은 진한 색을 넓게 칠해 보세요."], ["왜 중요한가요?", "강한 색과 단순한 형태로 그리는 새 길을 열어, 뒤의 많은 화가에게 영향을 줬어요."]], "svgViewer": "<svg viewBox=\"0 0 420 340\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"10\" y1=\"244\" x2=\"410\" y2=\"244\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M96 244 C 92 196 116 172 150 172 C 184 172 206 196 204 244 Z\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M230 244 C 228 200 250 178 282 178 C 314 178 334 200 332 244 Z\" fill=\"none\" gGuide": "<svg viewBox=\"0 0 420 340\" xmlns=\"http://www.w3.org/2000/svg\"><g><line x1=\"10\" y1=\"244\" x2=\"410\" y2=\"244\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M96 244 C 92 196 116 172 150 172 C 184 172 206 196 204 244 Z\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M230 244 C 228 200 250 178 282 178 C 314 178 334 200 332 244 Z\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"150\" cy=\"150\" r=\"22\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"282\" cy=\"156\" r=\"20\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M150 128 q18 8 14 30\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M282 136 q16 8 12 28\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M104 210 q46 14 92 0\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M236 214 q46 12 90 0\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M20 150 Q 70 110 60 60 Q 40 110 20 150 Z\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M392 150 Q 350 108 366 56 Q 388 108 392 150 Z\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g></svg>"}, {"n": 10, "id": "myeonghwa:seurat-grande-jatte", "title": "쇠라 · 그랑드자트섬의 일요일 오후", "diff": "🌱", "obj": "쇠라의 «그랑드자트섬의 일요일 오후»을 단계로 따라 그려보자.", "type": "svg", "meta": "쇠라 · 프랑스", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/seurat-grande-jatte/original.jpg", "korean2": {"terms": [["점묘법", "jeom-myo-beop", "pointillism — 점으로 그리기"], ["공원", "gong-won", "park"]], "words": [["점", "jeom", "dot"], ["나무", "na-mu", "tree"], ["사람", "sa-ram", "people"], ["양산", "yang-san", "parasol"]], "sentences": [["사람들이 공원에서 쉽니다.", "Sa-ram-deul-i gong-won-e-seo swim-ni-da.", "People rest in the park."]], "culture": [["🎨 쇠라의 점묘법", "쇠라는 작은 점을 수없이 찍어 그림을 완성했습니다. 멀리서 보면 색이 섞여 보입니다."]]}, "qna": [["이 그림은 무엇을 그린 건가요?", "강가 공원에서 사람들이 햇살을 즐기며 쉬는 일요일 오후예요. 산책하고 양산 쓰고 한가로이 노니는 모습이지요."], ["가까이 보면 점이 가득해요.", "맞아요. 쇠라는 붓으로 작은 점을 수없이 찍어 그렸어요. 이걸 '점묘법'이라고 해요."], ["왜 점으로 그렸나요?", "작은 색점을 나란히 찍으면 멀리서 볼 때 눈 안에서 색이 섞여 더 반짝여 보여요. 빛을 표현하는 방법이었지요."], ["쇠라는 어떤 화가였나요?", "프랑스의 화가로, 과학처럼 꼼꼼하게 색과 점을 연구해 그렸어요. 아주 차분하고 계획적인 화가였지요."], ["이 큰 그림을 얼마나 걸려 그렸나요?", "2년 넘게 걸려 그렸어요. 점을 하나하나 찍어야 했으니 정말 끈기가 필요했지요."], ["이 그림은 언제 그렸나요?", "1884년부터 1886년 사이에 그렸어요."], ["사람들이 멈춰 있는 것 같아요.", "네, 모두 조용히 멈춘 듯 차분해요. 평화로운 일요일의 고요함이 느껴지지요."], ["이 그림은 지금 어디에 있나요?", "미국 시카고 미술관에 있어요. 아주 큰 그림이라 직접 보면 웅장하답니다."], ["나도 그릴 수 있을까요?", "네. 색연필이나 사인펜으로 점을 콕콕 찍어 채워 보세요. 시간은 걸려도 누구나 할 수 있어요."], ["왜 유명한가요?", "점만으로 이렇게 큰 그림을 완성한 끈기와 새로운 방법 때문이에요. 미술 역사에 남은 작품이지요."]], "svgViewer": "<svg viewBox=\"0 0 420 340\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"10\" y1=\"180\" x2=\"410\" y2=\"180\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><line x1=\"330\" y1=\"40\" x2=\"330\" y2=\"200\" stroke=\"#f3ead4\" stroke-width=\"6\" stroke-linecap=\"round\"/><path d=\"M330 60 q-40 -20 -70 -6 M330 90 q44 -16 72 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><path d=\"M150 320 C 146 250 158 214 178 214 C 198 214 210 250 206 320 Z\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M150 196 q28 -22 56 0 Z  표정과 눈빛이 모나리자처럼 묘하다고 해서예요. 보는 사람마다 다른 마음을 느낀답니다."], ["배경이 왜 까만가요?", "어두운 배경 덕분에 소녀의 얼굴과 진주가 더 환하게 도드라져 보여요. 베르메르가 빛을 잘 쓴 거예요."], ["베르메르는 어떤 화가였나요?", "네덜란드의 화가로, 조용한 실내와 부드러운 빛을 즐겨 그렸어요. 작품 수는 적지만 하나하나 아주 정교해요."], ["진주가 진짜처럼 빛나요.", "사실은 흰 점 몇 번으로 빛을 콕 찍어 표현했어요. 가까이 보면 단순한데 멀리서 보면 진주처럼 반짝이지요."], ["머리에 두른 건 무엇인가요?", "파랑·노랑 천으로 만든 두건이에요. 그 시절 이국적인 멋을 낸 차림이지요."], ["이 그림은 언제 그렸나요?", "약 1665년, 360년쯤 전에 그렸어요."], ["이 그림은 지금 어디에 있나요?", "네덜란드 헤이그의 마우리츠하위스 미술관에 있어요."], ["나도 그릴 수 있을까요?", "네. 옆을 보다 돌아본 얼굴을 그리고 배경을 어둡게 한 뒤 귀에 흰 점으로 진주를 찍어 보세요."], ["왜 사랑받나요?", "말을 걸 듯한 눈빛과 고요한 아름다움 때문이에요. 영화로도 만들어질 만큼 사랑받는 그림이지요."]], "svgViewer": "<svg viewBox=\"0 0 360 420\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><ellipse cx=\"180\" cy=\"170\" rx=\"74\" ry=\"92\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M112 132 C 120 90 240 90 250 140 C 256 176 248 196 236 214\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M236 214 C 252 230 256 252 246 270\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><path d=\"M150 162 q12 -8 24 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M196 168 q10 -6 20 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M182 176 q-2 22 -8 30\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M168 214 q14 8 28 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"4\"><path d=\"M96 286 C 130 250 150 252 176 262 C 210 250 250 266 288 300 L288 420 L96 420 Z\" fill=\"none\" stroke=\"#f3ead4\" stro  q14 8 28 0\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M96 286 C 130 250 150 252 176 262 C 210 250 250 266 288 300 L288 420 L96 420 Z\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"208\" cy=\"222\" r=\"9\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g></svg>"}, {"n": 12, "id": "myeonghwa:rembrandt-night-watch", "title": "렘브란트 · 야경", "diff": "🌱", "obj": "렘브란트의 «야경»을 단계로 따라 그려보자.", "type": "svg", "meta": "렘브란트 · 네덜란드", "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "myeonghwa/rembrandt-night-watch/original.jpg", "korean2": {"terms": [["명암", "myeong-am", "light and shadow"], ["인물", "in-mul", "figure"]], "words": [["밤", "bam", "night"], ["빛", "bit", "light"], ["그림자", "geu-rim-ja", "shadow"], ["사람들", "sa-ram-deul", "people"]], "sentences": [["사람들이 모여 있습니다.", "Sa-ram-deul-i mo-yeo it-seum-ni-da.", "The people are gathered."]], "culture": [["🎨 렘브란트의 빛과 그림자", "렘브란트는 빛과 그림자를 극적으로 써서 인물을 살아 있는 듯 그렸습니다."]]}, "qna": [["이 그림은 무엇을 그린 건가요?", "마을을 지키는 사람들(자경대)이 줄지어 나서는 모습이에요. 여러 사람이 함께 등장하는 큰 단체 그림이지요."], ["왜 어둡고 일부만 환한가요?", "렘브란트는 빛과 그림자를 극적으로 썼어요. 중요한 사람에게 빛을 모아 무대 위 주인공처럼 보이게 했지요."], ["정말 '밤'을 그린 건가요?", "사실은 낮 장면이에요. 오랜 세월 칠이 어두워져 밤처럼 보이게 된 거라 '야경'이라는 이름이 붙었어요."], ["렘브란트는 어떤 화가였나요?", "네덜란드의 화가로, 빛과 그림자를 가장 잘 다룬 사람으로 꼽혀요. 인물을 살아 있는 듯 그렸지요."], ["사람이 참 많아요.", "네, 여러 사람이 저마다 다른 자세로 움직여요. 멈춘 단체 사진이 아니라 막 움직이기 시작한 순간 같지요."], ["이 그림은 언제 그렸나요?", "1642년, 약 380년 전에 그렸어요. 아주 오래된 그림이랍니다."], ["이 그림은 지금 어디에 있나요?", "네덜란드 암스테르담의 국립미술관에 있어요. 벽 하나를 가득 채울 만큼 큰 그림이에요."], ["가운데 밝은 소녀는 누구인가요?", "환하게 빛나는 소녀가 그림의 숨은 주인공처럼 눈길을 끌어요. 무리 속에서 빛으로 강조된 거예요."], ["무엇을 느끼면 되나요?", "빛이 어떻게 그림을 살아 움직이게 하는지 느껴 보세요. 어둠 속의 빛이 참 극적이에요."], ["왜 유명한가요?", "단체 그림을 이렇게 생생하고 극적으로 그린 건 처음이었어요. 그래서 미술 역사에 길이 남았답니다."]], "svgViewer": "<svg viewBox=\"0 0 440 360\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\
