\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"300\" cy=\"130\" r=\"12\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"330\" cy=\"150\" r=\"11\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"360\" cy=\"134\" r=\"12\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"96\" cy=\"150\" r=\"11\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"70\" cy=\"168\" r=\"10\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><line x1=\"120\" y1=\"200\" x2=\"136\" y2=\"60\" stroke=\"#9aa0b8\" stroke-width=\"2\"/><line x1=\"250\" y1=\"200\" x2=\"266\" y2=\"60\" stroke=\"#9aa0b8\" stroke-width=\"2\"/><line x1=\"300\" y1=\"200\" x2=\"316\" y2=\"60\" stroke=\"#9aa0b8\" stroke-width=\"2\"/><line x1=\"380\" y1=\"200\" x2=\"396\" y2=\"60\" stroke=\"#9aa0b8\" stroke-width=\"2\"/><path d=\"M168 210 q60 -16 120 0 L300 326 L156 326 Z\" fill=\"none\" stroke=\"#9aa0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g></svg>"}]}, {"key": "minhwa", "name": "민화", "sub": "한국 전통", "initial": "민", "color": "#C8453B", "stages": ["보기", "순서", "따라하기", "창작", "한국어", "AI"], "lessons": [{"n": 1, "id": "minhwa:004-tokki", "title": "토끼", "diff": "🌱", "obj": "토끼를 그리며 다산과 장수의 상징을 배워보자.", "type": "color", "meta": "상징: 다산 · 부부애 · 장수", "steps": ["채본을 한다.", "나무는 적대자로, 잎은 녹청·녹청+황토로 칠한다. 땅은 황토로 칠한다.", "절구통은 본남으로 칠한다.", "절구통 위는 적+호분(분홍)으로, 아래 레이스는 적으로 칠한다.", "토끼의 입·등·털 위쪽은 호분으로 얇게 칠한다.", "한 토끼는 군청+호분, 다른 토끼는 적+호분으로 칠하고, 호분 털에 반대로 바림한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/004-tokki/", "count": 4}, "korean2": {"words": [["토끼", "to-kki", "rabbit"], ["달", "dal", "moon"], ["풀", "pul", "grass"]], "sentences": [["토끼가 풀을 먹습니다.", "To-kki-ga pul-eul meok-seum-ni-da.", "The rabbit eats grass."]], "culture": [["🐰 토끼의 뜻", "민화에서 토끼는 장수와 지혜, 그리고 자손이 번창함을 뜻합니다."]]}, "qna": [["민화에서 토끼는 무슨 뜻인가요?", "토끼는 오래 사는 장수와 슬기로운 지혜, 그리고 새끼를 많이 치니 자손 번창을 뜻해요. 옛 어른들이 무척 좋아한 동물이지요."], ["토끼와 달은 왜 같이 그리나요?", "옛이야기에 달 속에서 토끼가 방아를 찧는다고 했어요. 그래서 토끼와 달을 함께 그려 장수를 빌었답니다."], ["토끼 그림은 어디에 걸었나요?", "주로 안방이나 아이 방에 걸었어요. 가족이 건강하게 오래 살고 자손이 늘기를 바라는 마음이었지요."], ["민화가 무엇인가요?", "옛날 보통 사람들이 복을 빌며 그린 그림이에요. 솜씨를 뽐내기보다 좋은 뜻을 담는 게 더 중요했지요."], ["토끼를 그릴 때 무엇을 강조하나요?", "긴 귀와 동그란 눈, 도톰한 몸이 귀여움의 핵심이에요. 부드러운 곡선으로 그리면 더 정겹습니다."], ["풀이나 약초도 같이 그리나요?", "네, 불로초 같은 약초와 함께 그리기도 해요. 오래오래 건강하라는 뜻을 더한 거예요."], ["색은 어떻게 칠하나요?", "토끼는 보통 흰색이나 옅은 색으로 곱게 칠해요. 깨끗하고 순한 느낌을 주지요."], ["나도 그릴 수 있을까요?", "그럼요. 동그란 몸에 긴 귀 두 개를 더하면 토끼가 돼요. 처음 그리시는 분께도 어렵지 않아요."], ["토끼 그림을 누구에게 선물했나요?", "주로 어르신 생신이나 새 식구를 맞을 때 선물했어요. 건강과 자손 번창을 비는 좋은 선물이었지요."], ["오늘 이 그림으로 무엇을 빌까요?", "가족 모두 건강하게 오래오래 지내기를 빌어 보세요. 그게 토끼 그림에 담긴 마음이에요."]]}, {"n": 2, "id": "minhwa:013-gam", "title": "감", "diff": "🌱", "obj": "감을 그리며 신의와 재물의 상징을 배워보자.", "type": "color", "meta": "상징: 신의 · 재물 · 입신", "steps": ["채본을 한다.", "접시는 호분으로 칠한다.", "감은 황주로 전체를 칠한다.", "녹청으로 꼭지를 칠한다.", "황+호분으로 접시 안쪽을 칠한다.", "적으로 감 주위를 바림한다.", "녹청+먹으로 바림한다.", "접시·꼭지에 먹선을 치고, 감 둘레는 적으로 마무리한다."], "photos": {"base": "minhwa/013-gam/", "count": 8}, "korean2": {"words": [["감", "gam", "persimmon"], ["가을", "ga-eul", "autumn"], ["나무", "na-mu", "tree"]], "sentences": [["감이 빨갛게 익습니다.", "Gam-i ppal-gat-ge ik-seum-ni-da.", "The persimmons ripen red."]], "culture": [["🟠 감의 뜻", "감은 가을의 풍요와 넉넉함을 상징합니다."]]}, "qna": [["민화에서 감은 무슨 뜻인가요?", "감은 가을에 주렁주렁 익으니 넉넉한 풍요와 재물을 뜻해요. 집안이 넉넉해지기를 비는 그림이지요."], ["감나무에 좋은 뜻이 많다던데요?", "옛 어른들은 감나무에 일곱 가지 덕이 있다고 했어요. 오래 살고, 그늘을 주고, 새가 깃들고, 열매가 달아 사랑받았지요."], ["왜 빨갛게 익은 감을 그리나요?", "잘 익은 빨간 감은 풍년과 결실을 뜻해요. 노력한 만큼 거둔다는 좋은 마음을 담은 거예요."], ["감 그림은 어디에 걸었나요?", "곳간이나 부엌 가까이, 또는 거실에 걸었어요. 살림이 넉넉하기를 바라는 뜻이었지요."], ["감을 그릴 때 무엇을 강조하나요?", "동그란 열매와 위쪽 꼭지(감꼭지)예요. 잎의 푸른색과 감의 주황색이 어울려 가을빛이 살아나지요."], ["잎도 같이 그리나요?", "네, 푸른 잎과 함께 그려요. 빨간 감과 초록 잎이 어우러져 더 먹음직스러워 보인답니다."], ["민화가 무엇인가요?", "보통 사람들이 복을 빌며 그린 그림이에요. 잘 그리는 것보다 좋은 뜻을 담는 게 핵심이지요."], ["색은 어떻게 칠하나요?", "감은 주황·빨강으로, 잎은 녹색으로 칠해요. 물을 잘 써서 자연스럽게 번지게 하면 곱습니다."], ["나도 그릴 수 있을까요?", "그럼요. 동그라미를 그리고 위에 작은 꼭지를 더한 뒤 주황으로 칠하면 감이 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "올 한 해도 살림이 넉넉하고 풍성하기를 빌어 보세요. 그게 감 그림의 뜻이에요."]]}, {"n": 3, "id": "minhwa:027-gaji", "title": "가지", "diff": "🌱", "obj": "가지를 그리며 자손과 다산의 상징을 배워보자.", "type": "color", "meta": "상징: 자손 · 다산", "steps": ["채본을 한다.", "보라+녹색+황토로 땅에 점 찍듯 칠한다.", "호분으로 나비·가지 위쪽을, 녹색+황토로 줄기와 뒤집힌 잎을 칠한다.", "녹색으로 잎사귀를, 보라색으로 가지를 칠한다(바림 없이).", "오른쪽 나비는 주황으로 바림, 다른 나비는 군청 위아래·중간 주황으로 칠한다.", "나비 몸통은 황토로 칠한다.", "가지 아래에 보라+먹으로 칠하고 위로 바림한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/027-gaji/", "count": 4}, "korean2": {"words": [["가지", "ga-ji", "eggplant"], ["보라", "bo-ra", "purple"], ["밭", "bat", "field"]], "sentences": [["가지는 보라색입니다.", "Ga-ji-neun bo-ra-saek-im-ni-da.", "Eggplants are purple."]], "culture": [["🍆 가지의 뜻", "가지는 자손이 번창하기를 바라는 마음을 담습니다."]]}, "qna": [["민화에서 가지는 무슨 뜻인가요?", "가지는 한 그루에 열매가 많이 달려서 자손이 번창하기를 비는 뜻이에요. 집안에 아이들이 많기를 바란 거지요."], ["왜 보라색으로 그리나요?", "가지 본래의 빛이 고운 보라색이라 그대로 살려요. 민화에서 보기 드문 색이라 더 눈에 띈답니다."], ["가지 그림은 어디에 걸었나요?", "주로 안방에 걸었어요. 자손이 늘고 집안이 화목하기를 바라는 마음이었지요."], ["열매를 여러 개 그리는 이유가 있나요?", "네, 열매가 많을수록 자손이 번창한다는 뜻이 커져요. 그래서 주렁주렁 달리게 그렸답니다."], ["민화가 무엇인가요?", "옛 보통 사람들이 복을 빌며 그린 그림이에요. 좋은 뜻을 담는 게 가장 중요했지요."], ["가지를 그릴 때 무엇을 강조하나요?", "길쭉한 열매와 위쪽의 꼭지예요. 매끈한 곡선으로 그리면 가지 특유의 느낌이 살아요."], ["잎이나 꽃도 같이 그리나요?", "네, 보라색 작은 꽃과 푸른 잎을 함께 그려요. 그러면 더 생생하고 풍성해 보이지요."], ["색은 어떻게 칠하나요?", "열매는 보라로, 잎은 녹색으로 칠해요. 진하고 연한 보라를 섞으면 더 고와요."], ["나도 그릴 수 있을까요?", "그럼요. 길쭉한 타원을 그리고 위에 꼭지를 더한 뒤 보라로 칠하면 가지가 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "자손이 번창하고 집안이 화목하기를 빌어 보세요. 그게 가지 그림의 마음이에요."]]}, {"n": 4, "id": "minhwa:003-dak", "title": "닭", "diff": "🌱", "obj": "닭을 그리며 입신출세와 벽사의 상징을 배워보자.", "type": "color", "meta": "상징: 입신출세 · 부귀공명 · 벽사", "steps": ["채본을 한다.", "불로초·눈·부리·등날개는 호분으로 칠한다.", "황·황주·적을 부분적으로 칠한다. 불로초 하나는 황주로 칠한다.", "벼슬은 적으로 바림한다.", "불로초는 적으로 바림한다.", "닭의 등은 적으로 비늘처럼, 발·꼬리뼈는 황토로 칠한다.", "배는 먹으로 칠한다.", "옆날개 두 부분은 녹청·본남으로 반만 칠하고 안으로 바림한다.", "바림이 마르면 먹으로 선을 치고 호분으로 마무리한다.", "꼬리는 본남+먹으로 칠한다.", "불로초 잎은 녹청으로 칠한다.", "닭의 발톱은 호분으로 칠한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/003-dak/", "count": 8}, "korean2": {"words": [["닭", "dak", "chicken"], ["새벽", "sae-byeok", "dawn"], ["벼슬", "byeo-seul", "comb"]], "sentences": [["닭이 새벽에 웁니다.", "Dak-i sae-byeok-e um-ni-da.", "The rooster crows at dawn."]], "culture": [["🐓 닭의 뜻", "닭은 출세와 복을 부르고 나쁜 기운을 쫓는다고 여겼습니다."]]}, "qna": [["민화에서 닭은 무슨 뜻인가요?", "닭은 출세와 복을 부르고 나쁜 기운을 쫓는다고 여겼어요. 좋은 일이 들어오기를 비는 그림이지요."], ["수탉을 그리면 출세를 뜻한다던데요?", "맞아요. 수탉의 붉은 볏을 '벼슬'이라 부르는데, 벼슬은 높은 자리를 뜻해요. 그래서 출세를 빌었지요."], ["닭이 왜 나쁜 기운을 쫓나요?", "닭이 새벽에 울면 어둠이 물러가고 아침이 와요. 그래서 어둠과 나쁜 기운을 쫓는 새로 여겼답니다."], ["닭 그림은 어디에 걸었나요?", "대문이나 현관 가까이 걸었어요. 나쁜 기운을 막고 좋은 일을 들이려는 뜻이었지요."], ["민화가 무엇인가요?", "보통 사람들이 복을 빌며 그린 그림이에요. 솜씨보다 담긴 뜻이 더 소중했지요."], ["닭을 그릴 때 무엇을 강조하나요?", "붉은 볏과 화려한 꽁지깃이에요. 깃털을 여러 색으로 그리면 늠름하고 멋스러워요."], ["병아리도 같이 그리나요?", "네, 닭과 병아리를 함께 그리면 자손 번창의 뜻이 더해져요. 단란한 가족처럼 보이지요."], ["색은 어떻게 칠하나요?", "볏은 빨강, 깃털은 검정·노랑·갈색을 섞어요. 색이 많을수록 더 화려해 보입니다."], ["나도 그릴 수 있을까요?", "그럼요. 몸통을 그리고 위에 붉은 볏, 뒤에 꽁지깃을 더하면 닭이 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "하는 일이 잘 풀리고 나쁜 일은 비켜가기를 빌어 보세요. 그게 닭 그림의 뜻이에요."]]}, {"n": 5, "id": "minhwa:008-nabi", "title": "나비", "diff": "🌱", "obj": "나비를 그리며 즐거움과 장수의 상징을 배워보자.", "type": "color", "meta": "상징: 즐거움 · 행복 · 장수 · 부부금슬", "steps": ["채본을 한다.", "구름은 호분으로 칠한다.", "나비는 황·백군(하늘색)으로 칠한다.", "잠자리는 적+먹으로 칠한다.", "구름은 황·백군으로 바림한다.", "노랑나비는 황주로, 백군나비는 군청으로 칠하고 바림한다.", "잠자리는 먹으로 연하게 사선 선을 친다.", "구름은 호분으로 선을 친다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/008-nabi/", "count": 4}, "korean2": {"words": [["나비", "na-bi", "butterfly"], ["꽃", "kkot", "flower"], ["봄", "bom", "spring"]], "sentences": [["나비가 꽃에 앉습니다.", "Na-bi-ga kkot-e an-jeum-ni-da.", "The butterfly lands on the flower."]], "culture": [["🦋 나비의 뜻", "나비는 사랑과 기쁨, 그리고 장수를 상징합니다."]]}, "qna": [["민화에서 나비는 무슨 뜻인가요?", "나비는 기쁨과 사랑, 그리고 장수를 뜻해요. 꽃 사이를 나는 나비처럼 즐거운 일이 많기를 비는 그림이지요."], ["나비와 꽃은 왜 같이 그리나요?", "나비가 꽃을 찾아오듯, 부부나 연인의 다정한 사랑을 뜻해요. 그래서 꽃과 나비를 짝지어 그렸답니다."], ["나비가 장수도 뜻하나요?", "네, 한자로 나비를 가리키는 말이 '여든 살 노인'과 소리가 비슷해 오래 살라는 뜻으로도 그렸어요."], ["나비 그림은 어디에 걸었나요?", "주로 신혼 방이나 안방에 걸었어요. 부부의 사랑과 행복을 비는 마음이었지요."], ["민화가 무엇인가요?", "옛 보통 사람들이 복을 빌며 그린 그림이에요. 좋은 뜻을 담는 게 가장 중요했지요."], ["나비를 그릴 때 무엇을 강조하나요?", "활짝 편 날개와 그 안의 무늬예요. 좌우가 똑같이 펼쳐지게 그리면 균형이 곱습니다."], ["나비를 여러 마리 그리기도 하나요?", "네, 여러 마리가 어울려 날면 기쁨과 흥겨움이 커져요. 보기에도 화사하지요."], ["색은 어떻게 칠하나요?", "날개를 노랑·주황·파랑 등 여러 색으로 곱게 칠해요. 무늬에 점을 찍으면 더 예뻐요."], ["나도 그릴 수 있을까요?", "그럼요. 가운데 몸통을 긋고 양쪽에 날개를 펼쳐 그린 뒤 색칠하면 나비가 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "기쁜 일이 많고 사랑하는 사람과 오래 행복하기를 빌어 보세요. 그게 나비 그림의 마음이에요."]]}, {"n": 6, "id": "minhwa:011-podo", "title": "포도", "diff": "🌱", "obj": "포도를 그리며 자손만대의 상징을 배워보자.", "type": "color", "meta": "상징: 다자 · 자손만대 · 장수", "steps": ["채본을 한다.", "녹청으로 줄기를 칠한다.", "상층 포도알은 호분으로 칠한다.", "적+군청+호분(보라)으로 나머지 포도알을 칠한다.", "그릇은 황주로 칠한다.", "흰 포도알은 보라로, 보라 포도알은 보라+먹으로 바림한다.", "녹청으로 줄기를 칠한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/011-podo/", "count": 4}, "korean2": {"words": [["포도", "po-do", "grape"], ["보라", "bo-ra", "purple"], ["열매", "yeol-mae", "fruit"]], "sentences": [["포도가 주렁주렁 열립니다.", "Po-do-ga ju-reong-ju-reong yeol-lim-ni-da.", "Grapes hang in clusters."]], "culture": [["🍇 포도의 뜻", "포도는 알이 많아 자손 번창과 풍요를 상징합니다."]]}, "qna": [["민화에서 포도는 무슨 뜻인가요?", "포도는 알이 송이송이 많이 달려서 자손 번창과 풍요를 뜻해요. 집안에 사람이 많고 넉넉하기를 비는 그림이지요."], ["알이 많을수록 좋은 뜻인가요?", "네, 포도알 하나하나가 자손을 뜻해요. 알이 많을수록 자손이 번창한다는 뜻이 커지지요."], ["포도 그림은 어디에 걸었나요?", "주로 안방에 걸었어요. 자손이 늘고 집안이 풍성하기를 바라는 마음이었지요."], ["덩굴도 같이 그리나요?", "네, 길게 뻗는 포도 덩굴은 자손이 끊이지 않고 이어진다는 뜻이에요. 그래서 덩굴손까지 정성껏 그렸답니다."], ["민화가 무엇인가요?", "보통 사람들이 복을 빌며 그린 그림이에요. 솜씨보다 담긴 뜻이 더 소중했지요."], ["포도를 그릴 때 무엇을 강조하나요?", "둥근 알이 모인 송이와 휘감는 덩굴이에요. 알을 겹쳐 그리면 탐스러워 보여요."], ["색은 어떻게 칠하나요?", "포도알은 보라·자주로, 잎은 녹색으로 칠해요. 진하고 연한 보라를 섞으면 더 먹음직스러워요."], ["바림(그러데이션)을 쓰나요?", "네, 알 한쪽을 진하게 다른 쪽을 연하게 바림하면 동그란 입체감이 살아나요."], ["나도 그릴 수 있을까요?", "그럼요. 작은 동그라미를 송이 모양으로 모아 그리고 보라로 칠하면 포도가 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "자손이 번창하고 집안이 풍성하기를 빌어 보세요. 그게 포도 그림의 뜻이에요."]]}, {"n": 7, "id": "minhwa:006-yeon", "title": "연꽃", "diff": "🌱", "obj": "연꽃을 그리며 순결과 생명의 상징을 배워보자.", "type": "color", "meta": "상징: 순결 · 생명 · 다자", "steps": ["채본을 한다.", "꽃잎에 호분을 칠한다.", "잎은 백록으로 칠한다.", "꽃잎 위쪽은 군청으로 칠한다.", "꽃잎은 분홍으로 칠하고 바림한다.", "줄기는 황토+호분으로 칠한다.", "잎은 진한 분홍으로 선을 친다.", "줄기 윗부분 접합부는 녹청을 연하게 바림한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/006-yeon/", "count": 7}, "korean2": {"words": [["연꽃", "yeon-kkot", "lotus"], ["물", "mul", "water"], ["분홍", "bun-hong", "pink"]], "sentences": [["연꽃이 물 위에 핍니다.", "Yeon-kkot-i mul wi-e pim-ni-da.", "The lotus blooms on the water."]], "culture": [["🪷 연꽃의 뜻", "진흙 속에서도 깨끗이 피어, 맑은 군자의 마음을 상징합니다."]]}, "qna": [["민화에서 연꽃은 무슨 뜻인가요?", "연꽃은 진흙 속에서도 깨끗하게 피어나, 맑고 곧은 마음을 뜻해요. 군자의 마음에 비유되는 귀한 꽃이지요."], ["진흙에서 피는데 왜 깨끗하다고 하나요?", "더러운 진흙에 뿌리를 두고도 그 위로 깨끗한 꽃을 피우기 때문이에요. 어려움 속에서도 바르게 사는 모습을 닮았지요."], ["연꽃에 다른 좋은 뜻도 있나요?", "네, 연밥 속에 씨앗이 많아 자손 번창도 뜻해요. 또 불교에서도 귀하게 여기는 꽃이랍니다."], ["연꽃 그림은 어디에 걸었나요?", "거실이나 사랑방에 걸었어요. 맑고 바른 마음으로 살기를 바라는 뜻이었지요."], ["물고기나 새도 같이 그리나요?", "네, 물총새나 물고기와 함께 그리기도 해요. 연못의 평화로운 풍경이 더 정겨워지지요."], ["민화가 무엇인가요?", "옛 보통 사람들이 복을 빌며 그린 그림이에요. 좋은 뜻을 담는 게 가장 중요했지요."], ["연꽃을 그릴 때 무엇을 강조하나요?", "겹겹이 둘러난 꽃잎과 넓은 연잎이에요. 꽃잎 끝을 부드럽게 그리면 우아해 보여요."], ["색은 어떻게 칠하나요?", "꽃은 분홍·흰색, 잎은 녹색으로 칠해요. 꽃잎 끝을 진하게 바림하면 더 고와요."], ["나도 그릴 수 있을까요?", "그럼요. 가운데 꽃술을 두고 꽃잎을 빙 둘러 그린 뒤 분홍으로 칠하면 연꽃이 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "어려움 속에서도 맑고 바른 마음을 지키기를 빌어 보세요. 그게 연꽃의 뜻이에요."]]}, {"n": 8, "id": "minhwa:001-wonang", "title": "원앙", "diff": "🌱", "obj": "원앙을 그리며 부부애와 백년화목의 상징을 배워보자.", "type": "color", "meta": "상징: 부부애 · 백년화목 · 귀자", "steps": ["채본을 한다.", "호분으로 머리·날개뼈·배를 칠한다.", "황토+호분으로 눈·부리·꼬리·날개를 칠한다.", "등은 황으로 칠한다.", "날개는 적대자로 칠한다.", "옆에 본남·녹청을 반씩 칠하고 바림한다.", "꼬리·날개·등은 황주로 바림한다.", "등의 황이 마르면 녹청+본남으로 칠하고 바림한다.", "물은 본남을 묽게 해서 칠하고 바림한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/001-wonang/", "count": 6}, "korean2": {"words": [["원앙", "won-ang", "mandarin duck"], ["물", "mul", "water"], ["사랑", "sa-rang", "love"]], "sentences": [["원앙은 사이가 좋습니다.", "Won-ang-eun sa-i-ga jo-seum-ni-da.", "Mandarin ducks get along well."]], "culture": [["🦆 원앙의 뜻", "원앙은 부부의 사랑과 백년해로를 상징합니다."]]}, "qna": [["민화에서 원앙은 무슨 뜻인가요?", "원앙은 부부의 사랑과 백년해로를 뜻해요. 짝을 지어 사이좋게 지내는 모습 때문에 부부 금슬의 상징이 되었지요."], ["원앙은 정말 사이가 좋은가요?", "원앙은 늘 짝과 함께 다녀서 다정한 부부의 본보기로 여겨졌어요. 그래서 혼례 때 자주 등장했답니다."], ["원앙 그림은 어디에 걸었나요?", "주로 신혼 방이나 안방에 걸었어요. 부부가 평생 화목하게 살기를 비는 마음이었지요."], ["혼례 때도 원앙을 썼나요?", "네, 혼례 이불이나 베개에도 원앙을 수놓았어요. 백년해로하라는 가장 좋은 뜻이었지요."], ["민화가 무엇인가요?", "보통 사람들이 복을 빌며 그린 그림이에요. 솜씨보다 담긴 뜻이 더 소중했지요."], ["원앙을 그릴 때 무엇을 강조하나요?", "암수 두 마리를 나란히, 그리고 화려한 깃털이에요. 수컷의 알록달록한 깃이 보기 좋지요."], ["연꽃이나 물과 같이 그리나요?", "네, 연꽃이 핀 물 위에 원앙을 그려요. 부부의 사랑과 맑은 마음을 함께 담은 거예요."], ["색은 어떻게 칠하나요?", "수컷은 주황·초록·파랑으로 화려하게, 암컷은 수수하게 칠해요. 둘의 대비가 곱지요."], ["나도 그릴 수 있을까요?", "그럼요. 물 위에 새 두 마리를 나란히 그리고 색을 칠하면 원앙이 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "부부가, 혹은 사랑하는 사람과 오래오래 화목하기를 빌어 보세요. 그게 원앙의 뜻이에요."]]}, {"n": 9, "id": "minhwa:032-kkachi", "title": "까치", "diff": "🌱", "obj": "까치를 그리며 기쁨과 희소식의 상징을 배워보자.", "type": "color", "meta": "상징: 기쁨 · 희소식", "steps": ["채본을 한다.", "눈·배·꼬리는 호분으로 칠한다.", "땅은 황토로 칠하고 적대자로 바림한다.", "까치 나머지는 먹으로 칠하되 꼬리 시작·배는 바림한다.", "나무는 적대자+먹으로 칠한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/032-kkachi/", "count": 7}, "korean2": {"words": [["까치", "kka-chi", "magpie"], ["소식", "so-sik", "news"], ["나무", "na-mu", "tree"]], "sentences": [["까치가 좋은 소식을 전합니다.", "Kka-chi-ga jo-eun so-sik-eul jeon-ham-ni-da.", "The magpie brings good news."]], "culture": [["🐦 까치의 뜻", "까치는 기쁜 소식을 전하는 길한 새로 여겨집니다."]]}, "qna": [["민화에서 까치는 무슨 뜻인가요?", "까치는 기쁜 소식을 전하는 길한 새로 여겨요. 까치가 울면 반가운 손님이 온다고 했지요."], ["까치와 호랑이를 같이 그린다던데요?", "네, '까치호랑이'라는 유명한 그림이 있어요. 까치는 좋은 소식, 호랑이는 나쁜 기운을 막아 둘이 짝을 이루지요."], ["까치 그림은 어디에 걸었나요?", "주로 대문이나 거실에 걸었어요. 좋은 소식이 자주 들어오기를 바라는 마음이었지요."], ["정초에 까치 그림을 걸었나요?", "네, 새해 첫머리에 걸어 한 해의 복과 기쁜 소식을 빌었어요. 세화라고 불렀답니다."], ["민화가 무엇인가요?", "옛 보통 사람들이 복을 빌며 그린 그림이에요. 좋은 뜻을 담는 게 가장 중요했지요."], ["까치를 그릴 때 무엇을 강조하나요?", "검고 흰 깃의 또렷한 대비와 긴 꽁지예요. 흑백이 분명해 단정하고 야무져 보여요."], ["나무도 같이 그리나요?", "네, 소나무나 매화 가지에 앉은 까치를 자주 그려요. 가지에 앉아 소식을 전하는 모습이지요."], ["색은 어떻게 칠하나요?", "몸은 검정과 흰색으로, 배경 나무는 갈색·녹색으로 칠해요. 까치의 흑백이 도드라지게요."], ["나도 그릴 수 있을까요?", "그럼요. 나뭇가지를 긋고 그 위에 까치를 앉혀 검정·흰색으로 칠하면 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "반갑고 기쁜 소식이 자주 찾아오기를 빌어 보세요. 그게 까치 그림의 뜻이에요."]]}, {"n": 10, "id": "minhwa:009-hak", "title": "학", "diff": "🌱", "obj": "학을 그리며 장수와 고고함의 상징을 배워보자.", "type": "color", "meta": "상징: 장수 · 고고함 · 신선", "steps": ["채본을 한다.", "호분으로 얼굴·목·가슴을 칠한다.", "황토+호분으로 땅·눈·부리를 칠한다.", "적으로 해와 학 머리를 칠한다.", "왼쪽 학은 노랑+호분으로 등을 칠한다.", "오른쪽 학은 군청으로 칠한다.", "먹으로 목줄기·꼬리를 칠한다.", "녹청으로 부리 앞에서 바림하고 다리를 칠한다.", "호분으로 발톱·깃털을 칠하고 꼬리마다 가운데 선을 친다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/009-hak/", "count": 6}, "korean2": {"words": [["학", "hak", "crane"], ["하늘", "ha-neul", "sky"], ["소나무", "so-na-mu", "pine"]], "sentences": [["학이 하늘을 납니다.", "Hak-i ha-neul-eul nam-ni-da.", "The crane flies in the sky."]], "culture": [["🕊️ 학의 뜻", "학은 장수와 고귀함을 상징하는 새입니다."]]}, "qna": [["민화에서 학은 무슨 뜻인가요?", "학은 천 년을 산다는 새로, 장수와 고귀함을 뜻해요. 맑고 품위 있는 삶을 비는 그림이지요."], ["학을 왜 신선의 새라고 하나요?", "옛이야기에서 신선이 학을 타고 다닌다고 했어요. 그래서 학은 맑고 신령한 새로 여겨졌답니다."], ["학과 소나무를 같이 그리나요?", "네, 소나무도 오래 사니 학과 함께 그리면 장수의 뜻이 두 배가 돼요. '송학도'라 부르지요."], ["학 그림은 어디에 걸었나요?", "사랑방이나 어른 방에 걸었어요. 건강하게 오래 살고 품위를 지키기를 바라는 뜻이었지요."], ["민화가 무엇인가요?", "보통 사람들이 복을 빌며 그린 그림이에요. 솜씨보다 담긴 뜻이 더 소중했지요."], ["학을 그릴 때 무엇을 강조하나요?", "긴 목과 긴 다리, 흰 몸과 검은 날개 끝이에요. 늘씬한 자태가 고고해 보이지요."], ["학 머리의 붉은 점은 무엇인가요?", "두루미 머리 위 붉은 부분이에요. 흰 몸에 붉은 점 하나가 또렷해 더 기품 있어 보여요."], ["색은 어떻게 칠하나요?", "몸은 흰색, 날개 끝은 검정, 머리는 붉게 칠해요. 색이 적어 단정하고 맑은 느낌이에요."], ["나도 그릴 수 있을까요?", "그럼요. 긴 목과 다리를 가진 새를 그리고 흰색에 검정·빨강만 더하면 학이 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "건강하게 오래 살고 마음의 품위를 지키기를 빌어 보세요. 그게 학 그림의 뜻이에요."]]}, {"n": 11, "id": "minhwa:054-moran", "title": "모란", "diff": "🌱", "obj": "모란을 그리며 부귀영화의 상징을 배워보자.", "type": "color", "meta": "상징: 부귀영화 · 부부애", "steps": ["채본을 한다.", "적대자+먹으로 가지를 칠한다.", "녹청으로 잎사귀를 칠한다.", "황주·적·군청으로 꽃 전체를 칠한다.", "황주는 적·군청으로, 군청은 적으로, 적은 군청으로 굵게 선을 친다.", "군청으로 초록잎에 바림한다.", "땅은 적대자를 연하게 칠한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/054-moran/", "count": 6}, "korean2": {"words": [["모란", "mo-ran", "peony"], ["꽃", "kkot", "flower"], ["부귀", "bu-gwi", "wealth"]], "sentences": [["모란은 꽃 중의 왕입니다.", "Mo-ran-eun kkot jung-ui wang-im-ni-da.", "The peony is the king of flowers."]], "culture": [["🌺 모란의 뜻", "모란은 부귀영화, 즉 재물과 명예를 상징합니다."]]}, "qna": [["민화에서 모란은 무슨 뜻인가요?", "모란은 '꽃 중의 왕'이라 불리며 부귀영화를 뜻해요. 재물과 명예가 함께하기를 비는 화려한 그림이지요."], ["왜 '꽃 중의 왕'인가요?", "꽃이 크고 탐스러워 가장 화려하기 때문이에요. 그 풍성함이 부유함과 잘 어울리지요."], ["모란 그림은 어디에 걸었나요?", "거실이나 잔칫집에 걸었어요. 집안이 부유하고 영화롭기를 바라는 마음이었지요."], ["혼례나 잔치에도 모란을 썼나요?", "네, 혼례 병풍에 모란을 가득 그렸어요. 부귀와 화목을 비는 가장 좋은 꽃이었지요."], ["민화가 무엇인가요?", "옛 보통 사람들이 복을 빌며 그린 그림이에요. 좋은 뜻을 담는 게 가장 중요했지요."], ["모란을 그릴 때 무엇을 강조하나요?", "겹겹이 풍성한 꽃잎과 큼직한 꽃송이예요. 잎을 많이 그릴수록 탐스럽고 화려해 보여요."], ["꽃을 여러 송이 그리나요?", "네, 활짝 핀 꽃과 봉오리를 함께 그려요. 피어나는 기운과 풍성함이 가득해 보이지요."], ["색은 어떻게 칠하나요?", "꽃은 빨강·분홍으로, 잎은 녹색으로 칠해요. 꽃잎 안쪽을 진하게 바림하면 더 화려해요."], ["나도 그릴 수 있을까요?", "그럼요. 가운데부터 꽃잎을 겹겹이 둘러 그리고 빨강·분홍으로 칠하면 모란이 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "집안에 재물과 좋은 일이 가득하기를 빌어 보세요. 그게 모란 그림의 뜻이에요."]]}, {"n": 12, "id": "minhwa:095-horangi", "title": "호랑이", "diff": "🌱", "obj": "호랑이를 그리며 용맹과 벽사의 상징을 배워보자.", "type": "color", "meta": "상징: 용맹 · 벽사 · 권세", "steps": ["채본을 한다.", "호분으로 눈썹·이빨·코·턱선·가슴선·발·배·꼬리를 칠하고 바림한다.", "몸체는 황토+호분으로 칠하며 바림한다.", "땅은 초록으로 칠해 아래로 바림한다.", "눈은 진한 노랑, 입·양쪽 눈자위는 적색으로 칠한다.", "적색+먹으로 코·입술을 칠한다.", "나무는 적대자로 연하게 칠한다.", "솔잎은 녹청+황토로 연하게 칠한다.", "호랑이는 진한 먹으로 한 번 더 칠한다.", "먹선으로 마무리한다."], "photos": {"base": "minhwa/095-horangi/", "count": 3}, "korean2": {"words": [["호랑이", "ho-rang-i", "tiger"], ["산", "san", "mountain"], ["용맹", "yong-maeng", "bravery"]], "sentences": [["호랑이는 산의 왕입니다.", "Ho-rang-i-neun san-ui wang-im-ni-da.", "The tiger is the king of the mountain."]], "culture": [["🐯 호랑이의 뜻", "호랑이는 나쁜 기운을 막아 주는 용맹한 수호신입니다."]]}, "qna": [["민화에서 호랑이는 무슨 뜻인가요?", "호랑이는 나쁜 기운을 막아 주는 용맹한 수호신이에요. 집안에 나쁜 일이 들지 못하게 지켜 준다고 여겼지요."], ["민화 호랑이는 왜 무섭지 않고 익살스러운가요?", "옛 사람들은 호랑이를 무섭게만 그리지 않고 푸근하고 우스꽝스럽게 그렸어요. 무서움보다 친근함으로 복을 빌고 싶었던 거예요."], ["호랑이 그림은 어디에 걸었나요?", "주로 대문이나 현관에 걸었어요. 나쁜 기운이 집에 들어오지 못하게 막으려는 뜻이었지요."], ["까치와 함께 그리는 이유가 있나요?", "네, 까치호랑이는 호랑이가 나쁜 기운을 막고 까치가 기쁜 소식을 전해, 막고 들이는 짝을 이뤄요."], ["정초에 호랑이 그림을 걸었나요?", "네, 새해에 대문에 붙여 한 해의 나쁜 기운을 막았어요. 이런 그림을 세화라고 불렀답니다."], ["민화가 무엇인가요?", "보통 사람들이 복을 빌며 그린 그림이에요. 솜씨보다 담긴 뜻이 더 소중했지요."], ["호랑이를 그릴 때 무엇을 강조하나요?", "줄무늬와 큰 눈, 둥근 얼굴이에요. 무늬를 또렷이 그리면 늠름하면서도 정겨워 보여요."], ["색은 어떻게 칠하나요?", "몸은 노랑·황토, 줄무늬는 검정으로 칠해요. 눈은 크고 또렷하게 그리면 인상이 살아요."], ["나도 그릴 수 있을까요?", "그럼요. 둥근 얼굴과 몸을 그리고 검은 줄무늬를 더한 뒤 노랑으로 칠하면 호랑이가 돼요."], ["오늘 이 그림으로 무엇을 빌까요?", "나쁜 일은 막고 집안이 든든하게 지켜지기를 빌어 보세요. 그게 호랑이 그림의 뜻이에요."]]}]}, {"key": "dongyang", "name": "동양화", "sub": "사군자·수묵", "initial": "동", "color": "#5E8C7B", "stages": ["보기", "순서", "따라하기", "창작", "한국어", "AI"], "lessons": [{"n": 1, "id": "dongyang:1-1", "title": "동양화의 이해", "diff": "🌱", "obj": "동양화의 특성을 이해하자.", "type": "brush", "meta": "기법: 단구법 · 쌍구법 · 삼묵법 · 중봉", "blocks": [{"t": "동양화의 특성", "e": "동양에서는 사물과 하나가 되어 본질을 이해하는 문화가 발전했다. 그래서 동양화는 외형보다 그 안에 담긴 뜻과 정신을 표현한다. 빛은 같은 사물의 색을 아침·낮·밤마다 바꾸므로 동양화에서는 허상으로 보고, 모든 색을 품은 먹색으로 대상의 특징만 살려 …"}, {"t": "기본 재료 사용법", "e": "붓 잡는 법에는 단구법(엄지·검지 끝에 힘을 주어 잡고 나머지로 받침)과 쌍구법(엄지·검지에 중지를 더해 용의 발톱처럼 잡음)이 있다. 동양화에서 가장 중요한 기본은 '물 조절'이다. 붓·먹·화선지는 모두 물을 매개로 작용하므로, 물통 가장자리나 접…"}, {"t": "삼묵법", "e": "삼묵법은 담묵·중묵·농묵 세 가지 먹을 한 붓에 알맞게 담아내는 방법이다. 적정량의 물을 머금은 붓에 초묵을 조금씩 더 찍어가며 붓을 점점 세워 섞고, 파지에 찍어 농담이 잘 나뉘었는지 검사한다."}, {"t": "선 긋는 다섯 가지 방법", "e": "중봉은 붓을 수직으로 세워 붓끝이 선의 중앙을 지나게 긋는 강건한 선이다. 측봉은 붓끝을 옆으로 치우쳐 긋는 경쾌한 선(대줄기·잎). 역봉은 반대 방향으로 긋는 연습용. 전봉은 붓대·손목을 돌려 중봉·측봉·역봉을 자유로 교환하는 붓질. 산봉은 붓끝을…"}, {"t": "선 연습", "e": "가장 기본인 중봉부터 익힌다. 세로로 중봉을 긋고 그 위에 가로로 중봉을 그으며, 자연스럽게 드러나는 농담의 변화와 붓끝의 느낌에 익숙해진다. 익숙해지면 자유롭게 선을 그어 꽃·나비·나무·산·강·구름을 그려본다."}], "photos": {"base": "dongyang/1-1/", "count": 4}, "korean2": {"terms": [["먹", "meok", "ink"], ["벼루", "byeo-ru", "inkstone"]], "words": [["붓", "but", "brush"], ["한지", "han-ji", "hanji paper"], ["그림", "geu-rim", "painting"]], "sentences": [["먹과 붓으로 그립니다.", "Meok-gwa but-eu-ro geu-rim-ni-da.", "We paint with ink and brush."]], "culture": [["🖌️ 동양화란", "동양화는 먹의 진하고 연함만으로 깊이를 표현하는 그림입니다."]]}, "qna": [["동양화는 어떤 그림인가요?", "먹과 붓, 한지로 그리는 우리 전통 그림이에요. 화려한 색보다 먹의 진하고 연한 농담으로 깊이를 표현하지요."], ["동양화에 꼭 필요한 네 가지가 있다던데요?", "붓·먹·벼루·한지를 '문방사우'라고 해요. 글씨와 그림을 위한 네 가지 좋은 벗이라는 뜻이지요."], ["먹 하나로 어떻게 색을 내나요?", "먹에 물을 많이 섞으면 연해지고, 적게 섞으면 진해져요. 이 농담만으로도 밝고 어두움을 다 표현한답니다."], ["붓을 세워 그린다는 게 무슨 뜻인가요?", "붓을 곧게 세워 그리는 걸 '중봉'이라 해요. 그러면 선이 고르고 힘이 있어 동양화의 기본이 되지요."], ["서양화와 가장 다른 점은 뭔가요?", "서양화는 색과 빛을 채워 그리고, 동양화는 여백을 살려 그려요. 비워 둔 공간도 그림의 한 부분이지요."], ["여백을 왜 남기나요?", "다 채우지 않고 비워 두면 보는 사람이 상상으로 채워요. 그 '비움의 멋'이 동양화의 매력이랍니다."], ["한지는 어떤 종이인가요?", "닥나무로 만든 우리 종이예요. 먹을 잘 빨아들여 부드럽게 번지니, 동양화에 꼭 맞지요."], ["처음 배우면 무엇부터 하나요?", "먼저 붓을 바로 잡고 곧은 선 긋기부터 익혀요. 선이 익숙해지면 농담과 그림으로 나아가지요."], ["나도 할 수 있을까요?", "그럼요. 붓에 물과 먹을 섞어 선을 그어 보는 것만으로 시작이에요. 천천히 하면 누구나 됩니다."], ["오늘 무엇을 느끼면 될까요?", "먹 하나로 이렇게 깊은 멋이 난다는 걸 느껴 보세요. 단순함 속의 깊이가 동양화의 마음이에요."]]}, {"n": 2, "id": "dongyang:1-2", "title": "수묵표현의 기본 1", "diff": "🌱", "obj": "삼묵법을 응용해 붓을 만드는 세 가지 기법을 배우고, 각 기법으로 그림을 그려본다.", "type": "brush", "meta": "기법: 상단 짙게 붓 · 붓끝 짙게 붓 · 양옆 짙게 붓", "blocks": [{"t": "상단을 짙게 한 붓", "e": "붓이 지나간 자리의 상단을 짙게 해 입체감·공간감을 낸다. 담묵을 묻힌 뒤 붓끝에 농묵을 듬뿍 묻혀 접시에 눕혀 비빈다. 응용: 노을지는 바다(주제인 태양 주변부터 그려야 농담이 알맞다)."}, {"t": "붓끝을 짙게 한 붓", "e": "붓끝만 짙게 해 부드러운 표현에 쓴다. 응용: 코스모스(화심→앞 꽃잎→8장→줄기)."}, {"t": "양 옆을 짙게 한 붓", "e": "양쪽을 짙게 해 맑고 투명한 표현에 쓴다. 응용: 투명 컵(위 선부터, 아래는 얇게)."}], "photos": {"base": "dongyang/1-2/", "count": 4}, "korean2": {"terms": [["농담", "nong-dam", "shade of ink"]], "words": [["먹", "meok", "ink"], ["물", "mul", "water"], ["붓", "but", "brush"]], "sentences": [["먹에 물을 섞습니다.", "Meok-e mul-eul seok-seum-ni-da.", "We mix water into the ink."]], "culture": [["🖤 농담", "물의 양에 따라 먹이 진해지고 연해집니다."]]}, "qna": [["수묵에서 농담이 무엇인가요?", "먹의 진하고 연한 정도를 농담이라고 해요. 물의 양으로 조절하는데, 동양화의 가장 기본이 되는 솜씨지요."], ["진한 먹과 연한 먹은 어떻게 만드나요?", "물을 적게 섞으면 진하고 검게, 많이 섞으면 연하고 흐리게 돼요. 접시에서 미리 섞어 두면 좋아요."], ["붓 한쪽만 진하게 묻히기도 하나요?", "네, 붓끝이나 한쪽에만 진한 먹을 묻혀요. 한 번 그으면 진한 곳과 연한 곳이 같이 나와 입체감이 살지요."], ["왜 농담 연습을 먼저 하나요?", "농담을 다룰 줄 알아야 잎의 두께나 그림자를 표현할 수 있어요. 그래서 기본기로 가장 먼저 익혀요."], ["물 조절이 어려워요.", "처음엔 다 그래요. 접시 가장자리에 붓을 살짝 눌러 물기를 빼면 조절이 쉬워진답니다."], ["한 붓에 농담을 같이 낼 수 있나요?", "네, 붓뿌리는 연하게 붓끝은 진하게 묻히면 한 번에 자연스러운 변화가 나와요. 이걸 잘 쓰면 멋이 살지요."], ["연습은 무엇으로 하나요?", "한지에 선을 여러 개 그으며 진하게·연하게를 바꿔 봐요. 같은 선도 농담을 달리하면 느낌이 달라져요."], ["먹이 번지는 게 실수인가요?", "아니에요. 한지에서 먹이 부드럽게 번지는 건 동양화의 멋이에요. 그 번짐을 즐기는 게 좋아요."], ["나도 할 수 있을까요?", "그럼요. 진한 선 한 줄, 연한 선 한 줄 그어 보는 것부터 시작하면 됩니다."], ["오늘 무엇을 느끼면 될까요?", "물 한 방울로 먹의 느낌이 이렇게 달라진다는 걸 느껴 보세요. 그게 수묵의 재미예요."]]}, {"n": 3, "id": "dongyang:1-3", "title": "수묵표현의 기본 2", "diff": "🌱", "obj": "붓을 만드는 세 가지 기법을 더 배우고 자연물에 응용한다.", "type": "brush", "meta": "기법: 뿌리쪽 짙게 붓 · 가운데 짙게 붓 · 흩어지게 한 붓", "blocks": [{"t": "붓 뿌리쪽을 짙게 한 붓", "e": "뿌리쪽을 짙게 하여 상단 짙게 붓과 번갈아 쓴다. 응용: 가지(입체감 생각하며 운필)."}, {"t": "가운데를 짙게 한 붓", "e": "운필 한가운데 가는 선을 남겨 잎맥을 표현한다. 응용: 단풍잎(중앙→좌우)."}, {"t": "흩어지게 한 붓", "e": "붓끝을 흩트려 거친 표현을 낸다. 응용: 소나무(밑→위 줄기→빼곡한 잎)."}], "photos": {"base": "dongyang/1-3/", "count": 4}, "korean2": {"terms": [["번짐", "beon-jim", "bleeding"]], "words": [["선", "seon", "line"], ["점", "jeom", "dot"], ["먹", "meok", "ink"]], "sentences": [["먹이 종이에 번집니다.", "Meok-i jong-i-e beon-jim-ni-da.", "The ink bleeds on the paper."]], "culture": [["💧 번짐", "한지 위에서 먹이 부드럽게 퍼지는 맛이 동양화의 멋입니다."]]}, "qna": [["이번엔 무엇을 배우나요?", "먹의 번짐과 흩어짐을 한 단계 더 익혀요. 진한 곳에서 연한 곳으로 자연스럽게 이어지는 표현이지요."], ["뿌리 쪽을 진하게 칠하는 이유가 있나요?", "잎이나 줄기의 뿌리 쪽을 진하게 하면 그쪽이 단단해 보여요. 자연스러운 무게가 생기지요."], ["가운데만 진하게도 하나요?", "네, 가운데를 진하게 하고 양끝을 연하게 하면 도톰하고 둥근 느낌이 나요. 열매나 줄기에 잘 어울려요."], ["먹이 흩어지게 그리는 건 뭔가요?", "붓을 살짝 갈라 쓰거나 빠르게 그으면 먹이 흩어져요. 마른 풀이나 거친 질감을 낼 때 좋아요."], ["번짐을 일부러 만들 수 있나요?", "네, 종이에 물을 먼저 바르고 먹을 떨어뜨리면 부드럽게 번져요. 안개나 구름 같은 느낌이 나지요."], ["이런 표현은 어디에 쓰나요?", "잎·줄기·바위·물 같은 자연을 그릴 때 써요. 농담과 번짐을 알면 무엇이든 표현할 수 있지요."], ["붓을 빨리 움직여야 하나요?", "표현에 따라 달라요. 또렷하게는 천천히, 흩어지게는 빠르게. 손의 속도도 그림의 일부랍니다."], ["연습은 어떻게 하나요?", "한 획 안에서 진하게 시작해 연하게 끝내는 연습을 반복해요. 자연스러운 변화가 손에 익지요."], ["나도 할 수 있을까요?", "그럼요. 붓끝에 진한 먹을 묻혀 한 번 그어 보세요. 끝으로 갈수록 연해지는 게 보일 거예요."], ["오늘 무엇을 느끼면 될까요?", "먹이 번지고 흩어지는 우연의 멋을 즐겨 보세요. 완벽하지 않아도 그게 더 자연스러워요."]]}, {"n": 4, "id": "dongyang:1-4", "title": "구륵법과 몰골법", "diff": "🌱", "obj": "선이 중심인 구륵법과 발묵이 중심인 몰골법을 배운다.", "type": "brush", "meta": "기법: 백묘법 · 구륵법 · 몰골법(발묵)", "blocks": [{"t": "구륵법", "e": "윤곽을 선으로 나타내고 안쪽을 채색하는 법. 선만 쓰는 백묘법에 채색을 더한 것. 중심 모서리는 두껍고 짙게, 외곽은 얇고 담하게."}, {"t": "몰골법(발묵)", "e": "선(골) 없이 먹의 농담만으로 대상을 그린다. 중심부터 농담을 주고, 마를 즈음 가는 선으로 잎맥을 긋는다."}, {"t": "기본 도형으로 익히기", "e": "기본 도형으로 선 변화(구륵법)와 발묵 표현을 함께 연습한다."}], "photos": {"base": "dongyang/1-4/", "count": 4}, "korean2": {"terms": [["구륵법", "gu-reuk-beop", "outline method"], ["몰골법", "mol-gol-beop", "boneless method"]], "words": [["윤곽", "yun-gwak", "outline"], ["선", "seon", "line"], ["색", "saek", "color"]], "sentences": [["선을 먼저 그립니다.", "Seon-eul meon-jeo geu-rim-ni-da.", "We draw the outline first."]], "culture": [["✍️ 두 가지 기법", "구륵법은 윤곽선을 긋고, 몰골법은 선 없이 색으로 바로 그립니다."]]}, "qna": [["구륵법과 몰골법이 무엇인가요?", "구륵법은 윤곽선을 먼저 긋고 안을 채우는 법, 몰골법은 선 없이 색과 먹으로 바로 그리는 법이에요. 동양화의 두 가지 큰 방법이지요."], ["둘 중 어느 게 더 쉬운가요?", "구륵법은 선이 있어 또렷하고 초보자에게 편해요. 몰골법은 한 번에 그려 시원하지만 조금 더 손에 익어야 하지요."], ["백묘법은 또 뭔가요?", "색 없이 가는 먹선만으로 그리는 법이에요. 선의 아름다움 그 자체를 보여 주는 단정한 방법이지요."], ["발묵은 무엇인가요?", "먹을 듬뿍 떨어뜨려 자연스럽게 번지게 하는 법이에요. 우연한 번짐이 만들어 내는 멋이 매력이지요."], ["언제 구륵법을 쓰나요?", "잎맥이나 꽃잎처럼 또렷하게 보여 주고 싶을 때 써요. 윤곽이 분명해 깔끔하지요."], ["언제 몰골법을 쓰나요?", "잎이나 열매를 단번에 시원하게 그릴 때 써요. 붓 한 번에 형태와 색이 같이 나와 생동감이 있지요."], ["두 가지를 같이 써도 되나요?", "네, 한 그림 안에서 섞어 써요. 또렷한 곳은 구륵법, 부드러운 곳은 몰골법으로 하면 풍부해져요."], ["이걸 알면 무엇이 좋아지나요?", "꽃·잎·과일 등 무엇을 그리든 알맞은 방법을 고를 수 있어요. 표현의 폭이 크게 넓어지지요."], ["나도 할 수 있을까요?", "그럼요. 같은 잎을 한 번은 선으로(구륵), 한 번은 색으로(몰골) 그려 비교해 보면 금방 감이 와요."], ["오늘 무엇을 느끼면 될까요?", "선으로 그릴 때와 색으로 바로 그릴 때의 다른 맛을 느껴 보세요. 둘 다 동양화의 멋이에요."]]}, {"n": 5, "id": "dongyang:2-1", "title": "사군자 1 — 난", "diff": "🌱", "obj": "사군자(매·난·국·죽) 중 난을 치는 법을 배운다.", "type": "brush", "meta": "기법: 역입 · 봉안 · 파봉안", "blocks": [{"t": "난잎 그리는 법", "e": "역입으로 정두부터 그어 올리며 돈·제·서미 모양에 유의한다. 일엽→이엽(봉안)→삼엽(파봉안)→사·오엽으로 구성에 변화를 준다."}, {"t": "난꽃 그리는 법", "e": "3장 2단의 화판과 화심, 줄기·꽃대로 이뤄진다. 운필은 화심 방향으로, 꽃술은 농묵 점(山·小·心 초서처럼), 꽃대는 구도에 맞게 휘게 그린다."}], "photos": {"base": "dongyang/2-1/", "count": 4}, "korean2": {"words": [["난", "nan", "orchid"], ["잎", "ip", "leaf"], ["향기", "hyang-gi", "scent"]], "sentences": [["난초 잎이 길게 뻗습니다.", "Nan-cho ip-i gil-ge ppeot-seum-ni-da.", "The orchid leaves stretch long."]], "culture": [["🌿 난의 뜻", "사군자 중 난은 은은한 향기처럼 군자의 품격을 뜻합니다."]]}, "qna": [["사군자가 무엇인가요?", "매화·난초·국화·대나무 네 가지 식물을 가리켜요. 군자의 곧고 맑은 마음을 닮았다 하여 즐겨 그렸지요."], ["난초는 무슨 뜻인가요?", "난초는 은은한 향기처럼 드러내지 않는 군자의 품격을 뜻해요. 깊은 산속에서 홀로 향기를 내는 모습에 비유했지요."], ["난초는 어떻게 그리나요?", "긴 잎을 한 번에 쭉 그어 그려요. 붓을 세워 힘 있게 시작해 끝으로 갈수록 가늘게 빼면 잎이 살아나지요."], ["잎이 휘어지게 그리는 이유가 있나요?", "곧기만 하지 않고 부드럽게 휘어야 바람에 흔들리는 듯 살아 있어 보여요. 그 곡선이 난초의 멋이에요."], ["난초 잎은 몇 장을 그리나요?", "보통 서너 장을 길이와 방향을 달리해 그려요. 서로 겹치고 교차하면 자연스럽고 운치가 있지요."], ["향기를 어떻게 그림으로 나타내나요?", "향기는 그릴 수 없지만, 잎의 단정한 곡선과 여백으로 그윽한 분위기를 느끼게 해요. 그게 동양화의 멋이지요."], ["꽃도 같이 그리나요?", "네, 잎 사이에 작은 꽃 몇 송이를 더해요. 은은한 꽃이 잎의 곡선과 어울려 단아해지지요."], ["난초 그림은 어디에 걸었나요?", "주로 사랑방이나 서재에 걸었어요. 맑고 곧은 선비의 마음을 곁에 두려는 뜻이었지요."], ["나도 그릴 수 있을까요?", "그럼요. 붓을 세워 긴 잎을 한 번에 그어 보세요. 손목을 부드럽게 쓰면 잎이 곱게 휘어요."], ["오늘 무엇을 느끼면 될까요?", "잎 하나에도 곧음과 부드러움이 같이 있다는 걸 느껴 보세요. 그게 난초의 품격이에요."]]}, {"n": 6, "id": "dongyang:2-2", "title": "사군자 2 — 대나무", "diff": "🌱", "obj": "대나무를 치는 법을 배운다.", "type": "brush", "meta": "기법: 잠두 · 마제 · 중봉", "blocks": [{"t": "줄기와 가지", "e": "말발굽(마제)처럼 붓끝에 힘을 주고 중봉으로 그어 올린다. 마디는 농묵으로, 위로 갈수록 길고 얇게. 가지는 예각으로 마디 좌우에서 엇갈려 나오며 곧게 긋는다."}, {"t": "잎", "e": "가지를 덮도록 그리되 둔탁하거나 연약하지 않게, 날렵하고 강건하게. 역입 직필로, 마무리 시 붓끝이 중심선을 지나게. 이필엽·삼필엽으로 늘려 구성한다."}], "photos": {"base": "dongyang/2-2/", "count": 4}, "korean2": {"words": [["대나무", "dae-na-mu", "bamboo"], ["마디", "ma-di", "node"], ["잎", "ip", "leaf"]], "sentences": [["대나무는 곧게 자랍니다.", "Dae-na-mu-neun god-ge ja-ram-ni-da.", "Bamboo grows straight."]], "culture": [["🎋 대나무의 뜻", "대나무는 휘어도 부러지지 않는 곧은 절개를 상징합니다."]]}, "qna": [["대나무는 무슨 뜻인가요?", "대나무는 휘어도 부러지지 않는 곧은 절개를 뜻해요. 어떤 어려움에도 뜻을 굽히지 않는 마음을 닮았지요."], ["대나무는 사철 푸르다던데요?", "네, 겨울에도 푸르러서 변치 않는 지조의 상징이 되었어요. 그래서 선비들이 특히 사랑했지요."], ["줄기의 마디는 어떻게 그리나요?", "곧은 줄기를 긋고 마디마디를 또렷이 표시해요. 마디가 분명해야 대나무다운 단단함이 살지요."], ["대나무 잎은 어떻게 그리나요?", "붓을 한 번에 눌렀다 빼며 잎을 쳐요. 보통 서너 잎을 모아 '날 비(非)' 자나 '개 견(个)' 자 모양으로 그리지요."], ["줄기를 한 번에 긋나요?", "네, 망설이지 않고 한 번에 곧게 그어야 힘이 있어요. 끊기면 대나무의 곧은 맛이 사라지지요."], ["바람에 흔들리는 대나무도 그리나요?", "네, 잎을 한쪽으로 쏠리게 그리면 바람이 느껴져요. 흔들려도 줄기는 곧으니 절개가 더 살지요."], ["대나무 그림은 어디에 걸었나요?", "사랑방이나 서재에 걸었어요. 곧은 마음을 늘 곁에 두려는 뜻이었지요."], ["먹의 농담을 쓰나요?", "네, 앞쪽 대는 진하게 뒤쪽 대는 연하게 그려요. 그러면 앞뒤 거리가 생겨 깊이가 느껴지지요."], ["나도 그릴 수 있을까요?", "그럼요. 곧은 줄기를 한 번에 긋고 마디를 표시한 뒤 잎 몇 개를 치면 대나무가 돼요."], ["오늘 무엇을 느끼면 될까요?", "휘어도 부러지지 않는 곧음을 느껴 보세요. 그게 대나무가 전하는 마음이에요."]]}, {"n": 7, "id": "dongyang:2-3", "title": "사군자 3 — 매화", "diff": "🌱", "obj": "매화를 치는 법을 배운다.", "type": "brush", "meta": "기법: 갈필 · 농담 · 태점 · 운필", "blocks": [{"t": "줄기와 가지", "e": "늙고 굽은 느낌이 좋다. 의도적인 갈필과 농담 차이, 태점을 쓴다. 가지는 줄기 쪽에서 운필해 잔가지로 갈수록 가늘게."}, {"t": "꽃", "e": "꽃잎은 담묵, 꽃술·꽃받침은 농묵. 시작은 두껍고 끝은 얇게, 둥글게. 개화 순서와 다양한 방향을 익히고, 가지에 꽃 자리를 비워 두었다가 연결한다."}], "photos": {"base": "dongyang/2-3/", "count": 4}, "korean2": {"words": [["매화", "mae-hwa", "plum blossom"], ["봄", "bom", "spring"], ["꽃", "kkot", "flower"]], "sentences": [["매화가 가장 먼저 핍니다.", "Mae-hwa-ga ga-jang meon-jeo pim-ni-da.", "The plum blossom blooms first."]], "culture": [["🌸 매화의 뜻", "추운 겨울 끝에 가장 먼저 피어 절개와 희망을 상징합니다."]]}, "qna": [["매화는 무슨 뜻인가요?", "매화는 추운 겨울 끝에 가장 먼저 피어 절개와 희망을 뜻해요. 어려움을 이겨 내는 강인함의 상징이지요."], ["왜 겨울에 피나요?", "매화는 아직 추운 이른 봄, 눈 속에서 꽃을 피워요. 그래서 시련을 견디고 봄을 알리는 꽃으로 사랑받지요."], ["가지를 먼저 그리나요?", "네, 늙고 굵은 가지를 먼저 힘 있게 그려요. 거칠고 마른 붓(갈필)으로 그리면 세월의 멋이 살지요."], ["꽃은 어떻게 그리나요?", "매화 꽃은 다섯 장의 둥근 꽃잎으로 그려요. 가지 위에 점점이 피어나게 하면 단아하지요."], ["태점이 무엇인가요?", "가지에 콕콕 찍는 작은 점이에요. 이끼나 새순처럼 보여 가지가 더 생생하고 운치 있어 보이지요."], ["꽃을 많이 그리나요?", "활짝 핀 꽃과 봉오리를 섞어 그려요. 다 피지 않은 봉오리가 있어야 피어나는 기운이 느껴지지요."], ["늙은 가지를 강조하는 이유가 있나요?", "오래된 가지에서도 새 꽃이 피니, 노년의 강인함과 희망을 보여 줘요. 그 대비가 매화의 멋이지요."], ["매화 그림은 어디에 걸었나요?", "정초에 사랑방에 걸어 새봄의 희망을 빌었어요. 선비가 특히 아끼던 꽃이지요."], ["나도 그릴 수 있을까요?", "그럼요. 굵은 가지를 긋고 다섯 잎 꽃을 점점이 더한 뒤 작은 점을 찍으면 매화가 돼요."], ["오늘 무엇을 느끼면 될까요?", "추위 끝에 가장 먼저 피는 용기를 느껴 보세요. 그게 매화가 전하는 희망이에요."]]}, {"n": 8, "id": "dongyang:2-4", "title": "사군자 4 — 국화", "diff": "🌱", "obj": "국화를 치는 법을 배운다.", "type": "brush", "meta": "기법: 몰골법 · 삼묵법 · 측필 · 발묵", "blocks": [{"t": "국화 꽃", "e": "꽃잎은 두께차가 나는 선으로 긋는다. 소국은 화심에서 방사형으로 그린 뒤 화심을 점으로 채우고, 대국은 화심에서 점차 벌어지게. 봉오리~만개를 익힌다."}, {"t": "국화 잎", "e": "삼묵법을 만든 뒤 몰골법으로 측필해 긋는다. 첫 잎이 가장 크고 점차 작게. 발묵 잎이 마를 즈음 잎맥을 그어 번지지 않게 한다."}], "photos": {"base": "dongyang/2-4/", "count": 4}, "korean2": {"words": [["국화", "guk-hwa", "chrysanthemum"], ["가을", "ga-eul", "autumn"], ["서리", "seo-ri", "frost"]], "sentences": [["국화는 가을에 핍니다.", "Guk-hwa-neun ga-eul-e pim-ni-da.", "Chrysanthemums bloom in autumn."]], "culture": [["🌼 국화의 뜻", "서리를 이기고 피어 흔들리지 않는 지조를 뜻합니다."]]}, "qna": [["국화는 무슨 뜻인가요?", "국화는 서리를 이기고 가을에 홀로 피어 흔들리지 않는 지조를 뜻해요. 늦가을의 절개를 상징하지요."], ["왜 가을에 피나요?", "다른 꽃이 다 진 서리 내린 가을에 피어서, 어려움 속에서도 지조를 지키는 모습으로 사랑받았어요."], ["국화는 어떻게 그리나요?", "가운데 꽃술부터 시작해 꽃잎을 빙 둘러 그려요. 잎이 많아 풍성하니 차근차근 겹쳐 그리면 좋지요."], ["몰골법으로 그린다는 게 뭔가요?", "윤곽선 없이 붓에 먹과 색을 묻혀 꽃잎을 바로 찍어 그려요. 한 번에 그려 시원하고 자연스럽지요."], ["꽃잎이 많아 어려워요.", "처음엔 안쪽 작은 잎부터, 바깥으로 갈수록 길게 그리면 돼요. 천천히 둘러 가면 풍성해져요."], ["잎과 줄기도 같이 그리나요?", "네, 진한 먹으로 잎과 줄기를 그려 꽃을 받쳐 줘요. 잎이 있어야 꽃이 더 도드라지지요."], ["삼묵법이 무엇인가요?", "한 붓에 진한 먹·중간 먹·연한 먹을 함께 묻혀 쓰는 법이에요. 한 번에 그려도 농담이 자연스럽게 나오지요."], ["국화 그림은 어디에 걸었나요?", "가을철 사랑방에 걸어 지조와 풍요를 새겼어요. 은은한 기품이 어른 방에 잘 어울렸지요."], ["나도 그릴 수 있을까요?", "그럼요. 가운데부터 꽃잎을 둘러 그리고 잎을 받쳐 주면 국화가 돼요. 천천히 하면 됩니다."], ["오늘 무엇을 느끼면 될까요?", "서리에도 굽히지 않는 은은한 지조를 느껴 보세요. 그게 국화의 마음이에요."]]}, {"n": 9, "id": "dongyang:3-1", "title": "과일류 표현 1 — 사과", "diff": "🌱", "obj": "과일류로 기본 동양화 채색을 익힌다.", "type": "brush", "meta": "기법: 수묵 채색 · 삼묵법 · 채색물감", "blocks": [{"t": "사과의 특징·스케치", "e": "위쪽은 울퉁불퉁하고 아래는 매끈한 가분수 형태. 동그랗게만 그리지 말고 특징을 살려 스케치한다."}, {"t": "수묵 채색", "e": "중심부터 농묵으로, 외곽으로 가며 중·담묵으로. 아래는 물+담묵으로 윗면·아랫면 차이를 주어 입체감을 낸다."}, {"t": "채색물감", "e": "삼묵법처럼 한 붓에 농담을 담아 채색한다. 외곽선은 채색이 마른 뒤 그어야 먹선이 번지지 않는다."}], "photos": {"base": "dongyang/3-1/", "count": 4}, "korean2": {"words": [["사과", "sa-gwa", "apple"], ["빨강", "ppal-gang", "red"], ["열매", "yeol-mae", "fruit"]], "sentences": [["사과가 둥급니다.", "Sa-gwa-ga dung-geum-ni-da.", "The apple is round."]], "culture": [["🍎 과일 그리기", "둥근 형태와 먹의 농담으로 사과의 부피를 표현합니다."]]}, "qna": [["과일도 동양화로 그리나요?", "네, 사과 같은 과일도 먹과 채색으로 그려요. 둥근 형태와 농담으로 탐스러운 느낌을 내지요."], ["사과의 둥근 느낌은 어떻게 내나요?", "한쪽을 진하게 다른 쪽을 연하게 칠해요. 이 농담 덕분에 평평하지 않고 둥글게 보이지요."], ["수묵 채색이 무엇인가요?", "먹으로 형태를 잡고 그 위에 옅은 색을 더하는 방법이에요. 먹의 깊이와 색의 화사함을 함께 살리지요."], ["삼묵법을 여기서도 쓰나요?", "네, 한 붓에 진하고 연한 먹을 같이 묻혀 칠하면 한 번에 둥근 명암이 나와요. 아주 편리하지요."], ["색은 어떻게 칠하나요?", "빨강·노랑·연두를 옅게 올려요. 먹이 비치도록 연하게 칠하면 더 자연스럽고 곱지요."], ["꼭지나 잎도 그리나요?", "네, 위쪽 꼭지와 잎을 더해요. 작은 꼭지 하나로도 진짜 사과 같은 느낌이 살아나지요."], ["서양화 사과와 어떻게 다른가요?", "서양화는 빛과 그림자를 빽빽이 채우고, 동양화는 여백을 두고 농담으로 가볍게 표현해요. 더 담백하지요."], ["여러 개를 그릴 때 요령이 있나요?", "앞 사과는 진하고 크게, 뒤 사과는 연하고 작게 그려요. 그러면 앞뒤 거리가 생기지요."], ["나도 그릴 수 있을까요?", "그럼요. 둥근 형태를 그리고 한쪽을 진하게 칠한 뒤 옅은 색을 올리면 사과가 돼요."], ["오늘 무엇을 느끼면 될까요?", "먹과 옅은 색만으로도 탐스러운 과일이 된다는 걸 느껴 보세요. 담백한 멋이 있어요."]]}, {"n": 10, "id": "dongyang:3-2", "title": "과일류 표현 2 — 감·귤", "diff": "🌱", "obj": "감과 귤을 그린다.", "type": "brush", "meta": "기법: 수묵 채색 · 채색물감 · 터치", "blocks": [{"t": "감", "e": "꼭지는 함몰, 잎 4장 부분은 솟음, 사과보다 작고 넓적. 잎·꼭지 농묵 → 중심부터 농묵 → 외곽 중·담묵. 단감·홍시를 그려본다."}, {"t": "귤", "e": "꼭지가 작고 표면이 울퉁불퉁하다. 농담을 담은 터치를 연결해 울퉁한 표면 질감을 표현한다."}], "photos": {"base": "dongyang/3-2/", "count": 4}, "korean2": {"words": [["감", "gam", "persimmon"], ["귤", "gyul", "tangerine"], ["주황", "ju-hwang", "orange"]], "sentences": [["귤은 주황색입니다.", "Gyul-eun ju-hwang-saek-im-ni-da.", "Tangerines are orange."]], "culture": [["🍊 감과 귤", "가을 과일을 따뜻한 색으로 표현하는 연습입니다."]]}, "qna": [["감과 귤은 어떻게 그리나요?", "둥근 형태를 그리고 따뜻한 주황색을 옅게 올려요. 가을 과일다운 넉넉한 빛이 살아나지요."], ["감과 귤의 색이 다른가요?", "감은 좀 더 붉은 주황, 귤은 밝은 주황이에요. 같은 주황이라도 조금 달리하면 둘이 구분되지요."], ["꼭지를 강조하나요?", "네, 감은 위쪽 네모난 감꼭지가 특징이에요. 꼭지를 진한 먹으로 또렷이 그리면 감답지요."], ["둥근 느낌은 어떻게 내나요?", "한쪽을 진하게 다른 쪽을 연하게 바림해요. 빛이 닿는 쪽을 밝게 두면 입체감이 살지요."], ["터치로 그린다는 게 뭔가요?", "붓을 콕콕 찍거나 짧게 놀려 질감을 내는 거예요. 과일 껍질의 느낌을 가볍게 표현할 수 있지요."], ["잎도 같이 그리나요?", "네, 진한 녹색 잎을 곁들이면 주황 과일이 더 도드라져요. 색의 대비로 먹음직스러워지지요."], ["감과 귤은 무슨 뜻이 있나요?", "가을의 풍요와 넉넉함을 담아요. 따뜻한 색이라 보기만 해도 마음이 푸근해지지요."], ["여러 개를 모아 그리나요?", "네, 몇 개를 도란도란 모아 그리면 정겨워요. 크기와 방향을 조금씩 달리하면 자연스럽지요."], ["나도 그릴 수 있을까요?", "그럼요. 동그라미를 그리고 주황을 옅게 칠한 뒤 꼭지와 잎을 더하면 됩니다."], ["오늘 무엇을 느끼면 될까요?", "따뜻한 주황빛 가을의 넉넉함을 느껴 보세요. 색만 봐도 푸근해지지요."]]}, {"n": 11, "id": "dongyang:3-3", "title": "과일류 표현 3 — 포도", "diff": "🌱", "obj": "포도를 그린다.", "type": "brush", "meta": "기법: 수묵 채색 · 비백", "blocks": [{"t": "포도 스케치", "e": "원의 집합으로 여기지 말고, 가지를 중심으로 윤곽을 잡은 뒤 큰 알갱이부터. 알갱이 선도 농담·두께를 고려한다."}, {"t": "채색", "e": "중심 알갱이부터 농묵 → 외곽 중·담묵. 부분적으로 비백(飛白)을 살려 광택을 내되 과하지 않게. 청포도도 그려본다."}], "photos": {"base": "dongyang/3-3/", "count": 4}, "korean2": {"words": [["포도", "po-do", "grape"], ["송이", "song-i", "cluster"], ["보라", "bo-ra", "purple"]], "sentences": [["포도가 한 송이 있습니다.", "Po-do-ga han song-i it-seum-ni-da.", "There is a cluster of grapes."]], "culture": [["🍇 포도 그리기", "둥근 알을 송이로 모아 먹의 농담으로 그립니다."]]}, "qna": [["포도는 동양화로 어떻게 그리나요?", "둥근 알을 송이로 모아 그리고 보라색을 옅게 올려요. 덩굴과 잎을 더하면 운치가 살지요."], ["알의 둥근 느낌은 어떻게 내나요?", "알마다 한쪽을 진하게 다른 쪽을 연하게 바림해요. 작은 알 하나하나가 동그랗게 살아나지요."], ["비백이 무엇인가요?", "붓의 먹이 마르며 사이사이 흰 줄이 비치는 걸 비백이라 해요. 늙은 덩굴줄기에 쓰면 메마른 멋이 나지요."], ["덩굴손은 어떻게 그리나요?", "가늘고 구불구불한 선을 빙글빙글 돌려 그려요. 덩굴손이 있어야 포도가 더 생생해 보이지요."], ["포도는 무슨 뜻인가요?", "알이 많아 자손 번창과 풍요를 뜻해요. 그래서 옛 그림에 즐겨 등장했지요."], ["잎은 어떻게 그리나요?", "넓은 잎을 진한 먹과 녹색으로 그려요. 잎이 알을 가려 주면 더 풍성하고 자연스럽지요."], ["송이를 탐스럽게 하려면요?", "알을 촘촘히 겹쳐 그리고 위는 넓게 아래는 좁게 모아요. 그러면 묵직한 한 송이가 되지요."], ["먹으로만 그려도 되나요?", "네, 색 없이 먹의 농담만으로도 멋스러워요. 옛 문인화에는 먹포도가 많답니다."], ["나도 그릴 수 있을까요?", "그럼요. 작은 동그라미를 송이로 모으고 보라를 옅게 칠한 뒤 덩굴손을 더하면 포도가 돼요."], ["오늘 무엇을 느끼면 될까요?", "알알이 맺힌 포도의 풍성함을 느껴 보세요. 자손 번창의 좋은 뜻도 함께요."]]}, {"n": 12, "id": "dongyang:3-4", "title": "화훼류 표현 1 — 장미", "diff": "🌱", "obj": "장미를 그린다.", "type": "brush", "meta": "기법: 수묵 채색 · 채색물감", "blocks": [{"t": "장미 꽃", "e": "화심은 태엽처럼 짜임새 있게. 벌어지는 꽃잎은 붓을 눕혀 농담을 살리되 짙은 쪽이 바깥, 옅은 쪽이 화심을 향하게. 꽃받침을 그린다."}, {"t": "이파리", "e": "뾰족하게, 총 5장(큰 3·작은 2), 마지막에 잎맥. 줄기로 내려갈수록 작아진다."}, {"t": "채색물감", "e": "물감을 넉넉히 써야 번지지 않고 선명하다. 이파리와 꽃을 각각 다른 배합으로 채색한다."}], "photos": {"base": "dongyang/3-4/", "count": 4}, "korean2": {"words": [["장미", "jang-mi", "rose"], ["가시", "ga-si", "thorn"], ["빨강", "ppal-gang", "red"]], "sentences": [["장미에는 가시가 있습니다.", "Jang-mi-e-neun ga-si-ga it-seum-ni-da.", "Roses have thorns."]], "culture": [["🌹 화훼 그리기", "꽃잎이 겹치는 장미로 화려한 꽃을 표현합니다."]]}, "qna": [["장미도 동양화로 그리나요?", "네, 화훼(꽃 그림)의 하나로 장미도 그려요. 겹겹의 꽃잎을 먹과 채색으로 화사하게 표현하지요."], ["겹친 꽃잎은 어떻게 그리나요?", "가운데 작은 꽃잎부터 시작해 바깥으로 갈수록 크고 벌어지게 그려요. 안에서 밖으로 둘러 가면 자연스럽지요."], ["꽃잎의 부드러움은 어떻게 내나요?", "꽃잎 안쪽을 진하게, 끝을 연하게 바림해요. 그러면 보드라운 꽃잎의 느낌이 살아나지요."], ["가시도 그리나요?", "네, 줄기에 작은 가시를 더해요. 장미다운 특징이라 그려 주면 더 장미답지요."], ["색은 어떻게 칠하나요?", "빨강·분홍을 옅게 여러 번 올려요. 한 번에 진하게 칠하기보다 겹쳐 올리면 더 곱고 깊지요."], ["잎은 어떻게 그리나요?", "톱니 모양의 잎을 진한 녹색으로 그려요. 잎맥을 살짝 그어 주면 더 생생해지지요."], ["봉오리도 같이 그리나요?", "네, 활짝 핀 꽃과 봉오리를 섞어요. 피어나는 기운이 함께 있어야 그림이 살지요."], ["수묵 채색의 멋이 무엇인가요?", "먹의 깊이 위에 옅은 색을 올려, 화려하면서도 담백한 멋을 함께 내는 거예요. 동양화다운 화사함이지요."], ["나도 그릴 수 있을까요?", "그럼요. 가운데부터 꽃잎을 둘러 그리고 빨강·분홍을 옅게 올린 뒤 잎과 가시를 더하면 장미가 돼요."], ["오늘 무엇을 느끼면 될까요?", "화려한 장미도 동양화로 그리면 담백한 멋이 더해진다는 걸 느껴 보세요."]]}]}, {"key": "drawing", "name": "기초드로잉", "sub": "선·기본도형 12차시", "initial": "드", "color": "#D89A3E", "stages": ["순서", "따라하기", "창작", "한국어", "AI"], "lessons": [{"n": 1, "id": "drawing:1-1", "title": "다양한 선 실험", "diff": "🌱", "obj": "다양한 선 실험을(를) 그려보자.", "type": "image", "meta": "1주차 · 선", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/1-1/", "count": 4, "full": true}, "korean2": {"words": [["선", "seon", "line"]], "sentences": [["선을(를) 그립니다.", "seon-eul geu-rim-ni-da.", "I draw the line."]]}, "qna": [["선 연습이 왜 중요한가요?", "모든 그림은 선 하나에서 시작해요. 선이 손에 익으면 무엇이든 그릴 수 있으니, 가장 먼저 익히는 기초지요."], ["진한 선과 흐린 선은 어떻게 만드나요?", "연필에 힘을 주면 진하게, 힘을 빼면 흐리게 그려져요. 힘을 주었다 뺐다 하며 변화를 연습해 보세요."], ["넓은 선은 어떻게 긋나요?", "연필을 눕혀서 옆면으로 그으면 넓고 부드러운 선이 나와요. 면을 칠할 때 아주 쓸모 있지요."], ["손에 힘이 자꾸 들어가요.", "처음엔 누구나 그래요. 어깨와 손목에 힘을 빼고 천천히 그으면 선이 한결 부드러워진답니다."], ["어떤 연필이 좋은가요?", "무르고 진한 연필(B 계열)이 부드러워 어르신께 편해요. 색연필·콘테로 연습해도 좋지요."], ["선을 똑바로 못 긋겠어요.", "괜찮아요. 처음부터 곧게 긋는 사람은 없어요. 같은 선을 여러 번 그어 보면 점점 고와집니다."], ["자유롭게 그어 보라는 게 무슨 뜻인가요?", "정해진 모양 없이 손이 가는 대로 이리저리 그어 보는 거예요. 손을 푸는 좋은 준비 운동이지요."], ["하루에 얼마나 하면 되나요?", "딱 10분이면 충분해요. 매일 조금씩 꾸준히 하는 게 한 번에 많이 하는 것보다 좋아요."], ["잘 못 그려도 괜찮을까요?", "그럼요. 오늘은 잘 그리는 게 아니라 손에 익히는 시간이에요. 그은 것만으로 충분합니다."], ["오늘은 무엇을 해보면 될까요?", "진한 선, 흐린 선, 넓은 선을 한 줄씩 그어 보세요. 그게 오늘의 멋진 시작이에요."]]}, {"n": 2, "id": "drawing:1-2", "title": "직선", "diff": "🌱", "obj": "직선을(를) 그려보자.", "type": "image", "meta": "1주차 · 선", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/1-2/", "count": 4, "full": true}, "korean2": {"words": [["직선", "jik-seon", "straight line"]], "sentences": [["직선을(를) 그립니다.", "jik-seon-eul geu-rim-ni-da.", "I draw the straight line."]]}, "qna": [["직선은 어떻게 곧게 긋나요?", "시작점과 끝점을 먼저 정하고, 끝점을 바라보며 한 번에 그어요. 천천히 하면 선이 곧아진답니다."], ["자를 써도 되나요?", "처음엔 자를 대고 익혀도 좋아요. 익숙해지면 자 없이 그어 보면서 손의 감을 길러요."], ["선이 자꾸 휘어요.", "괜찮아요. 손목만 쓰지 말고 팔 전체를 움직이면 더 곧게 그어져요. 여러 번 연습하면 좋아집니다."], ["가로·세로를 다 연습하나요?", "네, 가로선·세로선·사선을 골고루 그어 봐요. 방향마다 손의 느낌이 달라 두루 익히면 좋지요."], ["직선은 어디에 쓰이나요?", "건물·상자·울타리처럼 반듯한 것을 그릴 때 써요. 기본 중의 기본이라 쓸 데가 아주 많지요."], ["선 간격을 고르게 하려면요?", "눈으로 같은 간격을 가늠하며 천천히 그어요. 처음엔 어긋나도 반복하면 점점 고와집니다."], ["짧은 선이 나을까요, 긴 선이 나을까요?", "둘 다 연습하면 좋아요. 짧은 선은 또렷하게, 긴 선은 한 호흡에 죽 긋는 연습이 되지요."], ["힘 조절은 어떻게 하나요?", "처음엔 가볍게 긋고, 진하게 하고 싶으면 같은 선을 한 번 더 덧그어요. 그러면 깔끔하지요."], ["잘 못 그려도 괜찮을까요?", "그럼요. 곧은 선은 누구에게나 연습이 필요해요. 매일 몇 줄씩이면 충분합니다."], ["오늘은 무엇을 해보면 될까요?", "가로·세로·사선을 각각 몇 줄씩 그어 보세요. 곧게 긋는 감을 익히는 거예요."]]}, {"n": 3, "id": "drawing:1-3", "title": "곡선", "diff": "🌱", "obj": "곡선을(를) 그려보자.", "type": "image", "meta": "1주차 · 선", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/1-3/", "count": 4, "full": true}, "korean2": {"words": [["곡선", "gok-seon", "curve"]], "sentences": [["곡선을(를) 그립니다.", "gok-seon-eul geu-rim-ni-da.", "I draw the curve."]]}, "qna": [["곡선은 어떻게 부드럽게 긋나요?", "손목을 둥글게 돌리듯 움직이면 곡선이 부드러워져요. 천천히, 한 번에 이어 그으면 좋지요."], ["곡선이 자꾸 각이 져요.", "멈췄다 그으면 각이 생겨요. 멈추지 말고 한 호흡에 죽 이어 그으면 매끄러워진답니다."], ["동그라미가 찌그러져요.", "괜찮아요. 처음엔 다 그래요. 가볍게 여러 번 돌려 그리다 보면 점점 둥글어집니다."], ["큰 곡선과 작은 곡선을 다 연습하나요?", "네, 크게도 작게도 그어 봐요. 크기를 바꿔 가며 그으면 손이 더 자유로워지지요."], ["곡선은 어디에 쓰이나요?", "꽃·과일·얼굴·구름처럼 둥근 것을 그릴 때 써요. 부드러운 것은 거의 다 곡선이지요."], ["손에 힘을 빼라는데 어렵네요.", "어깨 힘을 먼저 빼고 팔을 가볍게 움직여 보세요. 힘이 빠지면 곡선이 한결 부드러워져요."], ["물결처럼 이어진 곡선도 연습하나요?", "네, 곡선을 위아래로 이으면 물결이 돼요. 같은 동작을 반복하니 곡선 연습에 아주 좋지요."], ["천천히가 좋을까요, 빠르게가 좋을까요?", "부드러운 곡선은 적당한 속도로 죽 긋는 게 좋아요. 너무 느리면 떨리고, 너무 빠르면 어긋나지요."], ["잘 못 그려도 괜찮을까요?", "그럼요. 곡선은 손을 푸는 즐거운 연습이에요. 모양보다 부드럽게 잇는 느낌이 중요하지요."], ["오늘은 무엇을 해보면 될까요?", "큰 곡선, 물결, 동그라미를 그어 보세요. 손목을 부드럽게 쓰는 게 핵심이에요."]]}, {"n": 4, "id": "drawing:1-4", "title": "지그재그선", "diff": "🌱", "obj": "지그재그선을(를) 그려보자.", "type": "image", "meta": "1주차 · 선", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/1-4/", "count": 4, "full": true}, "korean2": {"words": [["지그재그", "ji-geu-jae-geu", "zigzag"]], "sentences": [["지그재그을(를) 그립니다.", "ji-geu-jae-geu-eul geu-rim-ni-da.", "I draw the zigzag."]]}, "qna": [["지그재그선은 어떻게 그리나요?", "위로 올렸다 아래로 내렸다를 반복하며 뾰족하게 꺾어요. 톱니처럼 각이 또렷하면 잘 된 거예요."], ["꺾이는 각을 또렷하게 하려면요?", "방향을 바꿀 때 잠깐 멈췄다 반대로 그어요. 그러면 각이 분명해져 지그재그다워지지요."], ["간격을 고르게 하려면요?", "같은 높이, 같은 너비를 눈으로 가늠하며 그어요. 처음엔 어긋나도 반복하면 고와집니다."], ["지그재그는 어디에 쓰이나요?", "산봉우리·번개·뾰족한 무늬를 그릴 때 써요. 톱니 모양이 필요한 곳에 두루 쓰이지요."], ["촘촘한 지그재그도 그리나요?", "네, 간격을 좁혀 촘촘하게도 그어 봐요. 촘촘할수록 손놀림이 더 야무져지지요."], ["손목이 아파요.", "힘을 너무 줘서 그래요. 가볍게 쥐고 팔도 함께 움직이면 손목이 편해진답니다."], ["산 모양으로도 그리나요?", "네, 지그재그를 크게 그으면 산봉우리가 돼요. 풍경 그릴 때 바로 쓸 수 있지요."], ["선을 진하게 하려면요?", "한 번 그은 위에 같은 선을 덧그으면 진해져요. 또렷한 지그재그가 되지요."], ["잘 못 그려도 괜찮을까요?", "그럼요. 각이 조금 둥글어도 괜찮아요. 방향을 바꾸는 연습 자체가 도움이 됩니다."], ["오늘은 무엇을 해보면 될까요?", "지그재그를 한 줄, 촘촘한 지그재그를 한 줄, 산 모양을 하나 그어 보세요."]]}, {"n": 5, "id": "drawing:1-5", "title": "물결무늬선", "diff": "🌱", "obj": "물결무늬선을(를) 그려보자.", "type": "image", "meta": "1주차 · 선", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/1-5/", "count": 4, "full": true}, "korean2": {"words": [["물결", "mul-gyeol", "wave"]], "sentences": [["물결을(를) 그립니다.", "mul-gyeol-eul geu-rim-ni-da.", "I draw the wave."]]}, "qna": [["물결무늬선은 어떻게 그리나요?", "위아래로 부드럽게 오르내리며 이어 그어요. 각이 지지 않고 둥글둥글하면 물결다워지지요."], ["지그재그와 어떻게 다른가요?", "지그재그는 뾰족하게 꺾이고, 물결은 부드럽게 굽이쳐요. 같은 오르내림이라도 느낌이 다르지요."], ["물결 높이를 고르게 하려면요?", "같은 높이로 오르내리도록 천천히 그어요. 처음엔 들쭉날쭉해도 반복하면 가지런해집니다."], ["물결무늬는 어디에 쓰이나요?", "바다·강물·머리카락·천 주름을 그릴 때 써요. 부드럽게 흐르는 건 거의 물결선이지요."], ["겹쳐 그리면 무엇이 되나요?", "물결을 여러 겹 그리면 출렁이는 바다가 돼요. 위아래로 겹치면 깊이도 느껴지지요."], ["손을 어떻게 움직이나요?", "손목을 부드럽게 좌우로 흔들듯 움직여요. 힘을 빼면 물결이 한결 자연스러워지지요."], ["촘촘한 물결도 그리나요?", "네, 간격을 좁혀 촘촘하게도 그어 봐요. 잔잔한 물결이나 천의 주름에 잘 어울리지요."], ["속도는 어떻게 하나요?", "적당한 속도로 죽 이어 그어요. 너무 느리면 떨리고, 너무 빠르면 모양이 흐트러지지요."], ["잘 못 그려도 괜찮을까요?", "그럼요. 물결은 조금 흐트러져도 자연스러워요. 부드럽게 잇는 느낌이면 충분하지요."], ["오늘은 무엇을 해보면 될까요?", "완만한 물결, 촘촘한 물결, 겹친 물결을 그어 보세요. 바다처럼 보이면 성공이에요."]]}, {"n": 6, "id": "drawing:1-6", "title": "점선", "diff": "🌱", "obj": "점선을(를) 그려보자.", "type": "image", "meta": "1주차 · 선", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/1-6/", "count": 4, "full": true}, "korean2": {"words": [["점선", "jeom-seon", "dotted line"]], "sentences": [["점선을(를) 그립니다.", "jeom-seon-eul geu-rim-ni-da.", "I draw the dotted line."]]}, "qna": [["점선은 어떻게 그리나요?", "점이나 짧은 선을 일정한 간격을 두고 콕콕 찍어 이어요. 사이를 고르게 띄우는 게 핵심이지요."], ["간격을 고르게 하려면요?", "같은 크기, 같은 간격을 눈으로 가늠하며 찍어요. 처음엔 들쭉날쭉해도 반복하면 가지런해집니다."], ["점선은 어디에 쓰이나요?", "바느질 자국·길 표시·점선 무늬를 그릴 때 써요. 끊어진 듯 이어지는 선이 필요할 때 쓰지요."], ["점을 둥글게 찍으려면요?", "연필을 콕 눌렀다 떼면 둥근 점이 나와요. 짧게 누르면 작고, 길게 누르면 도톰해지지요."], ["곡선 점선도 그리나요?", "네, 곡선을 따라 점을 찍으면 곡선 점선이 돼요. 부드럽게 휘는 점선도 연습해 보면 좋지요."], ["손이 자꾸 흔들려요.", "팔꿈치를 종이에 가볍게 받치면 안정돼요. 그러면 점도 고르게 찍힌답니다."], ["점 크기를 같게 하려면요?", "누르는 힘을 일정하게 유지해요. 힘이 같으면 점 크기도 비슷해지지요."], ["점선 변형도 있나요?", "네, 작은 동그라미를 이어 찍거나 짧은 선을 섞기도 해요. 무늬처럼 보여 재미있지요."], ["잘 못 찍어도 괜찮을까요?", "그럼요. 점이 조금 달라도 괜찮아요. 간격을 맞춰 가는 연습 자체가 도움이 됩니다."], ["오늘은 무엇을 해보면 될까요?", "점을 가로로 한 줄, 점선을 한 줄, 곡선 점선을 하나 그어 보세요."]]}, {"n": 7, "id": "drawing:1-7", "title": "불규칙한 선", "diff": "🌱", "obj": "불규칙한 선을(를) 그려보자.", "type": "image", "meta": "1주차 · 선", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/1-7/", "count": 4, "full": true}, "korean2": {"words": [["불규칙선", "bul-gyu-chik-seon", "free line"]], "sentences": [["불규칙선을(를) 그립니다.", "bul-gyu-chik-seon-eul geu-rim-ni-da.", "I draw the free line."]]}, "qna": [["불규칙한 선이 무엇인가요?", "정해진 모양 없이 자유롭게 그은 선이에요. 손이 가는 대로 이리저리 그으며 마음을 푸는 거지요."], ["왜 불규칙한 선을 연습하나요?", "손을 자유롭게 풀어 주고 긴장을 없애 줘요. 규칙에서 벗어나니 오히려 편안해지지요."], ["어떻게 그으면 되나요?", "구불구불, 엉키게, 빙글빙글 — 정답이 없어요. 떠오르는 대로 마음껏 그어 보세요."], ["낙서처럼 해도 되나요?", "네, 낙서가 바로 좋은 연습이에요. 잘 그리려 하지 말고 손이 노는 대로 두면 됩니다."], ["이런 선은 어디에 쓰이나요?", "헝클어진 실·구름·연기·덤불처럼 자유로운 것을 그릴 때 써요. 자연스러운 느낌을 내지요."], ["손에 힘을 어떻게 하나요?", "힘을 쭉 빼고 가볍게 움직여요. 힘이 빠질수록 선이 더 자유롭고 부드러워지지요."], ["여러 색으로 해도 되나요?", "물론이에요. 색연필로 색을 바꿔 가며 그으면 더 즐거워요. 알록달록 자유롭게요."], ["마음이 편해지는 연습인가요?", "맞아요. 잘 그릴 필요가 없으니 마음이 가벼워져요. 손도 풀리고 기분도 좋아지지요."], ["잘 못 그려도 괜찮을까요?", "이 연습엔 '잘못'이 없어요. 그은 대로 다 맞아요. 마음껏 즐기시면 됩니다."], ["오늘은 무엇을 해보면 될까요?", "아무 모양이나 손 가는 대로 자유롭게 그어 보세요. 그것만으로 훌륭한 연습이에요."]]}, {"n": 1, "id": "drawing:2-1", "title": "구", "diff": "🌱", "obj": "구을(를) 그려보자.", "type": "image", "meta": "2주차 · 기본 도형", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/2-1/", "count": 4, "full": true}, "korean2": {"words": [["구", "gu", "sphere"]], "sentences": [["구을(를) 그립니다.", "gu-eul geu-rim-ni-da.", "I draw the sphere."]]}, "qna": [["구는 어떻게 그리나요?", "먼저 동그라미를 그려요. 거기에 한쪽을 어둡게 칠하는 명암을 넣으면 공처럼 둥글게 보이지요."], ["명암이 무엇인가요?", "밝은 곳과 어두운 곳을 말해요. 한쪽을 어둡게 칠하면 평평한 동그라미가 둥근 공으로 바뀌지요."], ["어느 쪽을 어둡게 칠하나요?", "빛이 오는 반대쪽을 어둡게 해요. 예를 들어 빛이 왼쪽 위에서 오면 오른쪽 아래를 어둡게 하지요."], ["빗금으로 어둡게 한다는 게 뭔가요?", "같은 방향의 짧은 선을 촘촘히 그어 어둡게 하는 거예요. 겹칠수록 더 진해지지요."], ["그림자도 그리나요?", "네, 공 아래 바닥에 그림자를 그려요. 그림자가 있으면 공이 바닥에 놓인 것처럼 안정돼 보이지요."], ["동그라미가 찌그러져요.", "괜찮아요. 가볍게 여러 번 돌려 그리면 점점 둥글어져요. 처음엔 누구나 그렇답니다."], ["명암을 부드럽게 잇는 법이 있나요?", "어두운 데서 밝은 데로 갈수록 힘을 점점 빼요. 그러면 자연스럽게 이어져 둥글어 보이지요."], ["구는 무엇을 그릴 때 도움이 되나요?", "사과·공·열매처럼 둥근 것을 그릴 때 바로 쓰여요. 둥근 것의 기본이 되지요."], ["나도 그릴 수 있을까요?", "그럼요. 동그라미를 그리고 한쪽을 빗금으로 어둡게 한 뒤 바닥에 그림자를 더하면 돼요."], ["오늘은 무엇을 해보면 될까요?", "동그라미 하나에 명암과 그림자를 넣어 공으로 만들어 보세요. 입체의 첫걸음이에요."]]}, {"n": 2, "id": "drawing:2-2", "title": "정육면체", "diff": "🌱", "obj": "정육면체을(를) 그려보자.", "type": "image", "meta": "2주차 · 기본 도형", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/2-2/", "count": 4, "full": true}, "korean2": {"words": [["정육면체", "jeong-yuk-myeon-che", "cube"]], "sentences": [["정육면체을(를) 그립니다.", "jeong-yuk-myeon-che-eul geu-rim-ni-da.", "I draw the cube."]]}, "qna": [["정육면체는 어떻게 그리나요?", "앞면 사각형을 그리고, 뒤 모서리를 사선으로 이어 윗면과 옆면을 만들어요. 그러면 상자처럼 보이지요."], ["사선으로 잇는 이유가 있나요?", "비스듬한 사선이 있어야 깊이가 생겨 입체로 보여요. 사선이 평행하면 더 반듯하지요."], ["세 면의 밝기를 다르게 하나요?", "네, 윗면은 밝게·옆면은 중간·앞면이나 한쪽은 어둡게 해요. 면마다 밝기가 달라야 입체감이 살지요."], ["왜 면마다 밝기가 다른가요?", "빛이 닿는 정도가 면마다 다르기 때문이에요. 밝고 어두움을 나누면 진짜 상자처럼 보이지요."], ["모서리가 잘 안 맞아요.", "괜찮아요. 연하게 먼저 그려 보고 맞으면 진하게 덧그려요. 그러면 깔끔하게 맞출 수 있지요."], ["보이지 않는 뒤 모서리도 그리나요?", "연습할 땐 점선으로 그려 보면 구조를 이해하기 좋아요. 완성할 땐 지워도 되지요."], ["명암은 어떻게 넣나요?", "어두운 면을 빗금으로 촘촘히 칠해요. 면 전체를 고르게 어둡게 하면 단단해 보이지요."], ["정육면체는 무엇에 도움이 되나요?", "상자·건물·가구처럼 각진 것을 그릴 때 바로 쓰여요. 각진 것의 기본이 되지요."], ["나도 그릴 수 있을까요?", "그럼요. 사각형을 그리고 뒤 모서리를 사선으로 이은 뒤 면마다 밝기를 달리하면 됩니다."], ["오늘은 무엇을 해보면 될까요?", "정육면체를 하나 그리고 세 면의 밝기를 다르게 칠해 보세요. 각진 입체의 기본이에요."]]}, {"n": 3, "id": "drawing:2-3", "title": "원기둥", "diff": "🌱", "obj": "원기둥을(를) 그려보자.", "type": "image", "meta": "2주차 · 기본 도형", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/2-3/", "count": 4, "full": true}, "korean2": {"words": [["원기둥", "won-gi-dung", "cylinder"]], "sentences": [["원기둥을(를) 그립니다.", "won-gi-dung-eul geu-rim-ni-da.", "I draw the cylinder."]]}, "qna": [["원기둥은 어떻게 그리나요?", "위에 납작한 타원을 그리고, 양옆으로 곧은 선을 내린 뒤 아래를 둥글게 닫아요. 그러면 기둥 모양이 되지요."], ["위는 왜 타원으로 그리나요?", "둥근 윗면을 비스듬히 보면 납작한 타원으로 보여요. 동그라미가 아니라 타원이어야 자연스럽지요."], ["옆면 명암은 어떻게 넣나요?", "한쪽 옆을 진하게, 가운데를 밝게, 반대쪽을 중간으로 칠해요. 둥글게 휘는 명암이 핵심이지요."], ["왜 가운데를 밝게 하나요?", "둥근 면은 가운데가 빛을 가장 많이 받아요. 가운데를 밝게 두면 통처럼 둥글어 보이지요."], ["아래도 타원으로 그리나요?", "네, 아랫면도 살짝 둥근 곡선으로 닫아요. 위아래가 둥글어야 원기둥다워지지요."], ["선이 곧게 안 내려와요.", "괜찮아요. 양옆 선을 연하게 먼저 긋고 맞으면 진하게 덧그려요. 자를 잠깐 써도 좋지요."], ["원기둥은 무엇을 그릴 때 쓰나요?", "컵·캔·나무 기둥·병처럼 둥근 통 모양을 그릴 때 써요. 쓸 데가 아주 많지요."], ["명암을 부드럽게 하려면요?", "어두운 쪽에서 밝은 쪽으로 갈수록 힘을 빼요. 그러면 둥글게 휘는 느낌이 자연스러워지지요."], ["나도 그릴 수 있을까요?", "그럼요. 위에 타원, 양옆에 곧은 선, 아래 곡선을 그리고 옆면에 명암을 넣으면 됩니다."], ["오늘은 무엇을 해보면 될까요?", "원기둥을 하나 그리고 옆면에 둥근 명암을 넣어 보세요. 컵이나 통을 그리는 기본이에요."]]}, {"n": 4, "id": "drawing:2-4", "title": "축구공", "diff": "🌱", "obj": "축구공을(를) 그려보자.", "type": "image", "meta": "2주차 · 기본 도형", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/2-4/", "count": 4, "full": true}, "korean2": {"words": [["축구공", "chuk-gu-gong", "soccer ball"]], "sentences": [["축구공을(를) 그립니다.", "chuk-gu-gong-eul geu-rim-ni-da.", "I draw the soccer ball."]]}, "qna": [["축구공은 어떻게 그리나요?", "먼저 원을 그리고, 가운데에 오각형을 그려요. 그 둘레로 육각형을 이어 붙이면 축구공 무늬가 되지요."], ["왜 오각형부터 그리나요?", "가운데 오각형을 기준으로 삼아야 둘레 무늬가 고르게 퍼져요. 중심을 먼저 잡는 게 핵심이지요."], ["오각형·육각형이 헷갈려요.", "오각형은 변이 다섯, 육각형은 여섯이에요. 가운데 검게 칠하는 게 오각형, 그 사이를 채우는 게 육각형이지요."], ["무늬가 자꾸 어긋나요.", "괜찮아요. 연하게 먼저 그려 보고 모양이 맞으면 진하게 덧그려요. 천천히 하면 점점 맞아집니다."], ["검게 칠하는 부분은 어디인가요?", "오각형 칸을 검게 칠해요. 검은 오각형과 흰 육각형이 번갈아 있어야 축구공다워지지요."], ["둥근 느낌은 어떻게 내나요?", "공의 가장자리로 갈수록 무늬를 작고 휘어지게 그려요. 그러면 평면이 아니라 둥근 공처럼 보이지요."], ["바느질 선도 그리나요?", "네, 칸과 칸 사이에 짧은 선을 더하면 진짜 축구공 같아요. 마지막에 상표를 그려도 재미있지요."], ["이 그림이 왜 좋은 연습인가요?", "원·오각형·육각형·명암을 한 번에 익힐 수 있어요. 앞서 배운 도형 연습이 다 모인 그림이지요."], ["나도 그릴 수 있을까요?", "그럼요. 원을 그리고 가운데 오각형부터 차근차근 둘레를 채우면 됩니다. 천천히 하면 누구나 돼요."], ["오늘은 무엇을 해보면 될까요?", "원에 오각형을 그리고 둘레에 육각형을 이어 축구공을 완성해 보세요. 칸을 칠하면 더 멋져요."]]}, {"n": 5, "id": "drawing:2-5", "title": "종이상자", "diff": "🌱", "obj": "종이상자을(를) 그려보자.", "type": "image", "meta": "2주차 · 기본 도형", "steps": ["아래 순서대로 그려보자."], "photos": {"base": "drawing/2-5/", "count": 4, "full": true}, "korean2": {"words": [["상자", "sang-ja", "box"]], "sentences": [["상자을(를) 그립니다.", "sang-ja-eul geu-rim-ni-da.", "I draw the box."]]}, "qna": [["종이상자는 어떻게 그리나요?", "정육면체처럼 앞면을 그리고 옆·윗면을 사선으로 이어요. 거기에 뚜껑이나 접힌 면을 더하면 상자가 되지요."], ["정육면체와 무엇이 다른가요?", "기본은 같지만 상자는 뚜껑·접힌 자국·두께가 있어요. 그 작은 부분을 더하면 진짜 상자처럼 보이지요."], ["뚜껑은 어떻게 그리나요?", "윗면 가장자리에 얇은 두께를 그리거나 열린 뚜껑을 사선으로 더해요. 그러면 상자다운 느낌이 살지요."], ["세 면의 밝기를 다르게 하나요?", "네, 윗면은 밝게·옆면은 어둡게 나눠요. 면마다 밝기가 달라야 단단한 상자로 보이지요."], ["모서리를 또렷하게 하려면요?", "모서리 선을 진하게 덧그어요. 모서리가 분명해야 상자가 야무져 보이지요."], ["접힌 면도 그리나요?", "네, 상자 뚜껑의 접힌 자국을 그리면 더 사실 같아요. 작은 디테일이 그림을 살리지요."], ["명암은 어떻게 넣나요?", "빛 반대쪽 면을 빗금으로 어둡게 칠해요. 바닥에 그림자를 더하면 더 안정돼 보이지요."], ["상자 그리기가 왜 좋은 연습인가요?", "직선·사선·명암을 모두 쓰는 종합 연습이에요. 가구나 건물 그리기로 이어지는 기초가 되지요."], ["나도 그릴 수 있을까요?", "그럼요. 정육면체를 그리고 뚜껑과 두께, 명암을 더하면 종이상자가 됩니다."], ["오늘은 무엇을 해보면 될까요?", "상자를 하나 그리고 뚜껑과 명암을 더해 보세요. 2주차 도형 연습의 마무리예요."]]}]}, {"key": "heritage", "name": "한국문화유산", "sub": "여행 전 한국어", "initial": "유", "color": "#3E7E8C", "stages": ["감상", "순서", "따라하기", "창작", "한국어", "AI"], "lessons": [{"n": 1, "id": "heritage:seoul-jongmyo", "title": "종묘 정전", "diff": "🌱", "obj": "종묘 정전을(를) 따라 그리며 한국어로 배워보자.", "type": "svg", "meta": "드로잉 포인트: 긴 수평선·기둥 반복", "korean": {"ko": "종묘", "rom": "Jongmyo", "en": "royal shrine"}, "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "heritage/seoul-jongmyo/original.jpg", "qna": [["종묘는 어떤 곳인가요?", "조선 왕과 왕비의 신주(위패)를 모시고 제사를 지내던 사당이에요. 600년 넘게 이어진 귀한 곳이라 세계유산으로 지정됐지요."], ["정전이 무엇인가요?", "종묘에서 가장 중심이 되는 긴 건물이에요. 기둥이 줄지어 늘어선 모습이 장엄하고 단정하지요."], ["왜 이렇게 옆으로 긴가요?", "모시는 왕이 늘어날 때마다 칸을 옆으로 이어 붙였어요. 그래서 우리나라에서 가장 긴 목조 건물이 되었지요."], ["지금도 제사를 지내나요?", "네, 해마다 '종묘제례'라는 제사를 지내요. 그때의 음악과 춤도 함께 세계유산으로 이어지고 있지요."], ["그리기 좋은 점이 뭔가요?", "긴 수평 지붕선과 줄지어 선 기둥이에요. 곧은 가로선과 세로 기둥을 반복해 그리면 장엄함이 살지요."], ["언제 가면 좋은가요?", "조용히 걷기 좋은 곳이라 평일 낮이 좋아요. 제례가 있는 날엔 옛 의식을 직접 볼 수도 있지요."], ["여기서 쓸 한국어 한마디는?", "“여기는 어디예요?”라고 물어보세요. 길을 묻는 가장 쉬운 한국어랍니다."], ["입장할 때 필요한 말은?", "“표는 어디서 사요?”라고 하면 돼요. 매표소를 찾을 때 쓰는 말이지요."], ["나도 그릴 수 있을까요?", "그럼요. 긴 가로선으로 지붕을 긋고 아래 기둥을 같은 간격으로 그리면 종묘 정전이 돼요."], ["오늘 무엇을 느끼면 될까요?", "조상을 기리는 단정하고 고요한 마음을 느껴 보세요. 그게 종묘에 담긴 정신이에요."]], "svgViewer": "<svg viewBox=\"0 0 460 300\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"30\" y1=\"250\" x2=\"430\" y2=\"250\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\"/><line x1=\"30\" y1=\"262\" x2=\"430\" y2=\"262\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\"/></g><g cl 역사의 한 장면을 담은 건물이지요."], ["그리기 좋은 점이 뭔가요?", "곧게 줄지은 기둥과 반듯한 좌우 대칭이에요. 세로 기둥을 같은 간격으로 그리면 위엄이 살지요."], ["안에는 무엇이 있나요?", "지금은 그 시절 생활을 보여 주는 전시관이에요. 옛 가구와 방을 둘러볼 수 있지요."], ["여기서 쓸 한국어 한마디는?", "“몇 시에 열어요?”라고 물어보세요. 관람 시간을 확인하는 말이에요."], ["관람할 때 한마디는?", "“들어가도 돼요?”라고 하면 돼요. 전시관에 들어갈 때 쓰는 말이지요."], ["나도 그릴 수 있을까요?", "그럼요. 곧은 세로 기둥을 같은 간격으로 여러 개 그리고 위에 지붕을 얹으면 돼요."], ["오늘 무엇을 느끼면 될까요?", "옛것과 새것이 만난 변화의 시대를 느껴 보세요. 역사가 담긴 건물이지요."]], "svgViewer": "<svg viewBox=\"0 0 400 320\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"40\" y1=\"280\" x2=\"360\" y2=\"280\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"40\" y1=\"290\" x2=\"360\" y2=\"290\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"40\" y1=\"300\" x2=\"360\" y2=\"300\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M120 96 L200 60 L280 96\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><line x1=\"60\" y1=\"110\" x2=\"340\" y2=\"110\" stroke=\"#f3ead4\" stroke-width=\"2.2\" stroke-linecap=\"round\"/><line x1=\"60\" y1=\"122\" x2=\"340\" y2=\"122\" stroke=\"#f3ead4\" stroke-width=\"2.2\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"4\"><line x1=\"70\" y1=\"122\" x2=\"70\" y2=\"280\" stroke=\"#f3ead4\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"122\" y1=\"122\" x2=\"122\" y2=\"280\" stroke=\"#f3ead4\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"174\" y1=\"122\" x2=\"174\" y2=\"280\" stroke=\"#f3ead4\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"226\" y1=\"122\" x2=\"226\" y2=\"280\" stroke=\"#f3ead4\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"278\" y1=\"122\" x2=\"278\" y2=\"280\" stroke=\"#f3ead4\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"330\" y1=\"122\" x2=\"330\" y2=\"280\" stroke=\"#f3ead4\" 과 어우러져, 세계유산으로 지정된 귀한 곳이지요."], ["'비밀의 정원'이라고도 하던데요?", "네, 왕과 가족만 거닐던 깊은 정원이라 그렇게 불려요. 지금은 우리도 거닐 수 있지요."], ["부용지가 무엇인가요?", "후원에 있는 네모난 연못이에요. 물가에 정자가 있어 풍경이 그림처럼 곱지요."], ["자연을 그대로 살렸다던데요?", "맞아요. 산과 나무를 깎지 않고 그 사이에 정자와 연못을 살짝 두었어요. 자연과 어우러진 멋이지요."], ["그리기 좋은 점이 뭔가요?", "연못의 잔잔한 곡선과 정자, 둘러싼 숲의 곡선이에요. 부드러운 곡선을 살려 그리면 운치가 나지요."], ["언제 가면 좋은가요?", "단풍 드는 가을이 특히 아름다워요. 정해진 시간에 안내를 받아 둘러보는 곳이지요."], ["여기서 쓸 한국어 한마디는?", "“참 아름다워요.”라고 말해 보세요. 감탄을 전하는 따뜻한 한국어예요."], ["안내를 받을 때 한마디는?", "“같이 가도 돼요?”라고 하면 돼요. 안내 시간에 합류할 때 쓰지요."], ["나도 그릴 수 있을까요?", "그럼요. 잔잔한 연못을 곡선으로 그리고 물가에 작은 정자를 얹으면 돼요."], ["오늘 무엇을 느끼면 될까요?", "자연과 어우러진 고요한 아름다움을 느껴 보세요. 후원의 마음이지요."]], "svgViewer": "<svg viewBox=\"0 0 420 320\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><rect x=\"40\" y=\"220\" width=\"340\" height=\"80\" rx=\"8\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><rect x=\"170\" y=\"190\" width=\"80\" height=\"14\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><path d=\"M 160 136 Q 210 160 210 160 Q 210 160 260 136\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"4\"><line x1=\"180\" y1=\"168\" x2=\"180\" y2=\"190\" stroke=\"#f3ead4\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><line x1=\"200\" y1=\"168\" x2=\"200\" y2=\"190\" stroke=\"#f3ead4\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><line x1=\"220\" y1=\"168\" x2=\"220\" y2=\"190\" stroke=\"#f3ead4\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><line x1=\"240\" y1=\"168\" x2=\"240\" y2=\"190\" stroke=\"#f3ead4\" stroke-width=\"1.8\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"5\"><path d=\"M60 200 q20 -60 50 -50 q26 8 16 50 Z\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" strok , ["탁자식이 무엇인가요?", "두 개의 굄돌 위에 넓은 돌을 얹어 탁자처럼 보이는 모양이에요. 강화 고인돌이 그 대표지요."], ["그 큰 돌을 어떻게 옮겼을까요?", "수많은 사람이 통나무와 밧줄로 함께 옮겼다고 해요. 그 협동이 놀랍지요."], ["그리기 좋은 점이 뭔가요?", "넓고 평평한 덮개돌과 그것을 받친 두 굄돌이에요. 굵은 수평선과 세로 받침을 그리면 고인돌이 되지요."], ["왜 세계유산인가요?", "고인돌이 이렇게 많이 모인 곳은 드물어요. 옛 사람들의 삶을 알려 주는 귀한 유산이지요."], ["여기서 쓸 한국어 한마디는?", "“이게 뭐예요?”라고 물어보세요. 처음 보는 것을 물을 때 쓰는 한국어예요."], ["설명을 부탁할 때 한마디는?", "“설명해 주세요.”라고 하면 돼요. 안내를 청할 때 쓰지요."], ["나도 그릴 수 있을까요?", "그럼요. 굵은 가로 덮개돌을 긋고 아래 두 받침돌을 세우면 탁자식 고인돌이 돼요."], ["오늘 무엇을 느끼면 될까요?", "먼 옛 조상들의 삶과 협동을 떠올려 보세요. 시간을 거슬러 가는 그림이지요."]], "svgViewer": "<svg viewBox=\"0 0 360 280\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><path d=\"M40 110 q140 -20 280 0\" stroke=\"#f3ead4\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M48 150 q132 -16 264 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><line x1=\"44\" y1=\"110\" x2=\"48\" y2=\"150\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><line x1=\"320\" y1=\"110\" x2=\"312\" y2=\"150\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><line x1=\"96\" y1=\"150\" x2=\"92\" y2=\"240\" stroke=\"#f3ead4\" stroke-width=\"8\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"4\"><line x1=\"268\" y1=\"150\" x2=\"272\" y2=\"240\" stroke=\"#f3ead4\" stroke-width=\"8\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"5\"><line x1=\"30\" y1=\"244\" x2=\"330\" y2=\"244\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"6\"><path d=\"M40 110 q140 -20 280 0 q-132 16 -264 0 Z\" fill=\"#a89a82\" fill-opacity=\"0.8\"/><rect x=\"86\" y=\"150\" width=\"16\" height=\"92\" fill=\"#a89a82\" fill-opacity=\"0.75\"/><rect x=\"262\" y=\"  피어오르는 연기예요. 돌탑을 같은 간격으로 그리고 연기를 곡선으로 올리면 좋지요."], ["지금도 시연을 하나요?", "네, 정해진 시간에 불 피우는 모습을 보여 줘요. 옛 통신을 직접 볼 수 있어 흥미롭지요."], ["여기서 쓸 한국어 한마디는?", "“저게 뭐예요?”라고 물어보세요. 멀리 있는 것을 가리키며 묻는 말이에요."], ["시간을 물을 때 한마디는?", "“몇 시에 해요?”라고 하면 돼요. 시연 시간을 확인할 때 쓰지요."], ["나도 그릴 수 있을까요?", "그럼요. 돌탑 다섯 개를 나란히 그리고 위로 연기를 구불구불 올리면 봉수대가 돼요."], ["오늘 무엇을 느끼면 될까요?", "불빛으로 소식을 잇던 옛 지혜를 느껴 보세요. 멀리까지 마음을 전한 거지요."]], "svgViewer": "<svg viewBox=\"0 0 420 300\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"30\" y1=\"212\" x2=\"390\" y2=\"212\" stroke=\"#f3ead4\" stroke-width=\"2.2\" stroke-linecap=\"round\"/><line x1=\"30\" y1=\"224\" x2=\"390\" y2=\"224\" stroke=\"#f3ead4\" stroke-width=\"2.2\" stroke-linecap=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M44 210 L52 150 q18 -20 36 0 L96 210\" stroke=\"#f3ead4\" stroke-width=\"2.2\" fill=\"none\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><path d=\"M124 210 L132 150 q18 -20 36 0 L176 210\" stroke=\"#f3ead4\" stroke-width=\"2.2\" fill=\"none\" stroke-linejoin=\"round\"/><path d=\"M184 210 L192 150 q18 -20 36 0 L236 210\" stroke=\"#f3ead4\" stroke-width=\"2.2\" fill=\"none\" stroke-linejoin=\"round\"/><path d=\"M244 210 L252 150 q18 -20 36 0 L296 210\" stroke=\"#f3ead4\" stroke-width=\"2.2\" fill=\"none\" stroke-linejoin=\"round\"/><path d=\"M324 210 L332 150 q18 -20 36 0 L376 210\" stroke=\"#f3ead4\" stroke-width=\"2.2\" fill=\"none\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"4\"><path d=\"M62 210 a8 8 0 0 1 16 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M142 210 a8 8 0 0 1 16 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M202 210 a8 8 0 0 1 16 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M262 210 a8 8 0 0 1 16 0\" fill=\"none\" stroke=\"#f3ead4\" st 요. 어디서든 유용한 한국어예요."], ["나도 그릴 수 있을까요?", "그럼요. 능선을 따라 오르내리는 성벽을 긋고 가운데 둥근 성문을 그리면 돼요."], ["오늘 무엇을 느끼면 될까요?", "산과 성이 하나 된 든든함과 역사의 무게를 느껴 보세요."]], "svgViewer": "<svg viewBox=\"0 0 420 320\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><path d=\"M10 150 L110 110 L210 160 L310 110 L410 150\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M10 178 L110 138 L210 188 L310 138 L410 178\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><path d=\"M178 280 L178 230 a32 32 0 0 1 64 0 L242 280\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"4\"><path d=\"M 160 182 Q 210 206 210 206 Q 210 206 260 182\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"5\"><line x1=\"40\" y1=\"160\" x2=\"40\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\" stroke-linecap=\"round\"/><line x1=\"68.3333\" y1=\"160\" x2=\"68.3333\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\" stroke-linecap=\"round\"/><line x1=\"96.6667\" y1=\"160\" x2=\"96.6667\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\" stroke-linecap=\"round\"/><line x1=\"125\" y1=\"160\" x2=\"125\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\" stroke-linecap=\"round\"/><line x1=\"153.333\" y1=\"160\" x2=\"153.333\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\" stroke-linecap=\"round\"/><line x1=\"181.667\" y1=\"160\" x2=\"181.667\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\" stroke-linecap=\"round\"/><line x1=\"210\" y1=\"160\" x2=\"210\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\" stroke-linecap=\"round\"/><line x1=\"238.333\" y1=\"160\" x2=\"238.333\" y2=\"184\" stroke=\"#f3ead4\" stroke-width=\"0.9\ 원 화성 장안문을(를) 따라 그리며 한국어로 배워보자.", "type": "svg", "meta": "드로잉 포인트: 옹성·성문 지붕", "korean": {"ko": "성문", "rom": "seongmun", "en": "gate"}, "note": "단계 SVG 완성 (선으로 해체)", "viewImg": "heritage/suwon-janganmun/original.jpg", "qna": [["수원 화성은 어떤 곳인가요?", "정조 임금이 백성을 위해 새로 쌓은 성이에요. 과학과 정성이 어우러진 성으로 세계유산이지요."], ["장안문이 무엇인가요?", "화성의 북쪽 큰 문이에요. 우리나라 성문 중에서도 손꼽히게 크고 웅장하지요."], ["옹성이 무엇인가요?", "성문 앞을 둥글게 한 번 더 감싼 작은 성벽이에요. 문을 두 겹으로 지켜 더 튼튼했지요."], ["왜 백성을 위한 성이라 하나요?", "정조 임금이 일꾼에게 품삯을 주고 새 기술을 써서 쌓았어요. 백성을 아끼는 마음이 담긴 성이지요."], ["그리기 좋은 점이 뭔가요?", "둥근 옹성과 그 위 성문 지붕이에요. 둥근 곡선 성벽과 웅장한 지붕을 그리면 멋지지요."], ["성을 한 바퀴 돌 수 있나요?", "네, 성벽을 따라 한 바퀴 걷는 길이 있어요. 옛 성을 온전히 느낄 수 있지요."], ["여기서 쓸 한국어 한마디는?", "“여기가 입구예요?”라고 물어보세요. 들어가는 곳을 확인하는 말이에요."], ["표를 살 때 한마디는?", "“어른 한 장 주세요.”라고 하면 돼요. 입장권을 살 때 쓰는 말이지요."], ["나도 그릴 수 있을까요?", "그럼요. 둥근 옹성 벽을 그리고 그 위에 성문 지붕을 얹으면 장안문이 돼요."], ["오늘 무엇을 느끼면 될까요?", "백성을 아낀 임금의 마음과 옛 기술의 지혜를 느껴 보세요."]], "svgViewer": "<svg viewBox=\"0 0 420 340\" xmlns=\"http://www.w3.org/2000/svg\"><g class=\"step\" data-step=\"1\"><line x1=\"20\" y1=\"296\" x2=\"400\" y2=\"296\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"2\"><path d=\"M90 296 a120 120 0 0 1 240 0\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"3\"><path d=\"M170 296 L170 240 a40 40 0 0 1 80 0 L250 296\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"4\"><path d=\"M 120 182 Q 210 212 210 212 Q 210 212 300 182\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"5\"><path d=\"M 160 136 Q 210 160 210 160 Q 210 160 260 136\" fill=\"none\" stroke=\"#f3ead4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g class=\"step\" data-step=\"6\"   const d=a.lessons.filter(l=>progress[l.id]&&!l.soon).length;
  let h='<button class="back" onclick="home()">‹ 프로그램</button><h1 class="title" style="margin-top:8px">'+a.name+'</h1>'
   +'<div class="progress"><div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)"><span>진도</span><span>'+d+' / '+total+' 완료</span></div><div class="bar"><i style="width:'+(total?d/total*100:0)+'%"></i></div></div>';
  a.lessons.forEach((l,li)=>{const done=!!progress[l.id]&&!l.soon;
    const locked=!l.soon&&!previewAll&&li>0&&!progress[a.lessons[li-1].id]&&!done;
    if(l.soon){
      h+='<button class="lesson soon" onclick="lesson('+ai+','+li+')">'
        +'<span class="num">'+l.emoji+'</span><span class="lt"><b>'+l.title+'</b><span>'+l.meta+'</span></span>'
        +'<span class="state soonbadge">곧</span></button>';
    } else {
      h+='<button class="lesson'+(done?' done':'')+'" '+(locked?'disabled':'')+' onclick="lesson('+ai+','+li+')">'
        +'<span class="num">'+(done?'✓':l.n)+'</span><span class="lt"><b>'+l.title+'</b><span>'+l.diff+' '+l.meta+'</span></span>'
        +'<span class="state">'+(locked?'🔒':'›')+'</span></button>';
    }});
  main.innerHTML=h; scrollTo(0,0);
}

function drvThumb(id){return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1000';}
function orderPaired(l){
  var CAP=24;
  function allPhotos(){
    var ids=null;
    if(l.photos&&l.photos.ids) ids=l.photos.ids.map(drvThumb);
    else if(l.photos&&l.photos.single) ids=[AB+l.photos.single];
    var x='<p class="ph-note" style="margin-top:14px">과정 사진</p><div class="photos">';
    if(ids){ if(!ids.length) return '';
      ids.forEach(function(src){x+='<div class="photo"><img loading="lazy" src="'+src+'" onerror="this.closest(\'.photo\').remove()"></div>';});
      return x+'</div>';
    }
    if(!(l.photos&&l.photos.base)) return '';
    for(var i=1;i<=CAP;i++){x+='<div class="photo"><img loading="lazy" src="'+AB+l.photos.base+i+'.jpg" onerror="this.closest(\'.photo\').remove()"></div>';}
    return x+'</div><p class="ph-note">사진을 <code>'+AB+l.photos.base+'</code> 에 1.jpg부터 넣으면 모두 표시됩니다.</p>';
  }
  if(l.photos&&l.photos.full){
    var h='<h3>그리는 순서</h3><ol class="steps">';
    (l.steps||[]).forEach(function(t){h+='<li>'+t+'</li>';});
    h+='</ol>';
    for(var i=1;i<=CAP;i++){h+='<div class="dimg"><img loading="lazy" src="'+AB+l.photos.base+i+'.jpg" onerror="this.closest(\'.dimg\').remove()"></div>';}
    h+='<p class="ph-note">교안 그림 자리입니다. <code>'+AB+l.photos.base+'</code> 에 1.jpg부터 넣으면 표시됩니다.</p>';
    return h;
  }
  var h='<h3>그리는 순서</h3>';
  if(l.steps&&l.steps.length){h+='<ol class="steps">';l.steps.forEach(function(t){h+='<li>'+t+'</li>';});h+='</ol>';}
  h+=allPhotos();
  return h;
}

function photosHtml(l){
  if(!l.photos) return '';
  let items=[], note='';
  if(l.photos.ids){
    items=l.photos.ids.map(id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w1000');
    note='드라이브에서 불러옵니다. (01_minhwa 폴더가 "링크가 있는 모든 사용자"로 공유돼 있어야 보입니다.)';
  } else if(l.photos.single){
    items=[AB+l.photos.single]; note='순서 이미지를 <code>'+AB+'</code> 에 넣으면 표시됩니다.';
  } else if(l.photos.base){
    for(let i=1;i<=24;i++)items.push(AB+l.photos.base+i+'.jpg');
    note='<code>'+AB+l.photos.base+'</code> 에 사진을 넣으면 표시됩니다.';
  }
  if(!items.length) return '';
  let h='<div class="photos">';
  items.forEach(src=>{h+='<div class="photo"><img loading="lazy" referrerpolicy="no-referrer" src="'+src+'" onerror="this.closest(\'.photo\').remove()"></div>';});
  return h+'</div><p class="ph-note">과정 사진 — '+note+'</p>';
}

function stagePanel(a,l,stage){
  if(stage==='감상'){
    const src=(a.key==='heritage')?'공공누리 1유형 원본 사진':'구입 원본';
    if(l.viewImg){return '<h3>감상</h3><div class="dimg"><img src="'+AB+l.viewImg+'" onerror="this.style.display=\'none\';this.insertAdjacentHTML(\'afterend\',\'<div class=\\\'cv-wrap\\\' style=\\\'height:160px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:0 14px\\\'>'+src+' 사진을 '+AB+l.viewImg+' 에 넣으면 표시됩니다.</div>\')"></div><p style="margin:12px 0 0;font-size:14px;color:#6b6052">'+l.obj+'</p>';}
    return '<h3>감상</h3><div class="cv-wrap" style="height:200px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center">'+src+' 감상 화면<br>(원본 이미지 표시)</div><p style="margin:12px 0 0;font-size:14px;color:#6b6052">'+l.obj+'</p>';
  }
  if(stage==='보기'){return '<h3>오늘의 그림</h3><p style="font-size:15.5px">'+l.obj+'</p><p style="margin-top:8px;font-size:14px;color:#6b6052">'+l.meta+'</p>';}
  if(stage==='순서'){
    if(l.svgViewer){return '<h3>그리는 순서</h3><div class="svgv'+(l.light?' light':'')+'" id="svgv">'+l.svgViewer+'</div><div class="svlabel" id="svlabel"></div><div class="svrow"><button onclick="svPrev()">◀ 이전</button><button class="pri" onclick="svPlay(this)">▶ 순서대로</button><button onclick="svNext()">다음 ▶</button></div>';}
    if(l.type==='color'||l.type==='image'){return orderPaired(l);}
    if(l.type==='brush'){let s='<h3>그리는 순서</h3>';
      l.blocks.forEach(b=>s+='<div class="blk"><b>'+b.t+'</b><span>'+b.e+'</span></div>');
      if(l.photos&&l.photos.base){s+='<p class="ph-note" style="margin-top:14px">과정 사진</p><div class="photos">';for(let i=1;i<=24;i++)s+='<div class="photo"><img loading="lazy" src="'+AB+l.photos.base+i+'.jpg" onerror="this.closest(\'.photo\').remove()"></div>';s+='</div><p class="ph-note">채본·단계 사진을 <code>'+AB+l.photos.base+'</code> 에 1.jpg부터 넣으면 모두 표시됩니다.</p>';}
      return s;}
    return '<h3>그리는 순서</h3><div class="cv-wrap" style="height:160px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center">단계 SVG 화면<br>'+(l.note||'')+'</div>';
  }
  if(stage==='따라하기'){return '<h3>따라 그리기</h3><div id="cvhost"></div>';}
  if(stage==='창작'){return '<h3>나만의 창작</h3><div id="cvhost"></div>';}
  if(stage==='한국어'){
    if(l.korean2){const k=l.korean2;let s='';
      function voc(title,rows){if(!rows||!rows.length)return '';let x='<div class="vsec"><div class="vt">'+title+'</div>';
        rows.forEach(r=>{x+='<div class="vrow"><div class="vkr">'+r[0]+'</div><div class="vbody"><div class="vrom">'+r[1]+'</div><div class="ven">'+r[2]+'</div></div><button class="vplay" onclick="speak(\''+r[0]+'\')">▶</button></div>';});
        return x+'</div>';}
      s+=voc('미술 용어',k.terms)+voc('작품 속 단어',k.words);
      (k.sentences||[]).forEach((q,i)=>{s+='<div class="scard"><div class="slbl">'+(i===0?'오늘의 문장':'그림 이야기')+'</div><div class="skr">'+q[0]+' <button class="vplay sm" onclick="speak(\''+q[0]+'\')">▶</button></div><div class="srom">'+q[1]+'</div><div class="sen">'+q[2]+'</div></div>';});
      (k.culture||[]).forEach(c=>{s+='<div class="ccard"><div class="clbl">'+c[0]+'</div><div class="ctxt">'+c[1]+'</div></div>';});
      return '<h3>오늘의 한국어</h3>'+s;
    }
    let s='<h3>오늘의 한국어</h3><div class="kw">';if(l.korean){const w=l.korean;s+='<div class="w"><b>'+w.ko+'</b><span>'+w.rom+' · '+w.en+'</span></div>';}return s+'</div>';
  }
  if(stage==='AI'){
    if(l.qna){
      let s='<h3>AI 친구에게 물어보세요</h3><p style="font-size:14.5px;color:#6b6052;margin:2px 0 8px">궁금한 질문을 누르면 답이 나와요. ▶ 로 들을 수도 있어요.</p>';
      l.qna.forEach((qa,i)=>{
        s+='<div class="aicard" onclick="aiToggle('+i+')"><div class="aihead"><span class="aiemo">💬</span><div class="aimain"><div class="aititle" style="font-size:15.5px">'+qa[0]+'</div></div><span class="aichev" id="aichev'+i+'">▾</span></div>'
         +'<div class="aiex" id="aiex'+i+'"><span class="aiq" style="color:#4a463f;font-weight:500">'+qa[1]+'</span><button class="vplay sm" onclick="event.stopPropagation();speak(\''+qa[1].replace(/'/g,"\\'")+'\')">▶ 듣기</button></div></div>';
      });
      s+='<p class="ph-note">직접 입력해 묻는 실시간 대화는 다음 단계에서 연결됩니다.</p>';
      return s;
    }
    return '<h3>AI 친구에게 물어보세요</h3><p style="font-size:15px;color:#4a463f;line-height:1.6">이 작품의 질문 10개는 준비 중입니다. <b>명화부터</b> 차례로 채우고 있어요.</p>';
  }
  return '';
}

function mountCanvas(guide){
  const host=document.getElementById('cvhost'); if(!host) return;
  host.innerHTML='<div class="cv-wrap">'+(guide?'<div class="cv-guide">'+guide+'</div>':'')+'<canvas class="cv"></canvas></div>'
   +'<div class="cv-bar"><span class="pen on" data-c="#2A2622" style="background:#2A2622"></span>'
   +'<span class="pen" data-c="#C8453B" style="background:#C8453B"></span><span class="pen" data-c="#3E7E8C" style="background:#3E7E8C"></span>'
   +'<span class="pen" data-c="#D89A3E" style="background:#D89A3E"></span>'
   +'<button class="tbtn" id="thin">가는선</button><button class="tbtn on" id="thick">굵은선</button>'
   +'<button class="tbtn" id="eraser">지우개</button><button class="tbtn" id="clear">전체 지우기</button></div>';
  const wrap=host.querySelector('.cv-wrap'), cv=host.querySelector('canvas'), ctx=cv.getContext('2d');
  let color='#2A2622', size=5, erase=false, drawing=false, last=null;
  function resize(){const r=wrap.getBoundingClientRect(),dpr=devicePixelRatio||1;
    cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.lineCap='round';ctx.lineJoin='round';}
  resize();
  function pt(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  function down(e){e.preventDefault();drawing=true;last=pt(e);}
  function move(e){if(!drawing)return;e.preventDefault();const p=pt(e);
    ctx.globalCompositeOperation=erase?'destination-out':'source-over';ctx.strokeStyle=color;ctx.lineWidth=erase?size*5:size;
    ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;}
  function up(){drawing=false;}
  cv.addEventListener('pointerdown',down);cv.addEventListener('pointermove',move);addEventListener('pointerup',up);
  cv.addEventListener('touchstart',down,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',up);
  host.querySelectorAll('.pen').forEach(p=>p.onclick=()=>{erase=false;color=p.dataset.c;
    host.querySelectorAll('.pen').forEach(x=>x.classList.remove('on'));p.classList.add('on');document.getElementById('eraser').classList.remove('on');});
  document.getElementById('thin').onclick=function(){size=2.5;this.classList.add('on');document.getElementById('thick').classList.remove('on');};
  document.getElementById('thick').onclick=function(){size=5;this.classList.add('on');document.getElementById('thin').classList.remove('on');};
  document.getElementById('eraser').onclick=function(){erase=true;this.classList.add('on');};
  document.getElementById('clear').onclick=()=>ctx.clearRect(0,0,cv.width,cv.height);
}

let SV={steps:[],cur:1,timer:null};
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='ko-KR';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function aiToggle(i){const ex=document.getElementById('aiex'+i),ch=document.getElementById('aichev'+i);if(!ex)return;const open=ex.classList.toggle('on');if(ch)ch.textContent=open?'▴':'▾';}
function svInit(steps){SV.steps=steps;SV.cur=1;svShow();}
function svShow(){
  const v=document.getElementById('svgv');if(!v)return;
  v.querySelectorAll('.step').forEach((x,i)=>x.classList.toggle('on',i<SV.cur));
  const lab=document.getElementById('svlabel'),s=SV.steps[SV.cur-1];
  if(lab&&s)lab.innerHTML='<b>단계 '+SV.cur+'/'+SV.steps.length+'</b> · '+s.title+'<br><span style="color:var(--muted);font-size:13px">'+s.tip+'</span>';
}
function svNext(){if(SV.cur<SV.steps.length){SV.cur++;svShow();}}
function svPrev(){if(SV.cur>1){SV.cur--;svShow();}}
function svPlay(btn){if(SV.timer){clearInterval(SV.timer);SV.timer=null;btn.textContent='▶ 순서대로';return;}
  if(SV.cur>=SV.steps.length){SV.cur=1;svShow();}btn.textContent='⏸ 멈춤';
  SV.timer=setInterval(()=>{if(SV.cur>=SV.steps.length){clearInterval(SV.timer);SV.timer=null;btn.textContent='▶ 순서대로';}else{SV.cur++;svShow();}},1100);}

function lesson(ai,li){
  const a=DATA.areas[ai],l=a.lessons[li];
  brand.dataset.t=a.name;brand.dataset.s='제 '+l.n+'차시';setBrand(false);
  const stages=a.stages;let cur=stages[0];
  function render(){
    if(SV.timer){clearInterval(SV.timer);SV.timer=null;}
    let h='<button class="back" onclick="program('+ai+')">‹ '+a.name+'</button><div class="crumbs" style="margin-top:8px">'+a.name+' · '+l.n+'/12차시</div><h1 class="title">'+l.title+'</h1>'
     +'<div class="tags"><span class="tag">'+l.diff+' 초급</span><span class="tag">'+l.meta+'</span></div><div class="obj">'+l.obj+'</div><div class="stages">';
    stages.forEach(s=>h+='<button class="stage'+(s===cur?' on':'')+'" data-s="'+s+'">'+s+'</button>');
    h+='</div><div class="panel" id="panel">'+stagePanel(a,l,cur)+'</div>';
    h+=progress[l.id]?'<div style="text-align:center;color:var(--celadon);font-weight:800;margin-top:14px">완료한 차시예요 ✓</div>'
      :'<button class="donebtn" onclick="complete(\''+l.id+'\','+ai+','+li+')">오늘 수업 완료 ✓</button>';
    main.innerHTML=h;
    if(cur==='따라하기')mountCanvas(l.svgGuide||null);
    else if(cur==='창작')mountCanvas(null);
    else if(cur==='순서'&&l.svgViewer)svInit(l.svgSteps);
    document.querySelectorAll('.stage').forEach(b=>b.onclick=()=>{cur=b.dataset.s;render();});
    scrollTo(0,0);
  }
  render();
}
function complete(id,ai,li){progress[id]=true;program(ai);}
home();
</script></body></html>
