<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF7EF">
<title>머리에 그리는 시니어아트</title>
<style>
  :root{--paper:#FBF7EF;--card:#FFF;--ink:#2A2622;--muted:#8A8073;--line:#E9E1D2;
        --cinnabar:#C8453B;--celadon:#5E8C7B;--night:#10162b;--tap:60px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-size:17px;line-height:1.55;
    font-family:"Apple SD Gothic Neo","Noto Sans KR",system-ui,-apple-system,sans-serif;}
  .app{max-width:460px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
  header{position:sticky;top:0;z-index:5;background:rgba(251,247,239,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:12px;}
  .logo{width:34px;height:34px;flex:0 0 34px;}
  .brand b{font-size:17px;font-weight:800;letter-spacing:-.02em;display:block;}
  .brand span{font-size:11.5px;color:var(--muted);}
  .back{border:0;background:none;font-size:17px;color:var(--ink);padding:6px 6px 6px 0;cursor:pointer;font-weight:700;}
  main{padding:18px;}
  h2.greet{font-size:22px;font-weight:800;margin:4px 0 2px;letter-spacing:-.02em;}
  p.lead{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .area{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);
    border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;min-height:var(--tap);}
  .area:active{transform:scale(.99);}
  .chip{width:48px;height:48px;flex:0 0 48px;border-radius:14px;display:flex;align-items:center;
    justify-content:center;color:#fff;font-weight:800;font-size:20px;}
  .area .t b{font-size:19px;font-weight:800;display:block;}.area .t span{font-size:13px;color:var(--muted);}
  .area .cnt{margin-left:auto;text-align:right;font-size:12px;color:var(--muted);}.area .cnt b{display:block;font-size:18px;color:var(--ink);}
  .chev{margin-left:8px;color:var(--muted);font-size:20px;}
  .progress{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px;}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:8px;}
  .bar i{display:block;height:100%;background:var(--celadon);border-radius:99px;}
  .lesson{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--card);
    border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;min-height:var(--tap);}
  .lesson:disabled{opacity:.5;}
  .num{width:38px;height:38px;flex:0 0 38px;border-radius:11px;background:#F3ECDD;display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:16px;}
  .lesson.done .num{background:var(--celadon);color:#fff;}
  .lesson .lt b{font-size:17px;font-weight:700;display:block;}.lesson .lt span{font-size:12.5px;color:var(--muted);}
  .state{margin-left:auto;font-size:20px;}
  .crumbs{font-size:12.5px;color:var(--muted);margin-bottom:6px;}
  h1.title{font-size:23px;font-weight:800;margin:0 0 6px;letter-spacing:-.02em;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .tag{font-size:12px;background:#F3ECDD;color:#6b6052;border-radius:99px;padding:5px 10px;}
  .obj{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:16px;margin-bottom:14px;}
  .stages{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
  .stage{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:99px;padding:9px 15px;
    font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);}
  .stage.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;min-height:200px;}
  .panel h3{margin:0 0 10px;font-size:15px;color:var(--cinnabar);letter-spacing:.02em;}
  ol.steps{margin:0;padding:0;list-style:none;counter-reset:s;}
  ol.steps li{counter-increment:s;position:relative;padding:9px 0 9px 34px;border-bottom:1px solid var(--line);font-size:15.5px;}
  ol.steps li:last-child{border-bottom:0;}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:8px;width:24px;height:24px;background:#F3ECDD;
    border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#6b6052;}
  .blk{padding:10px 0;border-bottom:1px solid var(--line);}.blk:last-child{border-bottom:0;}
  .blk b{display:block;font-size:15.5px;margin-bottom:3px;}.blk span{font-size:14px;color:#6b6052;}
  .ph-note{margin-top:12px;font-size:12.5px;color:var(--muted);}
  .ph-note code{background:#F3ECDD;border-radius:5px;padding:1px 5px;}
  .spair{padding:12px 0;border-bottom:1px solid var(--line);}
  .spair:last-child{border-bottom:0;}
  .stxt{display:flex;gap:11px;align-items:flex-start;font-size:15.5px;}
  .snum{flex:0 0 24px;width:24px;height:24px;margin-top:1px;background:#F3ECDD;border-radius:8px;display:flex;
    align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#6b6052;}
  .simg{margin:10px 0 0 35px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#FCFAF4;}
  .simg img{width:100%;display:block;}
  .dimg{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#FCFAF4;margin-bottom:12px;}
  .dimg img{width:100%;display:block;}
  .photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
  .photo{position:relative;aspect-ratio:1;border:1px dashed var(--line);border-radius:10px;overflow:hidden;
    background:#FCFAF4;display:flex;align-items:center;justify-content:center;}
  .photo img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;}
  .photo b{position:absolute;z-index:1;font-size:10.5px;color:var(--muted);padding:6px;text-align:center;line-height:1.3;}
  .cv-wrap{position:relative;height:280px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;}
  .cv-guide{position:absolute;inset:0;opacity:.5;pointer-events:none;}
  .cv-guide svg{width:100%;height:100%;}
  canvas.cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
  .cv-bar{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .pen{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;}
  .pen.on{box-shadow:0 0 0 2px var(--ink);}
  .tbtn{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;font-size:14px;font-weight:700;cursor:pointer;}
  .tbtn.on{background:var(--ink);color:#fff;}
  .svgv{background:linear-gradient(180deg,#10162b,#1b2440);border-radius:14px;overflow:hidden;}
  .svgv.light{background:#FCFAF4;border:1px solid var(--line);}
  .svgv svg{display:block;width:100%;height:auto;}
  .svgv .step{opacity:0;transition:opacity .4s;}
  .svgv .step.on{opacity:1;}
  .svrow{display:flex;gap:8px;margin-top:10px;}
  .svrow button{flex:1;padding:12px;border:1px solid var(--line);background:var(--card);border-radius:12px;
    font-size:15px;font-weight:700;cursor:pointer;min-height:48px;}
  .svrow button.pri{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar);}
  .svlabel{margin-top:10px;font-size:14px;}.svlabel b{color:var(--cinnabar);}
  .kw{display:flex;gap:10px;flex-wrap:wrap;}.kw .w{background:#F3ECDD;border-radius:12px;padding:10px 14px;}
  .kw .w b{font-size:19px;display:block;}.kw .w span{font-size:12px;color:#7a715c;}
  .vsec{margin-bottom:14px;}
  .vt{font-size:11px;font-weight:800;color:#7a715c;letter-spacing:.05em;margin:4px 0 8px;}
  .vrow{display:flex;align-items:center;gap:10px;background:#F8F2E6;border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:7px;}
  .vkr{font-size:18px;font-weight:800;min-width:64px;}
  .vbody{flex:1;}.vrom{font-size:12px;color:var(--cinnabar);font-weight:700;}.ven{font-size:12.5px;color:#6b6052;}
  .vplay{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:none;background:var(--celadon);color:#fff;font-size:13px;cursor:pointer;}
  .vplay.sm{width:26px;height:26px;font-size:11px;vertical-align:middle;}
  .scard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:10px;}
  .slbl{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:var(--cinnabar);border-radius:8px;padding:2px 9px;margin-bottom:8px;}
  .skr{font-size:18px;font-weight:700;line-height:1.5;}.srom{font-size:12.5px;color:var(--celadon);font-weight:700;margin-top:4px;}.sen{font-size:13px;color:#6b6052;margin-top:2px;}
  .ccard{background:#EEF2F6;border-radius:14px;padding:13px 15px;margin-bottom:10px;}
  .clbl{font-size:12px;font-weight:800;color:#3a5a7a;margin-bottom:6px;}.ctxt{font-size:13.5px;line-height:1.6;color:#42463f;}
  .donebtn{display:flex;justify-content:center;align-items:center;margin-top:14px;background:var(--celadon);color:#fff;
    border:0;font-weight:800;font-size:17px;border-radius:16px;padding:16px;width:100%;cursor:pointer;}
  footer{padding:24px 18px 34px;text-align:center;color:var(--muted);font-size:12px;}
</style></head>

산", "san", "mountain"], ["용맹", "yong-maeng", "bravery"]], "sentences": [["호랑이는 산의 왕입니다.", "Ho-rang-i-neun san-ui wang-im-ni-da.", "The tiger is the king of the mountain."]], "culture": [["🐯 호랑이의 뜻", "호랑이는 나쁜 기운을 막아 주는 용맹한 수호신입니다."]]}}]}, {"key": "dongyang", "name": "동양화", "sub": "사군자·수묵", "initial": "동", "color": "#5E8C7B", "stages": ["보기", "순서", "따라하기", "창작", "한국어", "AI"], "lessons": [{"n": 1, "id": "dongyang:1-1", "title": "동양화의 이해", "diff": "🌱", "obj": "동양화의 특성을 이해하자.", "type": "brush", "meta": "기법: 단구법 · 쌍구법 · 삼묵법 · 중봉", "blocks": [{"t": "동양화의 특성", "e": "동양에서는 사물과 하나가 되어 본질을 이해하는 문화가 발전했다. 그래서 동양화는 외형보다 그 안에 담긴 뜻과 정신을 표현한다. 빛은 같은 사물의 색을 아침·낮·밤마다 바꾸므로 동양화에서는 허상으로 보고, 모든 색을 품은 먹색으로 대상의 특징만 살려 …"}, {"t": "기본 재료 사용법", "e": "붓 잡는 법에는 단구법(엄지·검지 끝에 힘을 주어 잡고 나머지로 받침)과 쌍구법(엄지·검지에 중지를 더해 용의 발톱처럼 잡음)이 있다. 동양화에서 가장 중요한 기본은 '물 조절'이다. 붓·먹·화선지는 모두 물을 매개로 작용하므로, 물통 가장자리나 접…"}, {"t": "삼묵법", "e": "삼묵법은 담묵·중묵·농묵 세 가지 먹을 한 붓에 알맞게 담아내는 방법이다. 적정량의 물을 머금은 붓에 초묵을 조금씩 더 찍어가며 붓을 점점 세워 섞고, 파지에 찍어 농담이 잘 나뉘었는지 검사한다."}, {"t": "선 긋는 다섯 가지 방법", "e": "중봉은 붓을 수직으로 세워 붓끝이 선의 중앙을 지나게 긋는 강건한 선이다. 측봉은 붓끝을 옆으로 치우쳐 긋는 경쾌한 선(대줄기·잎). 역봉은 반대 방향으로 긋는 연습용. 전봉은 붓대·손목을 돌려 중봉·측봉·역봉을 자유로 교환하는 붓질. 산봉은 붓끝을…"}, {"t": "선 연습", "e": "가장 기본인 중봉부터 익힌다. 세로로 중봉을 긋고 그 위에 가로로 중봉을 그으며, 자연스럽게 드러나는 농담의 변화와 붓끝의 느낌에 익숙해진다. 익숙해지면 자유롭게 선을 그어 꽃·나비·나무·산·강·구름을 그려본다."}], "photos": {"base": "dongyang/1-1/", "count": 4}, "korean2": {"terms": [["먹", "meok", "ink"], ["벼루", "byeo-ru", "inkstone"]], "words": [["붓", "but", "brush"], ["한지", "han-ji", "hanji paper"], ["그림", "geu-rim", "painting"]], "sentences": [["먹과 붓으로 그립니다.", "Meok-gwa but-eu-ro geu-rim-ni-da.", "We paint with ink and brush."]], "culture": [["🖌️ 동양화란", "동양화는 먹의 진하고 연함만으로 깊이를 표현하는 그림입니다."]]}}, {"n": 2, "id": "dongyang:1-2", "title": "수묵표현의 기본 1", "diff": "🌱", "obj": "삼묵법을 응용해 붓을 만드는 세 가지 기법을 배우고, 각 기법으로 그림을 그려본다.", "type": "brush", "meta": "기법: 상단 짙게 붓 · 붓끝 짙게 붓 · 양옆 짙게 붓", "blocks": [{"t": "상단을 짙게 한 붓", "e": "붓이 지나간 자리의 상단을 짙게 해 입체감·공간감을 낸다. 담묵을 묻힌 뒤 붓끝에 농묵을 듬뿍 묻혀 접시에 눕혀 eo geu-rim-ni-da.", "We draw the outline first."]], "culture": [["✍️ 두 가지 기법", "구륵법은 윤곽선을 긋고, 몰골법은 선 없이 색으로 바로 그립니다."]]}}, {"n": 5, "id": "dongyang:2-1", "title": "사군자 1 — 난", "diff": "🌱", "obj": "사군자(매·난·국·죽) 중 난을 치는 법을 배운다.", "type": "brush", "meta": "기법: 역입 · 봉안 · 파봉안", "blocks": [{"t": "난잎 그리는 법", "e": "역입으로 정두부터 그어 올리며 돈·제·서미 모양에 유의한다. 일엽→이엽(봉안)→삼엽(파봉안)→사·오엽으로 구성에 변화를 준다."}, {"t": "난꽃 그리는 법", "e": "3장 2단의 화판과 화심, 줄기·꽃대로 이뤄진다. 운필은 화심 방향으로, 꽃술은 농묵 점(山·小·心 초서처럼), 꽃대는 구도에 맞게 휘게 그린다."}], "photos": {"base": "dongyang/2-1/", "count": 4}, "korean2": {"words": [["난", "nan", "orchid"], ["잎", "ip", "leaf"], ["향기", "hyang-gi", "scent"]], "sentences": [["난초 잎이 길게 뻗습니다.", "Nan-cho ip-i gil-ge ppeot-seum-ni-da.", "The orchid leaves stretch long."]], "culture": [["🌿 난의 뜻", "사군자 중 난은 은은한 향기처럼 군자의 품격을 뜻합니다."]]}}, {"n": 6, "id": "dongyang:2-2", "title": "사군자 2 — 대나무", "diff": "🌱", "obj": "대나무를 치는 법을 배운다.", "type": "brush", "meta": "기법: 잠두 · 마제 · 중봉", "blocks": [{"t": "줄기와 가지", "e": "말발굽(마제)처럼 붓끝에 힘을 주고 중봉으로 그어 올린다. 마디는 농묵으로, 위로 갈수록 길고 얇게. 가지는 예각으로 마디 좌우에서 엇갈려 나오며 곧게 긋는다."}, {"t": "잎", "e": "가지를 덮도록 그리되 둔탁하거나 연약하지 않게, 날렵하고 강건하게. 역입 직필로, 마무리 시 붓끝이 중심선을 지나게. 이필엽·삼필엽으로 늘려 구성한다."}], "photos": {"base": "dongyang/2-2/", "count": 4}, "korean2": {"words": [["대나무", "dae-na-mu", "bamboo"], ["마디", "ma-di", "node"], ["잎", "ip", "leaf"]], "sentences": [["대나무는 곧게 자랍니다.", "Dae-na-mu-neun god-ge ja-ram-ni-da.", "Bamboo grows straight."]], "culture": [["🎋 대나무의 뜻", "대나무는 휘어도 부러지지 않는 곧은 절개를 상징합니다."]]}}, {"n": 7, "id": "dongyang:2-3", "title": "사군자 3 — 매화", "diff": "🌱", "obj": "매화를 치는 법을 배운다.", "type": "brush", "meta": "기법: 갈필 · 농담 · 태점 · 운필", "blocks": [{"t": "줄기와 가지", "e": "늙고 굽은 느낌이 좋다. 의도적인 갈필과 농담 차이, 태점을 쓴다. 가지는 줄기 쪽에서 운필해 잔가지로 갈수록 가늘게."}, {"t": "꽃", "e": "꽃잎은 담묵, 꽃술·꽃받침은 농묵. 시작은 두껍고 끝은 얇게, 둥글게. 개화 순서와 다양한 방향을 익히고, 가지에 꽃 자리를 비워 두었다가 연결한다."}], "photos": {"base": "dongyang/2-3/", "count": 4}, "korean2": {"words": [["매화", "mae-hwa", "plum blossom"], ["봄", "bom", "spring"], ["꽃", "kkot", "flower"]], "sentences": [["매화가 가장 먼저 핍니다.", "Mae-hwa-ga ga-jang meon-jeo pim-ni-da.", "The plum blossom blooms first."]], "culture": [["🌸 매화의 뜻", "추운 겨울 끝에 가장 먼저 피어 절개와 희망을 상징합니다."]]}}, {"n": 8, "id": "dongyang:2-4", "title": "사군자 4 — 국화", "diff": "🌱", "obj": "국화를 치는 법을 배운다.", "type": "brush", "meta": "기법: 몰골법 · 삼묵법 · 측필 · 발묵", "blocks": [{"t": "국화 꽃", "e": "꽃잎은 두께차가 나는 선으로 긋는다. 소국은 화심에서 방사형으로 그린 뒤 화심을 점으로 채우고, 대국은 화심에서 점차 벌어지게. 봉오리~만개를 익힌다."}, {"t": "국화 잎", "e": "삼묵법을 만든 뒤 몰골법으로 측필해 긋는다. 첫 잎이 가장 크고 점차 작게. 발묵 잎이 마를 즈음 잎맥을 그어 번지지 않게 한다."}], "photos": {"base": "dongyang/2-4/", "count": 4}, "korean2": {"words": [["국화", "guk-hwa", "chrysanthemum"], ["가을", "ga-eul", "autumn"], ["서리", "seo-ri", "frost"]], "sentences": [["국화는 가을에 핍니다.", "Guk-hwa-neun ga-eul-e pim-ni-da.", "Chrysanthemums bloom in autumn."]], "culture": [["🌼 국화의 뜻", "서리를 이기고 피어 흔들리지 않는 지조를 뜻합니다."]]}}, {"n": 9, "id": "dongyang:3-1", "title": "과일류 표현 1 — 사과", "diff": "🌱", "obj": "과일류로 기본 동양화 채색을 익힌다.", "type": "brush", "meta": "기법: 수묵 채색 · 삼묵법 · 채색물감", "blocks": [{"t": "사과의 특징·스케치", "e": "위쪽은 울퉁불퉁하고 아래는 매끈한 가분수 형태. 동그랗게만 그리지 말고 특징을 살려 스케치한다."}, {"t": "수묵 채색", "e": "중심부터 농묵으로, 외곽으로 가며 중·담묵으로. 아래는 물+담묵으로 윗면·아랫면 차이를 주어 입체감을 낸다."}, {"t": "채색물감", "e": "삼묵법처럼 한 붓에 농담을 담아 채색한다. 외곽선은 채색이 마른 뒤 그어야 먹선이 번지지 않는다."}], "photos": {"base": "dongyang/3-1/", "count": 4}, "korean2": {"words": [["사과", "sa-gwa", "apple"], ["빨강", "ppal-gang", "red"], ["열매", "yeol-mae", "fruit"]], "sentences": [["사과가 둥급니다.", "Sa-gwa-ga dung-geum-ni-da.", "The apple is round."]], "culture": [["🍎 과일 그리기", "둥근 형태와 먹의 농담으로 사과의 부피를 표현합니다."]]}}, {"n": 10, "id": "dongyang:3-2", "title": "과일류 표현 2 — 감·귤", "diff": "🌱", "obj": "감과 귤을 그린다.", "type": "brush", "meta": "기법: 수묵 채색 · 채색물감 · 터치", "blocks": [{"t": "감", "e": "꼭지는 함몰, 잎 4장 부분은 솟음, 사과보다 작고 넓적. 잎·꼭지 농묵 → 중심부터 농묵 → 외곽 중·담묵. 단감·홍시를 그려본다."}, {"t": "귤", "e": "꼭지가 작고 표면이 울퉁불퉁하다. 농담을 담은 터치를 연결해 울퉁한 표면 질감을 표현한다."}], "photos": {"base": "dongyang/3-2/", "count": 4}, "korean2": {"words": [["감", "gam", "persimmon"], ["귤", " const AB = DATA.assetBase;
const main = document.getElementById('main'), brand = document.getElementById('brand');
const progress = {};
let previewAll = true;  // 미리보기: 12차시 전체 열기 (실제 운영은 순차 잠금)
function togglePreview(){previewAll=!previewAll;home();}
function setBrand(h){brand.innerHTML = h
  ? '<b>머리에 그리는 시니어아트</b><span>머릿속에 먼저 그리고, 그다음 손으로</span>'
  : '<b>'+brand.dataset.t+'</b><span>'+brand.dataset.s+'</span>';}

function home(){
  setBrand(true);
  let h='<h2 class="greet">오늘도 한 장, 그려볼까요?</h2><p class="lead">배우고 싶은 그림을 골라 주세요 · 5가지 · 각 12차시</p>'
   +'<button class="tbtn'+(previewAll?' on':'')+'" style="margin-bottom:14px" onclick="togglePreview()">'+(previewAll?'🔓 12차시 전체 열림 (미리보기)':'🔒 순차 잠금 (실제 운영)')+'</button>';
  DATA.areas.forEach((a,i)=>{const d=a.lessons.filter(l=>progress[l.id]).length;
    h+='<button class="area" onclick="program('+i+')"><span class="chip" style="background:'+a.color+'">'+a.initial+'</span>'
     +'<span class="t"><b>'+a.name+'</b><span>'+a.sub+'</span></span><span class="cnt"><b>'+d+'/12</b>차시</span><span class="chev">›</span></button>';});
  main.innerHTML=h; scrollTo(0,0);
}
function program(ai){
  const a=DATA.areas[ai];brand.dataset.t=a.name;brand.dataset.s=a.sub;setBrand(false);
  const d=a.lessons.filter(l=>progress[l.id]).length;
  let h='<button class="back" onclick="home()">‹ 프로그램</button><h1 class="title" style="margin-top:8px">'+a.name+'</h1>'
   +'<div class="progress"><div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)"><span>진도</span><span>'+d+' / 12 완료</span></div><div class="bar"><i style="width:'+(d/12*100)+'%"></i></div></div>';
  a.lessons.forEach((l,li)=>{const done=!!progress[l.id];const locked=!previewAll&&li>0&&!progress[a.lessons[li-1].id]&&!done;
    h+='<button class="lesson'+(done?' done':'')+'" '+(locked?'disabled':'')+' onclick="lesson('+ai+','+li+')">'
     +'<span class="num">'+(done?'✓':l.n)+'</span><span class="lt"><b>'+l.title+'</b><span>'+l.diff+' '+l.meta+'</span></span>'
     +'<span class="state">'+(locked?'🔒':'›')+'</span></button>';});
  main.innerHTML=h; scrollTo(0,0);
}

function drvThumb(id){return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1000';}
function orderPaired(l){
  if(l.photos&&l.photos.full){
    let h='<h3>그리는 순서</h3><p style="font-size:14.5px;color:#6b6052;margin-bottom:10px">'+l.steps[0]+'</p>';
    for(let i=1;i<=l.photos.count;i++){h+='<div class="dimg"><img loading="lazy" src="'+AB+l.photos.base+i+'.jpg" onerror="this.closest(\'.dimg\').remove()"></div>';}
    h+='<p class="ph-note">교안 그림 자리입니다. <code>'+AB+l.photos.base+'</code> 에 1.jpg부터 넣으면 표시됩니다.</p>';
    return h;
  }
  let ids=[];
  if(l.photos&&l.photos.ids) ids=l.photos.ids.map(drvThumb);
  else if(l.photos&&l.photos.base){for(let i=1;i<=l.photos.count;i++)ids.push(AB+l.photos.base+i+'.jpg');}
  else if(l.photos&&l.photos.single) ids=[AB+l.photos.single];
  let h='<h3>그리는 순서</h3>';
  l.steps.forEach((t,i)=>{
    h+='<div class="spair"><div class="stxt"><span class="snum">'+(i+1)+'</span><span>'+t+'</span></div>';
    if(ids[i]) h+='<div class="simg"><img loading="lazy" src="'+ids[i]+'" onerror="this.closest(\'.simg\').remove()"></div>';
    h+='</div>';
  });
  if(ids.length>l.steps.length){
    h+='<p class="ph-note" style="margin-top:14px">추가 과정 사진</p><div class="photos">';
    ids.slice(l.steps.length).forEach(src=>{h+='<div class="photo"><img loading="lazy" src="'+src+'" onerror="this.closest(\'.photo\').remove()"></div>';});
    h+='</div>';
  }
  if(l.photos&&l.photos.base) h+='<p class="ph-note">사진을 <code>'+AB+l.photos.base+'</code> 에 1.jpg부터 넣으면 단계마다 표시됩니다.</p>';
  return h;
}

function photosHtml(l){
  if(!l.photos) return '';
  let items=[], note='';
  if(l.photos.ids){
    items=l.photos.ids.map(id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w1000');
    note='드라이브에서 불러옵니다. (01_minhwa 폴더가 "링크가 있는 모든 사용자"로 공유돼 있어야 보입니다.)';
  } else if(l.photos.single){
    items=[AB+l.photos.single]; note='순서 이미지를 <code>'+AB+'</code> 에 넣으면 표시됩니다.';
  } else if(l.photos.base){
    for(let i=1;i<=l.photos.count;i++)items.push(AB+l.photos.base+i+'.jpg');
    note='<code>'+AB+l.photos.base+'</code> 에 사진을 넣으면 표시됩니다.';
  }
  if(!items.length) return '';
  let h='<div class="photos">';
  items.forEach(src=>{h+='<div class="photo"><img loading="lazy" referrerpolicy="no-referrer" src="'+src+'" onerror="this.closest(\'.photo\').remove()"></div>';});
  return h+'</div><p class="ph-note">과정 사진 — '+note+'</p>';
}

function stagePanel(a,l,stage){
  if(stage==='감상'){
    const src=(a.key==='heritage')?'공공누리 1유형 원본 사진':'구입 원본';
    if(l.viewImg){return '<h3>감상</h3><div class="dimg"><img src="'+AB+l.viewImg+'" onerror="this.style.display=\'none\';this.insertAdjacentHTML(\'afterend\',\'<div class=\\\'cv-wrap\\\' style=\\\'height:160px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:0 14px\\\'>'+src+' 사진을 '+AB+l.viewImg+' 에 넣으면 표시됩니다.</div>\')"></div><p style="margin:12px 0 0;font-size:14px;color:#6b6052">'+l.obj+'</p>';}
    return '<h3>감상</h3><div class="cv-wrap" style="height:200px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center">'+src+' 감상 화면<br>(원본 이미지 표시)</div><p style="margin:12px 0 0;font-size:14px;color:#6b6052">'+l.obj+'</p>';
  }
  if(stage==='보기'){return '<h3>오늘의 그림</h3><p style="font-size:15.5px">'+l.obj+'</p><p style="margin-top:8px;font-size:14px;color:#6b6052">'+l.meta+'</p>';}
  if(stage==='순서'){
    if(l.svgViewer){return '<h3>그리는 순서</h3><div class="svgv'+(l.light?' light':'')+'" id="svgv">'+l.svgViewer+'</div><div class="svlabel" id="svlabel"></div><div class="svrow"><button onclick="svPrev()">◀ 이전</button><button class="pri" onclick="svPlay(this)">▶ 순서대로</button><button onclick="svNext()">다음 ▶</button></div>';}
    if(l.type==='color'||l.type==='image'){return orderPaired(l);}
    if(l.type==='brush'){let s='<h3>그리는 순서</h3>';
      if(l.photos&&l.photos.base){for(let i=1;i<=l.photos.count;i++)s+='<div class="dimg"><img loading="lazy" src="'+AB+l.photos.base+i+'.jpg" onerror="this.closest(\'.dimg\').remove()"></div>';s+='<p class="ph-note">채본·단계 사진을 <code>'+AB+l.photos.base+'</code> 에 1.jpg부터 넣으면 표시됩니다.</p>';}
      l.blocks.forEach(b=>s+='<div class="blk"><b>'+b.t+'</b><span>'+b.e+'</span></div>');return s;}
    return '<h3>그리는 순서</h3><div class="cv-wrap" style="height:160px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center">단계 SVG 화면<br>'+(l.note||'')+'</div>';
  }
  if(stage==='따라하기'){return '<h3>따라 그리기</h3><div id="cvhost"></div>';}
  if(stage==='창작'){return '<h3>나만의 창작</h3><div id="cvhost"></div>';}
  if(stage==='한국어'){
    if(l.korean2){const k=l.korean2;let s='';
      function voc(title,rows){if(!rows||!rows.length)return '';let x='<div class="vsec"><div class="vt">'+title+'</div>';
        rows.forEach(r=>{x+='<div class="vrow"><div class="vkr">'+r[0]+'</div><div class="vbody"><div class="vrom">'+r[1]+'</div><div class="ven">'+r[2]+'</div></div><button class="vplay" onclick="speak(\''+r[0]+'\')">▶</button></div>';});
        return x+'</div>';}
      s+=voc('미술 용어',k.terms)+voc('작품 속 단어',k.words);
      (k.sentences||[]).forEach((q,i)=>{s+='<div class="scard"><div class="slbl">'+(i===0?'오늘의 문장':'그림 이야기')+'</div><div class="skr">'+q[0]+' <button class="vplay sm" onclick="speak(\''+q[0]+'\')">▶</button></div><div class="srom">'+q[1]+'</div><div class="sen">'+q[2]+'</div></div>';});
      (k.culture||[]).forEach(c=>{s+='<div class="ccard"><div class="clbl">'+c[0]+'</div><div class="ctxt">'+c[1]+'</div></div>';});
      return '<h3>오늘의 한국어</h3>'+s;
    }
    let s='<h3>오늘의 한국어</h3><div class="kw">';if(l.korean){const w=l.korean;s+='<div class="w"><b>'+w.ko+'</b><span>'+w.rom+' · '+w.en+'</span></div>';}return s+'</div>';
  }
  if(stage==='AI'){return '<h3>AI 선생님</h3><p style="font-size:15.5px">"'+l.obj+'" 이 그림에 대해 궁금한 점을 물어보세요.</p><div class="cv-wrap" style="height:110px;display:flex;align-items:center;justify-content:center;color:var(--muted)">질문 입력 화면</div><p class="ph-note">소개·설명·칭찬은 AI가 어르신 눈높이로 실시간 생성합니다.</p>';}
  return '';
}

function mountCanvas(guide){
  const host=document.getElementById('cvhost'); if(!host) return;
  host.innerHTML='<div class="cv-wrap">'+(guide?'<div class="cv-guide">'+guide+'</div>':'')+'<canvas class="cv"></canvas></div>'
   +'<div class="cv-bar"><span class="pen on" data-c="#2A2622" style="background:#2A2622"></span>'
   +'<span class="pen" data-c="#C8453B" style="background:#C8453B"></span><span class="pen" data-c="#3E7E8C" style="background:#3E7E8C"></span>'
   +'<span class="pen" data-c="#D89A3E" style="background:#D89A3E"></span>'
   +'<button class="tbtn" id="thin">가는선</button><button class="tbtn on" id="thick">굵은선</button>'
   +'<button class="tbtn" id="eraser">지우개</button><button class="tbtn" id="clear">전체 지우기</button></div>';
  const wrap=host.querySelector('.cv-wrap'), cv=host.querySelector('canvas'), ctx=cv.getContext('2d');
  let color='#2A2622', size=5, erase=false, drawing=false, last=null;
  function resize(){const r=wrap.getBoundingClientRect(),dpr=devicePixelRatio||1;
    cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.lineCap='round';ctx.lineJoin='round';}
  resize();
  function pt(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  function down(e){e.preventDefault();drawing=true;last=pt(e);}
  function move(e){if(!drawing)return;e.preventDefault();const p=pt(e);
    ctx.globalCompositeOperation=erase?'destination-out':'source-over';ctx.strokeStyle=color;ctx.lineWidth=erase?size*5:size;
    ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;}
  function up(){drawing=false;}
  cv.addEventListener('pointerdown',down);cv.addEventListener('pointermove',move);addEventListener('pointerup',up);
  cv.addEventListener('touchstart',down,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',up);
  host.querySelectorAll('.pen').forEach(p=>p.onclick=()=>{erase=false;color=p.dataset.c;
    host.querySelectorAll('.pen').forEach(x=>x.classList.remove('on'));p.classList.add('on');document.getElementById('eraser').classList.remove('on');});
  document.getElementById('thin').onclick=function(){size=2.5;this.classList.add('on');document.getElementById('thick').classList.remove('on');};
  document.getElementById('thick').onclick=function(){size=5;this.classList.add('on');document.getElementById('thin').classList.remove('on');};
  document.getElementById('eraser').onclick=function(){erase=true;this.classList.add('on');};
  document.getElementById('clear').onclick=()=>ctx.clearRect(0,0,cv.width,cv.height);
}

let SV={steps:[],cur:1,timer:null};
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='ko-KR';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function svInit(steps){SV.steps=steps;SV.cur=1;svShow();}
function svShow(){
  const v=document.getElementById('svgv');if(!v)return;
  v.querySelectorAll('.step').forEach((x,i)=>x.classList.toggle('on',i<SV.cur));
  const lab=document.getElementById('svlabel'),s=SV.steps[SV.cur-1];
  if(lab&&s)lab.innerHTML='<b>단계 '+SV.cur+'/'+SV.steps.length+'</b> · '+s.title+'<br><span style="color:var(--muted);font-size:13px">'+s.tip+'</span>';
}
function svNext(){if(SV.cur<SV.steps.length){SV.cur++;svShow();}}
function svPrev(){if(SV.cur>1){SV.cur--;svShow();}}
function svPlay(btn){if(SV.timer){clearInterval(SV.timer);SV.timer=null;btn.textContent='▶ 순서대로';return;}
  if(SV.cur>=SV.steps.length){SV.cur=1;svShow();}btn.textContent='⏸ 멈춤';
  SV.timer=setInterval(()=>{if(SV.cur>=SV.steps.length){clearInterval(SV.timer);SV.timer=null;btn.textContent='▶ 순서대로';}else{SV.cur++;svShow();}},1100);}

function lesson(ai,li){
  const a=DATA.areas[ai],l=a.lessons[li];
  brand.dataset.t=a.name;brand.dataset.s='제 '+l.n+'차시';setBrand(false);
  const stages=a.stages;let cur=stages[0];
  function render(){
    if(SV.timer){clearInterval(SV.timer);SV.timer=null;}
    let h='<button class="back" onclick="program('+ai+')">‹ '+a.name+'</button><div class="crumbs" style="margin-top:8px">'+a.name+' · '+l.n+'/12차시</div><h1 class="title">'+l.title+'</h1>'
     +'<div class="tags"><span class="tag">'+l.diff+' 초급</span><span class="tag">'+l.meta+'</span></div><div class="obj">'+l.obj+'</div><div class="stages">';
    stages.forEach(s=>h+='<button class="stage'+(s===cur?' on':'')+'" data-s="'+s+'">'+s+'</button>');
    h+='</div><div class="panel" id="panel">'+stagePanel(a,l,cur)+'</div>';
    h+=progress[l.id]?'<div style="text-align:center;color:var(--celadon);font-weight:800;margin-top:14px">완료한 차시예요 ✓</div>'
      :'<button class="donebtn" onclick="complete(\''+l.id+'\','+ai+','+li+')">오늘 수업 완료 ✓</button>';
    main.innerHTML=h;
    if(cur==='따라하기')mountCanvas(l.svgGuide||null);
    else if(cur==='창작')mountCanvas(null);
    else if(cur==='순서'&&l.svgViewer)svInit(l.svgSteps);
    document.querySelectorAll('.stage').forEach(b=>b.onclick=()=>{cur=b.dataset.s;render();});
    scrollTo(0,0);
  }
  render();
}
function complete(id,ai,li){progress[id]=true;program(ai);}
home();
</script></body></html>
